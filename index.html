    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

        const translations = {

            bg: { partial: "Отворено за монтаж", finished: "Завършено", blocked: "Блокирано", hours: "Запис часове", openItems: "Отворено?", reason: "Причина...", submit: "Изпрати", cancel: "Отказ", placeholderNum: "Число...", back: "Назад", search: "Търси..." },
            cs: { partial: "Otevřeno pro montáž", finished: "Hotovo", blocked: "Blokováno", hours: "Zaznamenat hodiny", openItems: "Otevřeno?", reason: "Důvod...", submit: "Odeslat", cancel: "Zrušit", placeholderNum: "Číslo...", back: "Zpět", search: "Hledat..." },
            el: { partial: "Ανοιχτό για μοντάρισμα", finished: "Ολοκληρώθηκε", blocked: "Μπλοκαρισμένο", hours: "Καταγραφή ωρών", openItems: "Ανοιχτό;", reason: "Αιτία...", submit: "Αποστολή", cancel: "Ακύρωση", placeholderNum: "Αριθμός...", back: "Πίσω", search: "Αναζήτηση..." }
        };

        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide-name', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, nameAttr: 'data-lucide-name' });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;
        });

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const getCalWeekDays = (base) => {
            const d = new Date(base);
            const day = d.getDay();

        const packEntriesIntoLanes = (entries, weekDays) => {
            const weekStart = toLocalDateStr(weekDays[0]);
            const weekEnd   = toLocalDateStr(weekDays[5]);
            const visible = entries.filter(e => {
                const start = (e.deliveryDate || '').substring(0, 10);
                const end   = (e.endDate || '').substring(0, 10) || start;
                return start <= weekEnd && end >= weekStart;
            });
            const sorted = [...visible].sort((a, b) => {
                const aStart = (a.deliveryDate||'').substring(0,10);
                const bStart = (b.deliveryDate||'').substring(0,10);
                const aEnd   = (a.endDate||'').substring(0,10) || aStart;
                const bEnd   = (b.endDate||'').substring(0,10) || bStart;
                const aDays  = daysBetween(aStart, aEnd);
                const bDays  = daysBetween(bStart, bEnd);
                if (bDays !== aDays) return bDays - aDays;
                if (aStart !== bStart) return aStart < bStart ? -1 : 1;
                return (a.createdAt||'') < (b.createdAt||'') ? -1 : 1;
            });
            const laneDays = [];
            const entryLanesMap = new Map();
            const weekDayStrs = weekDays.map(d => toLocalDateStr(d));
            for (const e of sorted) {
                const startStr = (e.deliveryDate||'').substring(0,10);
                const endStr   = (e.endDate||e.deliveryDate||'').substring(0,10);
                const occupiedDays = new Set();
                for (const dayStr of weekDayStrs) {
                    if (dayStr >= startStr && dayStr <= endStr) occupiedDays.add(dayStr);
                }
                let lane = 0;
                while (lane < laneDays.length) {
                    let conflict = false;
                    for (const d of occupiedDays) { if (laneDays[lane].has(d)) { conflict = true; break; } }
                    if (!conflict) break;
                    lane++;
                }
                if (!laneDays[lane]) laneDays[lane] = new Set();
                for (const d of occupiedDays) laneDays[lane].add(d);
                entryLanesMap.set(e.id, lane);
            }
            return { entryLanes: entryLanesMap, numLanes: Math.max(laneDays.length, 1), laneVisibleEntries: sorted };
        };

                const end = (e.endDate||'').substring(0,10)||start;

                doc.text('UNTERSCHRIFT MONTEUR',margin,y+5); doc.line(pageW-margin-65,y,pageW-margin,y); doc.text('UNTERSCHRIFT BAULEITUNG',pageW-margin-65,y+5);
                doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(180,180,180);
                doc.text(`Montage Manager Pro • Erstellt: ${new Date().toLocaleDateString('de-DE')}`,pageW/2,pageH-8,{align:'center'});
                doc.save(`Stundenbericht_${summary.name}_KW${kw}.pdf`);
                resolve();
            });
        };

        const generateBillingExcel = (entriesRaw, firma, billedIds) => {
            if (!window.XLSX) { alert('Excel-Bibliothek nicht geladen.'); return; }
            const XLSX = window.XLSX;
            const firmaLabel = firma === 'PE' ? 'PE-Fabrikation' : 'FA-Bauservice';
            const today = new Date().toLocaleDateString('de-DE');
            const sortFn = (a,b) => { const da=new Date(a.deliveryDate||a.finishedAt||0); const db2=new Date(b.deliveryDate||b.finishedAt||0); return da-db2; };

            // ── In zwei klar getrennte Gruppen aufteilen: OFFEN oben, ABGERECHNET unten ──
            const offeneEntries = entriesRaw.filter(e => !billedIds.has(e.id)).sort(sortFn);
            const abgerechneteEntries = entriesRaw.filter(e => billedIds.has(e.id)).sort(sortFn);

            const headerCols = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
            const colWidths = [4, 12, 30, 20, 36, 30, 16, 18, 22];
            const billingLabel = (s) => s==='fehler_intern' ? 'Fehler intern' : (s==='weiter_verrechnen' ? 'Weiter verrechnen' : '');

            // ── Worksheet data ──────────────────────────────────────────
            const wsData = [];
            // Zeilen-Styling wird parallel in einem Array gesammelt: { ref, style } pro Zelle
            const cellStyles = [];

            const pushRow = (rowArr) => { wsData.push(rowArr); return wsData.length - 1; }; // gibt 0-basierten Row-Index zurück

            const styleRow = (rowIdx, style) => {
                headerCols.forEach(col => cellStyles.push({ ref: col + (rowIdx + 1), style }));
            };

            // Titel
            const titleRowIdx = pushRow(['FERTIGMONTAGE ABRECHNUNG — ' + firmaLabel.toUpperCase()]);
            const subTitleRowIdx = pushRow(['Erstellt: ' + today + '    |    Gesamt: ' + entriesRaw.length + '    |    Offen: ' + offeneEntries.length + '    |    Abgerechnet: ' + abgerechneteEntries.length]);
            pushRow([]);

            const merges = [
                { s: { r: titleRowIdx, c: 0 }, e: { r: titleRowIdx, c: 8 } },
                { s: { r: subTitleRowIdx, c: 0 }, e: { r: subTitleRowIdx, c: 8 } },
            ];

            const addSectionHeader = (label, colorRgb, fillRgb) => {
                const rowIdx = pushRow([label]);
                merges.push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 8 } });
                styleRow(rowIdx, {
                    font: { bold: true, sz: 12, color: { rgb: colorRgb } },
                    fill: { fgColor: { rgb: fillRgb } },
                    alignment: { horizontal: 'left', vertical: 'center' },
                    border: { top: { style: 'medium', color: { rgb: colorRgb } }, bottom: { style: 'medium', color: { rgb: colorRgb } } },
                });
                return rowIdx;
            };

            const addColumnHeaderRow = (accentRgb) => {
                const rowIdx = pushRow(['#', 'DATUM', 'KUNDE', 'AUFTRAGSNR.', 'ADRESSE', 'MEMO', 'STATUS', 'ABGERECHNET AM', 'ABRECHNEN:']);
                styleRow(rowIdx, {
                    font: { bold: true, sz: 10, color: { rgb: 'FFFFFF' } },
                    fill: { fgColor: { rgb: accentRgb } },
                    alignment: { horizontal: 'center', vertical: 'center' },
                    border: { bottom: { style: 'thin', color: { rgb: 'CCCCCC' } } },
                });
                return rowIdx;
            };

            const addEntryRows = (list, isAbgerechnetGroup) => {
                list.forEach((entry, i) => {
                    const isAbgerechnet = isAbgerechnetGroup; // Gruppenzugehörigkeit ist hier eindeutig
                    const billedDate = isAbgerechnet
                        ? (entry[`${firma}date`] ? new Date(entry[`${firma}date`]).toLocaleDateString('de-DE') : today)
                        : '';
                    const datum = entry.deliveryDate ? new Date(entry.deliveryDate).toLocaleDateString('de-DE') : (entry.finishedAt ? new Date(entry.finishedAt).toLocaleDateString('de-DE') : '');
                    const rowIdx = pushRow([
                        i + 1,
                        datum,
                        entry.customer || '',
                        cleanAuftragsNr(entry.auftragsNr || ''),
                        entry.address || '',
                        entry.memo || '',
                        isAbgerechnet ? '✓ ABGERECHNET' : '⬜ OFFEN',
                        billedDate,
                        billingLabel(entry.billingStatus),
                    ]);
                    const isEven = i % 2 === 0;
                    const rowFill = isAbgerechnet ? (isEven ? 'E7F4EC' : 'F2FAF5') : (isEven ? 'F8FAFC' : 'FFFFFF');
                    const textColor = '1E293B';
                    headerCols.forEach(col => {
                        const isMemoCol = col === 'F';
                        const isBillingCol = col === 'I';
                        const hasMemo = !!(entry.memo);
                        const hasBilling = !!(entry.billingStatus);
                        const memoFill = !isAbgerechnet && isMemoCol && hasMemo ? 'FFFBEB' : rowFill;
                        let cellTextColor = !isAbgerechnet && isMemoCol && hasMemo ? '92400E' : textColor;
                        let cellFill = memoFill;
                        if (isBillingCol && hasBilling) { cellTextColor = 'DC2626'; cellFill = 'FEE2E2'; }
                        cellStyles.push({
                            ref: col + (rowIdx + 1),
                            style: {
                                font: { sz: 10, color: { rgb: cellTextColor }, bold: col === 'C' || col === 'D' || (isBillingCol && hasBilling), italic: isMemoCol && hasMemo },
                                fill: { fgColor: { rgb: cellFill } },
                                alignment: { vertical: 'center', wrapText: isMemoCol },
                                border: { bottom: { style: 'hair', color: { rgb: isAbgerechnet ? 'BBE5CC' : 'E2E8F0' } } },
                            },
                        });
                    });
                });
            };

            const accentMain = firma === 'PE' ? '2563EB' : 'D97706';
            const accentBilled = '15803D';

            // ── BLOCK 1: OFFENE AUFTRÄGE ───────────────────────────────
            addSectionHeader('🔓  NOCH OFFEN  (' + offeneEntries.length + ' Aufträge)', accentMain, 'EFF6FF');
            addColumnHeaderRow(accentMain);
            if (offeneEntries.length === 0) {
                const rowIdx = pushRow(['', '', 'Keine offenen Aufträge', '', '', '', '', '']);
                styleRow(rowIdx, { font: { italic: true, sz: 10, color: { rgb: '94A3B8' } }, alignment: { vertical: 'center' } });
            } else {
                addEntryRows(offeneEntries, false);
            }

            // ── Deutliche Trennung: Leerzeilen + dicker Trennbalken ──
            pushRow([]);
            const dividerRowIdx = pushRow(['────────────  ABGERECHNETE AUFTRÄGE BEGINNEN UNTERHALB DIESER LINIE  ────────────']);
            merges.push({ s: { r: dividerRowIdx, c: 0 }, e: { r: dividerRowIdx, c: 8 } });
            styleRow(dividerRowIdx, {
                font: { bold: true, sz: 9, color: { rgb: '94A3B8' } },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: { top: { style: 'thick', color: { rgb: '94A3B8' } }, bottom: { style: 'thick', color: { rgb: '94A3B8' } } },
            });
            pushRow([]);

            // ── BLOCK 2: ABGERECHNETE AUFTRÄGE ─────────────────────────
            addSectionHeader('✅  BEREITS ABGERECHNET  (' + abgerechneteEntries.length + ' Aufträge)', accentBilled, 'F0FDF4');
            addColumnHeaderRow(accentBilled);
            if (abgerechneteEntries.length === 0) {
                const rowIdx = pushRow(['', '', 'Keine abgerechneten Aufträge', '', '', '', '', '']);
                styleRow(rowIdx, { font: { italic: true, sz: 10, color: { rgb: '94A3B8' } }, alignment: { vertical: 'center' } });
            } else {
                addEntryRows(abgerechneteEntries, true);
            }

            // Zusammenfassung am Ende
            pushRow([]);
            const summaryHeaderIdx = pushRow(['ZUSAMMENFASSUNG']);
            styleRow(summaryHeaderIdx, { font: { bold: true, sz: 10, color: { rgb: '1E293B' } } });
            pushRow(['Gesamt Aufträge', entriesRaw.length]);
            pushRow(['Noch offen', offeneEntries.length]);
            pushRow(['Abgerechnet', abgerechneteEntries.length]);

            // ── Create worksheet ────────────────────────────────────────
            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // Column widths — 8 Spalten
            ws['!cols'] = colWidths.map(wch => ({ wch }));

            // Merges
            ws['!merges'] = merges;

            // Titel-Zelle
            const titleCell = ws['A' + (titleRowIdx + 1)];
            if (titleCell) {
                titleCell.s = {
                    font: { bold: true, sz: 14, color: { rgb: firma === 'PE' ? '2563EB' : 'D97706' } },
                    fill: { fgColor: { rgb: firma === 'PE' ? 'EFF6FF' : 'FFFBEB' } },
                    alignment: { horizontal: 'left', vertical: 'center' },
                };
            }

            // Alle gesammelten Zell-Styles anwenden
            cellStyles.forEach(({ ref, style }) => {
                if (ws[ref]) ws[ref].s = style;
            });

            // ── Create workbook and save ────────────────────────────────
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, firmaLabel);
            const filename = `Abrechnung_${firmaLabel.replace(/\s/g, '_')}_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, filename);
        };

        function BillingPanel({ finishedEntries, onClose, appId, calEntries }) {
            const [activeTab, setActiveTab] = useState('PE');
            const [selected, setSelected] = useState(new Set());
            const [pdfLoading, setPdfLoading] = useState(false);
            const [billingData, setBillingData] = useState({});
            const [searchBilling, setSearchBilling] = useState('');
            const [billingView, setBillingView] = useState('offen'); // 'offen' | 'archiv'

            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                const unsub = onSnapshot(collection(db,'artifacts',appId,'public','data','billing'), (snap) => {
                    const data = {}; snap.docs.forEach(d => { data[d.id] = d.data(); }); setBillingData(data);
                });
                return () => unsub();
            }, [appId]);

            const getBilledIds = () => {
                const ids = new Set();
                Object.entries(billingData).forEach(([id,d]) => {
                    if (activeTab==='PE'&&d.PE) ids.add(id);
                    if (activeTab==='FA'&&d.FA) ids.add(id);
                });
                return ids;
            };
            const billedIds = getBilledIds();

            const toggleSelect = (id) => setSelected(prev => { const next=new Set(prev); if(next.has(id)) next.delete(id); else next.add(id); return next; });
            const selectAll = () => setSelected(new Set(finishedEntries.filter(e=>!billedIds.has(e.id)).map(e=>e.id)));
            const clearSelection = () => setSelected(new Set());

            const markAsAbgerechnet = async () => {
                if (selected.size===0) return;
                const { db, doc, setDoc } = window.FirebaseSDK;
                const now = new Date().toISOString();
                for (const id of selected) {
                    const existing = billingData[id]||{};
                    await setDoc(doc(db,'artifacts',appId,'public','data','billing',id), {...existing,[activeTab]:true,[`${activeTab}date`]:now});
                }
                setSelected(new Set());
            };

            const unmarkAbgerechnet = async (id) => {
                if (!window.confirm('Abgerechnet-Markierung entfernen?')) return;
                const { db, doc, setDoc } = window.FirebaseSDK;
                const existing = billingData[id]||{};
                await setDoc(doc(db,'artifacts',appId,'public','data','billing',id), {...existing,[activeTab]:false,[`${activeTab}date`]:null});
            };

            const deleteFinishedEntry = async (entry) => {
                if (!window.confirm(`Auftrag "${entry.address}" wirklich löschen?`)) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db,'artifacts',appId,'public','data','finishedjobs',entry.id));
                try { await deleteDoc(doc(db,'artifacts',appId,'public','data','billing',entry.id)); } catch(e) {}
            };

            const exportPDF = async () => {
                if (!window.jspdf) { alert('PDF-Bibliothek nicht geladen.'); return; }
                setPdfLoading(true);
                try { await generateBillingPDF(finishedEntries, activeTab, billedIds); }
                catch(e) { alert('PDF Fehler: '+e.message); }
                finally { setPdfLoading(false); }
            };

            const exportExcel = () => {
                try {
                    // Memo + Abrechnen-Status aus calEntries nachladen
                    const enriched = finishedEntries.map(entry => {
                        const calList = calEntries || [];
                        const entryAufnr = cleanAuftragsNr(entry.auftragsNr || '');
                        const entryAddr = (entry.address || '').trim().toLowerCase();
                        const match = calList.find(c => {
                            const cAufnr = cleanAuftragsNr(c.auftragsNr || '');
                            const cAddr = (c.address || '').trim().toLowerCase();
                            return (entryAufnr && cAufnr && entryAufnr === cAufnr) || (entryAddr && cAddr && entryAddr === cAddr);
                        });
                        const billingStatus = (match && match.billingStatus) ? match.billingStatus : (entry.billingStatus || null);
                        const memo = entry.memo || (match ? (match.memo || '') : '');
                        return {...entry, memo, billingStatus};
                    });
                    generateBillingExcel(enriched, activeTab, billedIds);
                }
                catch(e) { alert('Excel Fehler: '+e.message); }
            };

            const firmaLabel = activeTab==='PE'?'PE-Fabrikation':'FA-Bauservice';
            const firmaColor = activeTab==='PE'?'#3b82f6':'#f59e0b';
            const firmaColorBg = activeTab==='PE'?'rgba(59,130,246,0.12)':'rgba(245,158,11,0.12)';
            const firmaBorder = activeTab==='PE'?'rgba(59,130,246,0.35)':'rgba(245,158,11,0.35)';
            const unbilledCount = finishedEntries.filter(e=>!billedIds.has(e.id)).length;
            const billedCount = finishedEntries.filter(e=>billedIds.has(e.id)).length;
            const baseList = billingView==='archiv'
                ? finishedEntries.filter(e=>billedIds.has(e.id))
                : finishedEntries.filter(e=>!billedIds.has(e.id));
            const filteredFinished = searchBilling.trim().length < 1 ? baseList : baseList.filter(e => {
                const q = searchBilling.toLowerCase();
                return (e.customer||'').toLowerCase().includes(q) || (e.address||'').toLowerCase().includes(q) || (e.auftragsNr||'').toLowerCase().includes(q);
            });

            return (
                <div style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(10,15,28,0.92)', backdropFilter:'blur(6px)', display:'flex', alignItems:'flex-start', justifyContent:'center', padding:'16px', overflowY:'auto' }}>
                    {pdfLoading && <div className="pdf-loading-overlay" style={{zIndex:300}}><div className="pdf-spinner"></div><div style={{color:'#fff',fontSize:13,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>PDF wird erstellt...</div></div>}
                    <div style={{ width:'100%', maxWidth:680, background:'#1a2234', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, overflow:'hidden', marginTop:8, boxShadow:'0 30px 80px rgba(0,0,0,0.7)' }}>
                        <div style={{ background:'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)', borderBottom:'1px solid rgba(255,255,255,0.08)', padding:'18px 22px 0 22px' }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
                                <div>
                                    <div style={{ fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2, color:'#64748b', marginBottom:4 }}>Abrechnungsliste</div>
                                    <h2 style={{ color:'#fff', fontSize:18, fontWeight:900, fontStyle:'italic', margin:0, textTransform:'uppercase' }}>Fertig Montiert</h2>
                                    <div style={{ fontSize:9, color:'#64748b', marginTop:3 }}>{finishedEntries.length} Aufträge &nbsp;•&nbsp; <span style={{color:'#10b981'}}>{billedCount} Abgerechnet</span> &nbsp;•&nbsp; <span style={{color:'#f59e0b'}}>{unbilledCount} Offen</span></div>
                                </div>
                                <button onClick={onClose} style={{ background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#94a3b8' }}><Icon name="x" size={16}/></button>
                            </div>
                            <div style={{ display:'flex', borderTop:'1px solid rgba(255,255,255,0.06)' }}>
                                <button className={`billing-tab ${activeTab==='PE'?'active-pe':''}`} onClick={()=>{setActiveTab('PE');setSelected(new Set());setSearchBilling('');}}>🔵 PE-Fabrikation</button>
                                <button className={`billing-tab ${activeTab==='FA'?'active-fa':''}`} onClick={()=>{setActiveTab('FA');setSelected(new Set());setSearchBilling('');}}>🟡 FA-Bauservice</button>
                            </div>
                        </div>
                        <div style={{ margin:'14px 22px 0 22px', padding:'10px 14px', background:firmaColorBg, border:`1px solid ${firmaBorder}`, borderRadius:10, display:'flex', alignItems:'center', gap:10 }}>
                            <div style={{ width:36, height:36, borderRadius:'50%', background:firmaColor, opacity:0.9, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:900, color:'#fff' }}>{activeTab}</div>
                            <div>
                                <div style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase' }}>{firmaLabel}</div>
                                <div style={{ color:'#94a3b8', fontSize:9, marginTop:1 }}>Unabhängige Abrechnung · {billedCount} abgerechnet</div>
                            </div>
                        </div>
                        <div style={{ display:'flex', gap:8, padding:'12px 22px 0 22px' }}>
                            <button onClick={()=>{setBillingView('offen');setSelected(new Set());}} style={{ flex:1, padding:'9px', borderRadius:10, border:`1px solid ${billingView==='offen'?firmaColor:'rgba(255,255,255,0.12)'}`, background:billingView==='offen'?firmaColorBg:'transparent', color:billingView==='offen'?firmaColor:'#94a3b8', fontSize:10, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>📂 Offen ({unbilledCount})</button>
                            <button onClick={()=>{setBillingView('archiv');setSelected(new Set());}} style={{ flex:1, padding:'9px', borderRadius:10, border:`1px solid ${billingView==='archiv'?'#10b981':'rgba(255,255,255,0.12)'}`, background:billingView==='archiv'?'rgba(16,185,129,0.12)':'transparent', color:billingView==='archiv'?'#10b981':'#94a3b8', fontSize:10, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>🗄 Archiv ({billedCount})</button>
                        </div>
                        <div style={{ display:'flex', gap:8, padding:'12px 22px', borderBottom:'1px solid rgba(255,255,255,0.06)', flexWrap:'wrap' }}>
                            {billingView==='offen' && (<>
                            <button onClick={selectAll} style={{ padding:'7px 14px', background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, color:'#cbd5e1', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Alle wählen ({unbilledCount})</button>
                            {selected.size>0 && (<>
                                <button onClick={clearSelection} style={{ padding:'7px 14px', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:8, color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Aufheben</button>
                                <button onClick={markAsAbgerechnet} style={{ padding:'7px 16px', background:'#10b981', border:'none', borderRadius:8, color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}><Icon name="check-circle" size={13}/>{selected.size} ABGERECHNET</button>
                            </>)}
                            </>)}
                            <button onClick={exportPDF} style={{ padding:'7px 14px', background:activeTab==='PE'?'rgba(59,130,246,0.2)':'rgba(245,158,11,0.2)', border:`1px solid ${firmaBorder}`, borderRadius:8, color:firmaColor, fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6, marginLeft:'auto' }}><Icon name="download" size={13}/>PDF</button>
                            <button onClick={exportExcel} style={{ padding:'7px 14px', background:'rgba(16,185,129,0.18)', border:'1px solid rgba(16,185,129,0.45)', borderRadius:8, color:'#10b981', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}><Icon name="table" size={13}/>EXCEL</button>
                        </div>
                        <div style={{ padding:'0 22px 10px 22px' }}>
                            <div style={{ position:'relative' }}>
                                <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', fontSize:14 }}>🔍</div>
                                <input
                                    type="text"
                                    value={searchBilling}
                                    onChange={e=>setSearchBilling(e.target.value)}
                                    placeholder="Suche nach Kunde, Adresse, Auftragsnr. ..."
                                    style={{ width:'100%', padding:'9px 36px 9px 36px', background:'#0f172a', border:`1px solid ${firmaBorder}`, borderRadius:10, color:'#fff', fontSize:11, fontWeight:600, boxSizing:'border-box', outline:'none' }}
                                />
                                {searchBilling && (
                                    <button onClick={()=>setSearchBilling('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'#64748b', fontSize:16, lineHeight:1, padding:0 }}>✕</button>
                                )}
                            </div>
                            {searchBilling.trim() && (
                                <div style={{ fontSize:9, color:'#64748b', marginTop:5, fontWeight:700 }}>
                                    {filteredFinished.length} von {baseList.length} Aufträgen
                                </div>
                            )}
                        </div>
                        <div style={{ maxHeight:'52vh', overflowY:'auto', padding:'8px 22px 22px 22px' }}>
                            {finishedEntries.length===0 ? (
                                <div style={{ textAlign:'center', padding:'48px 0', color:'#475569' }}><div style={{fontSize:36,marginBottom:10}}>✓</div><div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Keine fertig montierten Aufträge</div></div>
                            ) : filteredFinished.length===0 ? (
                                <div style={{ textAlign:'center', padding:'48px 0', color:'#475569' }}>
                                    {searchBilling.trim() ? (
                                        <><div style={{fontSize:32,marginBottom:8}}>🔍</div><div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Keine Treffer für „{searchBilling}"</div></>
                                    ) : billingView==='archiv' ? (
                                        <><div style={{fontSize:32,marginBottom:8}}>🗄</div><div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Archiv ist leer</div></>
                                    ) : (
                                        <><div style={{fontSize:32,marginBottom:8}}>✓</div><div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Keine offenen Aufträge</div></>
                                    )}
                                </div>
                            ) : (
                                <div style={{ display:'flex', flexDirection:'column', gap:8, paddingTop:8 }}>
                                    {filteredFinished.map((entry) => {
                                        const isAbgerechnet = billedIds.has(entry.id);
                                        const isSelected = selected.has(entry.id);
                                        const billedDate = billingData[entry.id]?.[`${activeTab}date`];
                                        const aufnrClean = cleanAuftragsNr(entry.auftragsNr||'');
                                        return (
                                            <div key={entry.id} onClick={()=>!isAbgerechnet&&toggleSelect(entry.id)} style={{ position:'relative', background:isAbgerechnet?'rgba(16,185,129,0.07)':isSelected?(activeTab==='PE'?'rgba(59,130,246,0.15)':'rgba(245,158,11,0.15)'):'rgba(255,255,255,0.04)', border:isAbgerechnet?'1px solid rgba(16,185,129,0.3)':isSelected?`1px solid ${firmaColor}`:'1px solid rgba(255,255,255,0.07)', borderRadius:12, padding:'12px 14px', cursor:isAbgerechnet?'default':'pointer', overflow:'hidden' }}>
                                                {isAbgerechnet && <div className="abgerechnet-stamp">✓ Abgerechnet</div>}
                                                <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>
                                                    {!isAbgerechnet && <div style={{ width:20, height:20, borderRadius:6, border:isSelected?`2px solid ${firmaColor}`:'2px solid rgba(255,255,255,0.2)', background:isSelected?firmaColor:'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2 }}>{isSelected&&<Icon name="check" size={12} className="text-white"/>}</div>}
                                                    {isAbgerechnet && <div style={{ width:20, height:20, borderRadius:6, background:'rgba(16,185,129,0.3)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2 }}><Icon name="check" size={12} className="text-emerald-400"/></div>}
                                                    <div style={{ flex:1, minWidth:0 }}>
                                                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                                                            <div style={{ minWidth:0 }}>
                                                                <div style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', opacity:isAbgerechnet?0.5:1 }}>{entry.address}</div>
                                                                <div style={{ color:'#60a5fa', fontSize:9, fontWeight:700, textTransform:'uppercase', marginTop:2, opacity:isAbgerechnet?0.5:1 }}>{entry.customer}</div>
                                                                {aufnrClean && <div style={{ marginTop:4, display:'inline-block', background:isAbgerechnet?'rgba(16,185,129,0.1)':(activeTab==='PE'?'rgba(59,130,246,0.15)':'rgba(245,158,11,0.15)'), border:`1px solid ${isAbgerechnet?'rgba(16,185,129,0.3)':firmaBorder}`, borderRadius:6, padding:'2px 8px', color:isAbgerechnet?'#10b981':firmaColor, fontSize:10, fontWeight:900, opacity:isAbgerechnet?0.6:1 }}>#{aufnrClean}</div>}
                                                            </div>
                                                            <div style={{ flexShrink:0, textAlign:'right', display:'flex', flexDirection:'column', gap:4, alignItems:'flex-end' }}>
                                                                <div style={{ fontSize:9, fontWeight:900, textTransform:'uppercase', color:isAbgerechnet?'#10b981':'#22c55e', background:isAbgerechnet?'rgba(16,185,129,0.12)':'rgba(34,197,94,0.1)', border:`1px solid ${isAbgerechnet?'rgba(16,185,129,0.4)':'rgba(34,197,94,0.3)'}`, borderRadius:6, padding:'2px 7px' }}>{isAbgerechnet?'✓ Abgerechnet':'✓ Fertig'}</div>
                                                                {entry.finishedAt && <div style={{ color:'#475569', fontSize:8 }}>{formatDate(entry.finishedAt)}</div>}
                                                                <button onClick={(e)=>{e.stopPropagation();deleteFinishedEntry(entry);}} style={{ background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:6, padding:'3px 8px', color:'#f87171', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><Icon name="trash-2" size={10}/>Löschen</button>
                                                            </div>
                                                        </div>
                                                        {isAbgerechnet && billedDate && (
                                                            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8, paddingTop:7, borderTop:'1px solid rgba(16,185,129,0.15)' }}>
                                                                <div style={{ fontSize:8, color:'#10b981', fontWeight:700 }}>Abgerechnet am {formatDate(billedDate)} ({firmaLabel})</div>
                                                                <button onClick={(e)=>{e.stopPropagation();unmarkAbgerechnet(entry.id);}} style={{ background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:6, padding:'2px 8px', color:'#f87171', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Rückgängig</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                        {selected.size>0 && (
                            <div style={{ borderTop:'1px solid rgba(255,255,255,0.08)', padding:'12px 22px', background:activeTab==='PE'?'rgba(59,130,246,0.1)':'rgba(245,158,11,0.1)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                                <div style={{ fontSize:10, color:'#94a3b8', fontWeight:700 }}><span style={{color:firmaColor,fontWeight:900}}>{selected.size}</span> ausgewählt</div>
                                <button onClick={markAsAbgerechnet} style={{ padding:'9px 20px', background:'#10b981', border:'none', borderRadius:10, color:'#fff', fontSize:10, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}><Icon name="stamp" size={14}/>ABGERECHNET</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function GlobalSearchModal({ calEntries, onClose, onJumpToEntry }) {
            const [query, setQuery] = useState('');
            const inputRef = useRef(null);
            useEffect(() => { setTimeout(()=>inputRef.current?.focus(),100); }, []);
            const results = useMemo(() => {
                if (!query.trim()||query.length<2) return [];
                const q = query.toLowerCase();
                return calEntries.filter(e=>(e.customer||'').toLowerCase().includes(q)||(e.address||'').toLowerCase().includes(q)||(e.auftragsNr||'').toLowerCase().includes(q)||(e.memo||'').toLowerCase().includes(q)).sort((a,b)=>(b.deliveryDate||'').localeCompare(a.deliveryDate||''));
            }, [query, calEntries]);

            return (
                <div style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(7,9,15,0.95)', backdropFilter:'blur(8px)', display:'flex', flexDirection:'column', alignItems:'center', padding:'60px 16px 16px' }}>
                    <div style={{ width:'100%', maxWidth:580 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                            <div><div style={{ fontSize:9, color:'#64748b', fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>Globale Suche</div><div style={{ color:'#fff', fontSize:16, fontWeight:900, fontStyle:'italic' }}>Alle Kalender-Aufträge</div></div>
                            <button onClick={onClose} style={{ background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#94a3b8' }}><Icon name="x" size={16}/></button>
                        </div>
                        <div style={{ position:'relative', marginBottom:16 }}>
                            <div style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}><Icon name="search" size={18} className="text-blue-400"/></div>
                            <input ref={inputRef} type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Kunde, Adresse, Auftragsnr. ..." style={{ width:'100%', padding:'14px 14px 14px 44px', background:'#1e293b', border:'2px solid #3b82f6', borderRadius:14, color:'#fff', fontSize:14, fontWeight:600, boxSizing:'border-box', outline:'none' }}/>
                            {query && <button onClick={()=>setQuery('')} style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'#64748b' }}><Icon name="x" size={16}/></button>}
                        </div>
                        <div style={{ maxHeight:'calc(100vh - 220px)', overflowY:'auto' }}>
                            {query.length<2 ? (
                                <div style={{ textAlign:'center', padding:'40px 0', color:'#475569' }}><Icon name="search" size={32} className="text-slate-600"/><div style={{marginTop:12,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Mindestens 2 Zeichen eingeben</div></div>
                            ) : results.length===0 ? (
                                <div style={{ textAlign:'center', padding:'40px 0', color:'#475569' }}><div style={{fontSize:32,marginBottom:8}}>🔍</div><div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Keine Treffer</div></div>
                            ) : (
                                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                                    <div style={{ fontSize:9, color:'#64748b', fontWeight:900, textTransform:'uppercase', letterSpacing:1, paddingBottom:4 }}>{results.length} Treffer</div>
                                    {results.map(entry => {
                                        const aufnr = cleanAuftragsNr(entry.auftragsNr||'');
                                        const startDate = entry.deliveryDate?entry.deliveryDate.substring(0,10):null;
                                        const endDate = entry.endDate?entry.endDate.substring(0,10):startDate;
                                        const isMultiDay = endDate&&startDate&&endDate!==startDate;
                                        return (
                                            <div key={entry.id} onClick={()=>onJumpToEntry(entry)} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'12px 14px', cursor:'pointer' }} onMouseEnter={e=>e.currentTarget.style.background='rgba(59,130,246,0.1)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.04)'}>
                                                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                                                    <div style={{ flex:1, minWidth:0 }}>
                                                        <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', marginBottom:3 }}>{entry.customer}</div>
                                                        <div style={{ color:'#94a3b8', fontSize:10, marginBottom:4 }}>{entry.address}</div>
                                                        {aufnr && <div style={{ display:'inline-block', background:'rgba(59,130,246,0.15)', border:'1px solid rgba(59,130,246,0.3)', borderRadius:5, padding:'2px 7px', color:'#60a5fa', fontSize:9, fontWeight:900 }}>#{aufnr}</div>}
                                                    </div>
                                                    <div style={{ flexShrink:0, textAlign:'right' }}>
                                                        <div style={{ color:'#60a5fa', fontSize:10, fontWeight:900 }}>KW {startDate?getWeekNumber(new Date(startDate)):'?'}</div>
                                                        <div style={{ color:'#64748b', fontSize:8, marginTop:2 }}>{startDate?formatDate(startDate):'—'}{isMultiDay&&<span style={{color:'#f59e0b'}}> → {formatDate(endDate)}</span>}</div>
                                                    </div>
                                                </div>
                                                <div style={{ marginTop:8, display:'flex', alignItems:'center', gap:6 }}><Icon name="arrow-right" size={12} className="text-blue-400"/><span style={{color:'#60a5fa',fontSize:9,fontWeight:700}}>Zur KW springen</span></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function StandbyView({ appId, onBack }) {
            const [items, setItems] = useState([]);
            const [search, setSearch] = useState('');
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState('');
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [expandedMonths, setExpandedMonths] = useState(new Set());
            const [showAddModal, setShowAddModal] = useState(false);
            const [newItem, setNewItem] = useState({ customer:'', address:'', memo:'', auftragsNr:'', target:'', deliveryDate: toLocalDateStr(new Date()) });

            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                const unsub = onSnapshot(collection(db,'artifacts',appId,'public','data','standby_items'), (snap) => {
                    const data = snap.docs.map(d=>({id:d.id,...d.data()}));
                    data.sort((a,b)=>(a.deliveryDate||'').localeCompare(b.deliveryDate||''));
                    setItems(data);
                    setExpandedMonths(new Set(data.map(i=>(i.deliveryDate||'').substring(0,7))));
                });
                return ()=>unsub();
            }, [appId]);

            const grouped = useMemo(() => {
                const q = search.toLowerCase();
                const filtered = search ? items.filter(i=>(i.customer||'').toLowerCase().includes(q)||(i.address||'').toLowerCase().includes(q)||(i.auftragsNr||'').toLowerCase().includes(q)) : items;
                const map = {};
                filtered.forEach(item => { const k=(item.deliveryDate||'????-??').substring(0,7); if(!map[k]) map[k]=[]; map[k].push(item); });
                return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
            }, [items, search]);

            const getMonthLabel = (key) => {
                if (!key||key==='????-??') return 'Kein Datum';
                const [y,m] = key.split('-');
                return `${MONTH_NAMES_DE[parseInt(m)-1]||m} ${y}`;
            };

            const toggleMonth = (key) => setExpandedMonths(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});
            const toggleItem = (id) => setSelectedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
            const toggleMonthSelect = (monthKey, monthItems) => {
                const allSelected = monthItems.every(i=>selectedIds.has(i.id));
                setSelectedIds(prev=>{const n=new Set(prev);if(allSelected) monthItems.forEach(i=>n.delete(i.id)); else monthItems.forEach(i=>n.add(i.id));return n;});
            };
            const deleteSelected = async () => {
                if (selectedIds.size===0) return;
                if (!window.confirm(`${selectedIds.size} Aufträge löschen?`)) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                for (const id of selectedIds) await deleteDoc(doc(db,'artifacts',appId,'public','data','standby_items',id));
                setSelectedIds(new Set());
            };
            const deleteMonth = async (monthKey, monthItems) => {
                if (!window.confirm(`Alle ${monthItems.length} Aufträge aus ${getMonthLabel(monthKey)} löschen?`)) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                for (const item of monthItems) await deleteDoc(doc(db,'artifacts',appId,'public','data','standby_items',item.id));
            };
            const deleteItem = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db,'artifacts',appId,'public','data','standby_items',id));
                setSelectedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
            };
            const processImport = async () => {
                if (!importText.trim()) return;
                const lines = importText.split(/\r?\n/);
                const newEntries = [];
                const KNOWN_TYPES = ['LIEFERUNG','MONTAGE','DEMONTAGE','ABHOLUNG','BEPLANKUNG','AUSFLOCKEN','GIPSER','SERVICE','ABNAHME','RETOURE'];
                let currentDate = toLocalDateStr(new Date());
                for (const line of lines) {
                    const t = line.trim();
                    if (!t) continue;
                    const dateMatchDE = t.match(/^(?:Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)?\s*(\d{2})\.(\d{2})\.(\d{4})/i);
                    const dateMatchISO = t.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                    if (dateMatchDE&&!t.includes('/')) { const [,d,m,y]=dateMatchDE; currentDate=`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; continue; }
                    if (dateMatchISO) { currentDate=t; continue; }
                    if (!t.includes('/')) continue;
                    const parts = t.split('/').map(p=>p.trim());
                    let customer,address,memo,auftragsNrRaw;
                    const firstUpper = parts[0].toUpperCase();
                    if (KNOWN_TYPES.includes(firstUpper)) { customer=parts[1]||''; address=parts[2]||''; memo=parts[3]||''; auftragsNrRaw=parts.slice(4).join('/').trim(); }
                    else { customer=parts[0]||''; address=parts[1]||''; memo=parts[2]||''; auftragsNrRaw=parts.slice(3).join('/').trim(); }
                    if (!customer) continue;
                    const auftragsNr = cleanAuftragsNr(auftragsNrRaw);
                    const eleMatch = (memo+' '+auftragsNr).match(/(\d+)\s*ELE/i);
                    const id = `sb-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                    newEntries.push({ id, customer, address, memo, auftragsNr, target:eleMatch?parseInt(eleMatch[1]):0, deliveryDate:currentDate, createdAt:new Date().toISOString() });
                }
                if (newEntries.length===0) { alert('Keine Aufträge erkannt.'); return; }
                const { db, doc, setDoc } = window.FirebaseSDK;
                for (const e of newEntries) await setDoc(doc(db,'artifacts',appId,'public','data','standby_items',e.id), e);
                setImportText(''); setShowImport(false);
                alert(`${newEntries.length} Aufträge in Standby importiert!`);
            };
            const addManualItem = async () => {
                if (!newItem.customer) return;
                const { db, doc, setDoc } = window.FirebaseSDK;
                const id = `sb-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                await setDoc(doc(db,'artifacts',appId,'public','data','standby_items',id), {...newItem,id,target:parseInt(newItem.target)||0,createdAt:new Date().toISOString()});
                setNewItem({customer:'',address:'',memo:'',auftragsNr:'',target:'',deliveryDate:toLocalDateStr(new Date())});
                setShowAddModal(false);
            };
            const totalCount = grouped.reduce((s,[,items])=>s+items.length,0);

            return (
                <div style={{ minHeight:'100vh', background:'#0f172a', display:'flex', flexDirection:'column' }}>
                    <div style={{ background:'#1e293b', padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #334155', position:'sticky', top:0, zIndex:40 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                            <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}><Icon name="arrow-left" size={16} className="text-blue-400"/></button>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>STANDBY POOL</div>
                                <div style={{ color:'#fff', fontSize:14, fontWeight:900 }}>{totalCount} Aufträge</div>
                            </div>
                        </div>
                        <div style={{ display:'flex', gap:8 }}>
                            {selectedIds.size>0 && <button onClick={deleteSelected} style={{ background:'rgba(239,68,68,0.2)', border:'1px solid rgba(239,68,68,0.4)', borderRadius:8, padding:'6px 14px', color:'#f87171', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}><Icon name="trash-2" size={12}/>{selectedIds.size} Löschen</button>}
                            <button onClick={()=>setShowAddModal(true)} style={{ background:'#10b981', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><Icon name="plus" size={12}/>Manuell</button>
                            <button onClick={()=>setShowImport(true)} style={{ background:'#f59e0b', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><Icon name="upload" size={12}/>Import</button>
                        </div>
                    </div>
                    <div style={{ padding:'10px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Suchen..." style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:10, padding:'9px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                    </div>
                    <div style={{ flex:1, overflowY:'auto', padding:'12px 16px', display:'flex', flexDirection:'column', gap:12 }}>
                        {grouped.length===0 && <div style={{ textAlign:'center', padding:'48px 0', color:'#475569' }}><div style={{fontSize:36,marginBottom:8}}>📦</div><div style={{fontSize:12,fontWeight:700,textTransform:'uppercase'}}>{search?'Keine Treffer':'Standby ist leer'}</div></div>}
                        {grouped.map(([monthKey, monthItems]) => {
                            const isExpanded = expandedMonths.has(monthKey);
                            const allSelected = monthItems.length>0&&monthItems.every(i=>selectedIds.has(i.id));
                            const someSelected = monthItems.some(i=>selectedIds.has(i.id));
                            return (
                                <div key={monthKey}>
                                    <div className="standby-month-header" onClick={()=>toggleMonth(monthKey)}>
                                        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                                            <div style={{ width:8, height:8, borderRadius:'50%', background:'#f59e0b' }}></div>
                                            <span style={{ color:'#f59e0b', fontSize:12, fontWeight:900, textTransform:'uppercase' }}>{getMonthLabel(monthKey)}</span>
                                            <span style={{ background:'rgba(245,158,11,0.2)', color:'#f59e0b', borderRadius:20, padding:'1px 8px', fontSize:9, fontWeight:900 }}>{monthItems.length}</span>
                                            {someSelected && <span style={{ background:'rgba(239,68,68,0.2)', color:'#f87171', borderRadius:20, padding:'1px 8px', fontSize:9, fontWeight:900 }}>{monthItems.filter(i=>selectedIds.has(i.id)).length} markiert</span>}
                                        </div>
                                        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                                            <button onClick={e=>{e.stopPropagation();toggleMonthSelect(monthKey,monthItems);}} style={{ background:'rgba(245,158,11,0.15)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:6, padding:'3px 8px', color:'#f59e0b', fontSize:8, fontWeight:900, cursor:'pointer', textTransform:'uppercase' }}>{allSelected?'Alle ab':'Alle'}</button>
                                            <button onClick={e=>{e.stopPropagation();deleteMonth(monthKey,monthItems);}} style={{ background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:6, padding:'3px 8px', color:'#f87171', fontSize:8, fontWeight:900, cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}><Icon name="trash-2" size={10}/>Löschen</button>
                                            <div style={{ color:'#f59e0b', fontSize:12 }}>{isExpanded?'▲':'▼'}</div>
                                        </div>
                                    </div>
                                    {isExpanded && (
                                        <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:4 }}>
                                            {monthItems.map(item => {
                                                const isSelected = selectedIds.has(item.id);
                                                const aufnr = cleanAuftragsNr(item.auftragsNr||'');
                                                return (
                                                    <div key={item.id} className={`standby-item-row${isSelected?' selected':''}`}>
                                                        <div onClick={()=>toggleItem(item.id)} style={{ width:18, height:18, borderRadius:5, border:`2px solid ${isSelected?'#f59e0b':'rgba(255,255,255,0.2)'}`, background:isSelected?'#f59e0b':'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, cursor:'pointer', marginTop:2 }}>
                                                            {isSelected && <span style={{color:'#fff',fontSize:10,fontWeight:900}}>✓</span>}
                                                        </div>
                                                        <div style={{ flex:1, minWidth:0 }}>
                                                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                                                                <div style={{ flex:1, minWidth:0 }}>
                                                                    <div style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', marginBottom:2 }}>{item.customer}</div>
                                                                    {item.address && <div style={{ color:'#94a3b8', fontSize:10 }}>{item.address}</div>}

            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                const unsub = onSnapshot(collection(db,'artifacts',appId,'public','data','standby_items'), (snap) => {
                    const data = snap.docs.map(d=>({id:d.id,...d.data()}));
                    data.sort((a,b)=>(a.deliveryDate||'').localeCompare(b.deliveryDate||''));
                    setItems(data);
                    setExpandedMonths(new Set(data.map(i=>(i.deliveryDate||'').substring(0,7))));
                });
                return ()=>unsub();
            }, [appId]);

            const grouped = useMemo(() => {
                const q = search.toLowerCase();
                const filtered = search ? items.filter(i=>(i.customer||'').toLowerCase().includes(q)||(i.address||'').toLowerCase().includes(q)) : items;
                const map = {};
                filtered.forEach(item=>{const k=(item.deliveryDate||'????-??').substring(0,7);if(!map[k]) map[k]=[];map[k].push(item);});
                return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
            }, [items, search]);

            const getMonthLabel = (key) => {
                if (!key||key==='????-??') return 'Kein Datum';

                return `${MONTH_NAMES_DE[parseInt(m)-1]||m} ${y}`;

                                {selectedItem.address && <div style={{ color:'#94a3b8', fontSize:11, marginTop:2 }}>{selectedItem.address}</div>}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Von</div>
                                    <input type="date" value={startDate} onChange={e=>{setStartDate(e.target.value);if(endDate<e.target.value)setEndDate(e.target.value);}} style={{ width:'100%', background:'#0f172a', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#f59e0b', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Bis (optional)</div>
                                    <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} min={startDate} style={{ width:'100%', background:'#0f172a', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                            </div>
                            {endDate>startDate && <div style={{ background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, padding:'8px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>📅 {daysBetween(startDate,endDate)} Tage Auftrag</div>}
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                                <button onClick={()=>setSelectedItem(null)} style={{ padding:'12px', background:'transparent', border:'1px solid #334155', borderRadius:10, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>← Zurück</button>
                                <button onClick={()=>onInsert(selectedItem,startDate,endDate)} style={{ padding:'12px', background:'#f59e0b', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>✓ Einfügen</button>
                            </div>

                        <div><div style={{ color:'#f59e0b', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>📦 Standby — Auftrag auswählen</div></div>
                        <button onClick={onClose} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                    </div>
                    <div style={{ padding:'10px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Suchen..." autoFocus style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'9px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                    </div>
                    <div style={{ flex:1, overflowY:'auto', padding:'10px 16px', display:'flex', flexDirection:'column', gap:10 }}>
                        {grouped.length===0 && <div style={{ textAlign:'center', padding:'40px 0', color:'#475569' }}><div style={{fontSize:28,marginBottom:8}}>📦</div><div style={{fontSize:11,fontWeight:700}}>Standby ist leer</div></div>}
                        {grouped.map(([monthKey, monthItems]) => {
                            const isExpanded = expandedMonths.has(monthKey);
                            return (
                                <div key={monthKey}>
