<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Montage Manager Pro Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD25cVhiguQKP4PTD8evGI4CxSh7rglbBs",
            authDomain: "montage-pe-a5f79.firebaseapp.com",
            projectId: "montage-pe-a5f79",
            storageBucket: "montage-pe-a5f79.firebasestorage.app",
            messagingSenderId: "588324363042",
            appId: "1:588324363042:web:c544a07261f62de427237b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseSDK = { db, auth, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, addDoc, getDocs, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        :root { 
            --primary: #60a5fa; 
            --bg-main: #1e293b; 
            --card-bg: #334155;
            --accent: #38bdf8;
        }
        body { 
            overscroll-behavior-y: contain; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased; 
        }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(51, 65, 85, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: #334155; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .page-transition { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        .badge-pulse { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
            50% { box-shadow: 0 0 15px 5px rgba(56, 189, 248, 0.3); background-color: rgba(56, 189, 248, 0.4); border-color: rgba(56, 189, 248, 1); } 
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
        }
        
        #print-area { display: none; }
        
        .pdf-image-container {
            width: 100%;
            page-break-after: always;
            text-align: center;
            padding-top: 20px;
        }
        .pdf-image-container img {
            max-width: 100%;
            height: auto;
            max-height: 800px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo } = React;

        const translations = {
            de: { partial: "Offen zum montieren", finished: "Fertig montiert", blocked: "Blockiert / Problem", hours: "Stunden erfassen", openItems: "Offen?", reason: "Grund...", submit: "Senden", cancel: "Abbrechen", placeholderNum: "Zahl...", back: "Zurück", search: "Suchen..." },
            sq: { partial: "Hapur për montim", finished: "Përfunduar", blocked: "Bllokuar", hours: "Regjistro orët", openItems: "Hapur?", reason: "Arsyeja...", submit: "Dërgo", cancel: "Anulo", placeholderNum: "Numri...", back: "Mbrapa", search: "Kërko..." },
            it: { partial: "Aperto per il montaggio", finished: "Finito", blocked: "Bloccato", hours: "Registra ore", openItems: "Aperti?", reason: "Motivo...", submit: "Invia", cancel: "Indietro", placeholderNum: "Num...", back: "Indietro", search: "Cerca..." }
        };

        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide-name', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, nameAttr: 'data-lucide-name' });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;
        });

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return weekNo;
        };

        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";
        const HOURS_PIN = "8888";

        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [workerSearchTerm, setWorkerSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);
            const [editObject, setEditObject] = useState(null); 
            const [importText, setImportText] = useState('');
            const [isImporting, setIsImporting] = useState(false);
            const [selectedObject, setSelectedObject] = useState(null);
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('de');
            const [adminFilter, setAdminFilter] = useState('all'); 
            const [workerStatusMode, setWorkerStatusMode] = useState(''); 
            const [workerRemaining, setWorkerRemaining] = useState('');
            const [workerBlockReason, setWorkerBlockReason] = useState('');
            const [workerHours, setWorkerHours] = useState('');
            const [workerHoursDate, setWorkerHoursDate] = useState(new Date().toISOString().split('T')[0]);
            const [workerHoursName, setWorkerHoursName] = useState('');
            
            const [objects, setObjects] = useState([]);
            const [pendenzen, setPendenzen] = useState([]);
            const [hourLogs, setHourLogs] = useState([]);
            const [monteurs, setMonteurs] = useState([]);
            
            const [showPendenzModal, setShowPendenzModal] = useState(null);
            const [pendenzForm, setPendenzForm] = useState({ description: '', deadline: '', monteur: '', images: [] });
            const [isSubmittingPendenz, setIsSubmittingPendenz] = useState(false);
            const [submitSuccess, setSubmitSuccess] = useState(false);
            
            const [showMyPendenzen, setShowMyPendenzen] = useState(null);
            const [printData, setPrintData] = useState(null);
            const [hourPrintData, setHourPrintData] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date());

            const appId = 'montage-pe-a5f79';
            const t = translations[lang];

            useEffect(() => {
                const initLiveSync = async () => {
                    if (!window.FirebaseSDK) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot, query } = window.FirebaseSDK;
                    try { await signInAnonymously(auth); } catch(e) {}
                    const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'objects'), (s) => setObjects(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen'), (s) => setPendenzen(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'hours'), (s) => setHourLogs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'monteurs'), (s) => setMonteurs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                        }
                    });
                    return () => unsubscribeAuth();
                };
                initLiveSync();
            }, []);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) setPin(newPin);
                else {
                    if (newPin === ADMIN_PIN) setView('dashboard');
                    else if (newPin === WORKER_PIN) setView('worker_list');
                    else if (newPin === HOURS_PIN) setView('hours_admin');
                    setPin('');
                }
            };

            const processTextImport = async () => {
                if (!importText.trim()) return;
                setIsImporting(true);
                const lines = importText.split(/\r?\n/);
                let currentDay = new Date();
                const newObjects = [];
                const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i;

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const dayMatch = trimmed.match(dayRegex);
                    if (dayMatch) {
                        const [_, dName, dStr] = dayMatch;
                        const [d, m, y] = dStr.split('.');
                        currentDay = new Date(y, m - 1, d);
                        continue;
                    }
                    if (trimmed.toUpperCase().startsWith("LIEFERUNG")) {
                        const content = trimmed.replace(/^LIEFERUNG\s*/i, "").trim();
                        const addressRegex = /([A-ZÄÖÜa-zäöüß\s\.\-]+\s\d*[a-z]?,\s\d{4,5}\s[A-ZÄÖÜa-zäöüß\s\.\-]+)/;
                        const addressMatch = content.match(addressRegex);
                        let address = addressMatch ? addressMatch[0].trim() : "Unbekannte Adresse";
                        const parts = content.split(address);
                        let customer = parts[0]?.trim().replace(/,$/, '') || "Kunde";
                        let remainder = parts[1]?.trim() || "";
                        const eleMatch = remainder.match(/(\d+)\s?ELE/i);
                        const houseMatch = remainder.match(/(Haus\s?\d+)/i);
                        const objId = `obj-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
                        newObjects.push({
                            id: objId, name: address, customer, address,
                            houseInfo: houseMatch ? houseMatch[0] : "Gesamtmontage",
                            target: eleMatch ? parseInt(eleMatch[1]) : 1,
                            current: 0, lastRemaining: null, blockReason: null, 
                            deliveryDate: currentDay.toISOString(), status: 'active', history: []
                        });
                    }
                }
                if (newObjects.length > 0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const obj of newObjects) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), obj);
                }
                setIsImporting(false); setImportText(''); setShowImportModal(false);
            };

            const submitWorkerUpdate = async () => {
                const now = new Date().toISOString();
                const { db, doc, updateDoc, addDoc, collection } = window.FirebaseSDK;
                const obj = selectedObject;
                
                if (workerStatusMode === 'hours') {
                    if (!workerHoursName || !workerHours) return;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'hours'), {
                        objectId: obj.id, address: obj.address, monteurName: workerHoursName, hours: parseFloat(workerHours), date: workerHoursDate, createdAt: now
                    });
                } else {
                    let updates = { history: [{ date: now, mode: workerStatusMode, detail: workerStatusMode === 'blocked' ? workerBlockReason : workerRemaining }, ...(obj.history || [])] };
                    if (workerStatusMode === 'finished') updates = { ...updates, current: obj.target, status: 'finished', finishedAt: now, lastRemaining: 0, blockReason: null };
                    else if (workerStatusMode === 'blocked') updates = { ...updates, status: 'blocked', blockReason: workerBlockReason };
                    else if (workerStatusMode === 'partial') {
                        const open = parseInt(workerRemaining) || 0;
                        updates = { ...updates, current: Math.max(0, obj.target - open), status: 'active', lastRemaining: open, blockReason: null };
                    }
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), updates);
                }
                setWorkerStatusMode(''); setWorkerRemaining(''); setWorkerBlockReason(''); setWorkerHours(''); setView('worker_list');
            };

            const saveManualEdit = async () => {
                if (!editObject) return;
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', editObject.id), {
                    address: editObject.address, customer: editObject.customer, houseInfo: editObject.houseInfo, target: parseInt(editObject.target) || 0
                });
                setEditObject(null);
            };

            const deleteObject = async (e, objId) => {
                e.stopPropagation();
                if (!confirm("Möchten Sie dieses Objekt wirklich löschen?")) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', objId));
                } catch (err) {
                    console.error("Fehler beim Löschen des Objekts:", err);
                }
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_WIDTH = 1000; 
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                
                const processed = [];
                for (const file of files) {
                    const base64 = await compressImage(file);
                    processed.push(base64);
                }
                setPendenzForm(prev => ({ ...prev, images: [...prev.images, ...processed] }));
                e.target.value = '';
            };

            const submitPendenz = async (e) => {
                if (e) {
                    if (typeof e.preventDefault === 'function') e.preventDefault();
                    if (typeof e.stopPropagation === 'function') e.stopPropagation();
                }

                if (!pendenzForm.description || !pendenzForm.monteur || !showPendenzModal || isSubmittingPendenz) return;
                
                setIsSubmittingPendenz(true);

                setTimeout(async () => {
                    try {
                        const { db, addDoc, collection } = window.FirebaseSDK;
                        const objectToLink = showPendenzModal;
                        
                        const payload = {
                            objectId: objectToLink.id,
                            address: objectToLink.address,
                            description: pendenzForm.description.trim(),
                            deadline: pendenzForm.deadline || new Date().toISOString().split('T')[0],
                            monteur: pendenzForm.monteur.trim(),
                            images: [...pendenzForm.images],
                            status: 'open',
                            createdAt: new Date().toISOString()
                        };

                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen'), payload);
                        
                        setSubmitSuccess(true);
                        setTimeout(() => {
                            setSubmitSuccess(false);
                            setPendenzForm({ description: '', deadline: '', monteur: '', images: [] });
                            setShowPendenzModal(null);
                            setIsSubmittingPendenz(false);
                        }, 1200);
                    } catch (err) {
                        console.error("Firestore Error Mobile:", err);
                        setIsSubmittingPendenz(false);
                    }
                }, 100);
            };

            const markPendenzDone = async (pId) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pendenzen', pId), { status: 'done', doneAt: new Date().toISOString() });
            };

            const addMonteur = async (name) => {
                if (!name.trim()) return;
                const { db, collection, addDoc } = window.FirebaseSDK;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'monteurs'), { name: name.trim() });
            };

            const deleteMonteur = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'monteurs', id));
            };

            const triggerDownloadPDF = (data) => {
                setPrintData(data);
                setTimeout(() => {
                    const element = document.getElementById('print-area-content');
                    if (!element) return;
                    html2pdf().set({ 
                        margin: [10, 10], 
                        filename: `Pendenz_${data.monteur.replace(/\s+/g, '_')}.pdf`, 
                        image: { type: 'jpeg', quality: 0.98 }, 
                        html2canvas: { scale: 2, useCORS: true }, 
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                    }).from(element).save().then(() => setPrintData(null));
                }, 100);
            };

            const triggerHoursPDF = (summary) => {
                setHourPrintData(summary);
                setTimeout(() => {
                    const element = document.getElementById('hour-print-area-content');
                    if (!element) return;
                    html2pdf().set({ margin: [15, 15], filename: `Stundenbericht_${summary.name}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(element).save().then(() => setHourPrintData(null));
                }, 100);
            };

            const stats = useMemo(() => {
                let total = 0, done = 0, blocked = 0, partial = 0;
                objects.forEach(obj => {
                    total += obj.target; done += obj.current;
                    if (obj.status === 'blocked') blocked++;
                    if (obj.lastRemaining > 0 && obj.status !== 'finished' && obj.status !== 'blocked') partial++;
                });
                return { open: objects.filter(o => o.status === 'active').length, percent: total > 0 ? Math.round((done/total)*100) : 0, blocked, partial, pendenzen: pendenzen.filter(p => p.status === 'open').length };
            }, [objects, pendenzen]);

            const hourSummaries = useMemo(() => {
                const map = {};
                monteurs.forEach(m => {
                    map[m.name] = { 
                        name: m.name, 
                        week: 0, 
                        month: 0, 
                        total: 0, 
                        logs: [], 
                        weekDetails: { 'Mo': 0, 'Di': 0, 'Mi': 0, 'Do': 0, 'Fr': 0, 'Sa': 0 } 
                    };
                });
                
                const now = new Date(selectedDate);
                const dayOfWeek = now.getDay(); 
                const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1); 
                const startOfWeek = new Date(now.setDate(diff));
                startOfWeek.setHours(0,0,0,0);
                
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(endOfWeek.getDate() + 7);

                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                hourLogs.forEach(log => {
                    if (!map[log.monteurName]) {
                        map[log.monteurName] = { name: log.monteurName, week: 0, month: 0, total: 0, logs: [], weekDetails: { 'Mo': 0, 'Di': 0, 'Mi': 0, 'Do': 0, 'Fr': 0, 'Sa': 0 } };
                    }
                    const logDate = new Date(log.date);
                    const h = parseFloat(log.hours) || 0;
                    map[log.monteurName].total += h;
                    map[log.monteurName].logs.push(log);
                    
                    if (logDate >= startOfMonth && logDate <= new Date(now.getFullYear(), now.getMonth() + 1, 0)) map[log.monteurName].month += h;
                    
                    if (logDate >= startOfWeek && logDate < endOfWeek) {
                        map[log.monteurName].week += h;
                        const day = logDate.getDay();
                        const dayLabels = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
                        const label = dayLabels[day];
                        if (label !== 'So' && map[log.monteurName].weekDetails[label] !== undefined) {
                            map[log.monteurName].weekDetails[label] += h;
                        }
                    }
                });
                return Object.values(map);
            }, [hourLogs, monteurs, selectedDate]);

            const filteredObjectsAdmin = useMemo(() => {
                let list = objects;
                if (adminFilter === 'blocked') list = list.filter(o => o.status === 'blocked');
                else if (adminFilter === 'partial') list = list.filter(o => o.lastRemaining > 0 && o.status !== 'finished' && o.status !== 'blocked');
                else if (adminFilter === 'pendenzen') {
                    const idsWithPendenzen = new Set(pendenzen.filter(p => p.status === 'open').map(p => p.objectId));
                    list = list.filter(o => idsWithPendenzen.has(o.id));
                }
                return list.filter(o => o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, adminFilter, searchTerm, pendenzen]);

            const filteredObjectsWorker = useMemo(() => {
                return objects
                    .filter(o => o.status !== 'finished')
                    .filter(o => o.address.toLowerCase().includes(workerSearchTerm.toLowerCase()) || o.customer.toLowerCase().includes(workerSearchTerm.toLowerCase()));
            }, [objects, workerSearchTerm]);

            const activeMonteurs = useMemo(() => {
                const names = new Set();
                pendenzen.filter(p => p.status === 'open').forEach(p => { if (p.monteur) names.add(p.monteur.trim()); });
                return Array.from(names).sort();
            }, [pendenzen]);

            const changeWeek = (direction) => {
                const newDate = new Date(selectedDate);
                newDate.setDate(newDate.getDate() + (direction * 7));
                setSelectedDate(newDate);
            };

            const PrintArea = () => {
                if (!printData) return null;
                return (
                    <div id="print-area">
                        <div id="print-area-content" className="p-10 bg-white text-black font-sans">
                            <h1 className="text-3xl font-black mb-6 uppercase border-b-4 border-black pb-2">Pendenz-Report</h1>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div>
                                    <p className="text-xs uppercase font-bold text-gray-500">Objekt</p>
                                    <p className="text-sm font-bold">{printData.address}</p>
                                </div>
                                <div>
                                    <p className="text-xs uppercase font-bold text-gray-500">Monteur</p>
                                    <p className="text-sm font-bold">{printData.monteur}</p>
                                </div>
                                <div>
                                    <p className="text-xs uppercase font-bold text-gray-500">Frist</p>
                                    <p className="text-sm font-bold">{formatDate(printData.deadline)}</p>
                                </div>
                            </div>
                            <div className="mt-4 border-l-4 border-black pl-4 bg-gray-50 p-4 mb-8">
                                <p className="text-xs uppercase font-bold text-gray-500 mb-1">Mangelbeschreibung</p>
                                <p className="text-lg italic leading-relaxed">{printData.description}</p>
                            </div>
                            {printData.images?.map((img, i) => (
                                <div key={i} className="pdf-image-container">
                                    <p className="text-[10px] text-gray-400 mb-2 uppercase tracking-widest">Foto Dokumentation {i+1}</p>
                                    <img src={img} />

                            <h2 className="text-xl font-bold mb-6">{hourPrintData.name}</h2>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="border p-4"> Woche: <strong>{hourPrintData.week}h</strong> </div>
                                <div className="border p-4"> Monat: <strong>{hourPrintData.month}h</strong> </div>
                            </div>
                            <table className="w-full text-left border-collapse">
                                <thead><tr className="border-b-2 border-black">
                                    <th className="py-2">Datum</th><th className="py-2">Objekt</th><th className="py-2 text-right">Stunden</th>
                                </tr></thead>
                                <tbody>{hourPrintData.logs.sort((a,b) => new Date(b.date) - new Date(a.date)).map((log, i) => (
                                    <tr key={i} className="border-b">
                                        <td className="py-2">{formatDate(log.date)}</td><td className="py-2">{log.address}</td><td className="py-2 text-right">{log.hours}h</td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-800">
                    <div className="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white" /></div>

                    <div className="flex gap-3 mb-10">{[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-400 transition-all ${pin.length > i ? 'bg-blue-400 scale-110' : 'bg-transparent opacity-20'}`} />)}</div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">{n}</button>)}

                        <button onClick={() => handleLogin('0')} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">0</button>
                    </div>
                </div>
            );

            if (view === 'hours_admin') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <HourPrintArea />
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center no-print">
                        <h2 className="text-sm font-black text-white italic uppercase">Stunden Dashboard</h2>
                        <button onClick={() => setView('login')} className="p-2 text-slate-400"><Icon name="log-out" size={18}/></button>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6">
                        <section className="card-gradient p-4 rounded-2xl flex justify-between items-center">
                            <button onClick={() => changeWeek(-1)} className="p-3 bg-slate-900/50 rounded-xl text-blue-400 active:scale-90 transition-transform">
                                <Icon name="chevron-left" size={20} />
                            </button>
                            <div className="text-center">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kalenderwoche</p>
                                <p className="text-lg font-black text-white italic">KW {getWeekNumber(selectedDate)}</p>
                            </div>
                            <button onClick={() => changeWeek(1)} className="p-3 bg-slate-900/50 rounded-xl text-blue-400 active:scale-90 transition-transform">
                                <Icon name="chevron-right" size={20} />
                            </button>
                        </section>
                        <section className="card-gradient p-6 rounded-2xl space-y-4">
                            <h3 className="text-xs font-black text-blue-400 uppercase tracking-widest">Monteure verwalten</h3>

                                <input id="monteur-name-input" type="text" className="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-3 text-xs text-white" placeholder="Name (z.B. Martin)" />

                                        <button onClick={() => deleteMonteur(m.id)} className="text-red-400"><Icon name="trash" size={12}/></button>
                                    </div>
                                ))}
                            </div>
                        </section>

                                        <div className="bg-slate-900/50 p-3 rounded-xl">
                                            <p className="text-[8px] text-slate-500 uppercase font-black mb-2 tracking-widest">Wochenansicht (KW {getWeekNumber(selectedDate)})</p>

                                                    <div key={day} className="flex flex-col items-center">
                                                        <span className="text-[7px] text-slate-500 font-bold uppercase">{day}</span>
                                                        <span className={`text-[10px] font-black ${val > 0 ? 'text-blue-400' : 'text-slate-700'}`}>{val}h</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-3 pt-2 border-t border-white/5 flex justify-between items-center">
                                                <span className="text-[8px] text-slate-400 font-black uppercase">Woche Total</span>
                                                <span className="text-xs font-black text-blue-400">{summary.week}h</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">

                                            </div>
                                            <div className="bg-slate-900/50 p-3 rounded-xl flex justify-between items-center">
                                                <p className="text-[8px] text-slate-500 uppercase font-black">Gesamt</p>
                                                <p className="text-xs font-black text-white">{summary.total}h</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </section>
                    </main>

                                        <div className="flex items-center gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); setShowPendenzModal(obj); }} className="px-2 py-1 bg-amber-500/20 border border-amber-500/40 rounded text-amber-500 text-[8px] font-black uppercase">Pendenzen melden</button>

                                                <Icon name="trash-2" size={14} />
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-[10px] font-bold text-blue-300 mb-2 uppercase">{obj.customer} | {obj.houseInfo}</p>

                                        </div>

                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <span className="text-[8px] text-slate-400 font-bold uppercase">{formatDate(obj.deliveryDate)}</span>

                                                <span className="text-[9px] font-black text-orange-400 uppercase italic">Offen: {obj.lastRemaining} ELE</span>
                                            )}
                                        </div>
                                        <span className="text-[10px] font-black text-white">{obj.current}/{obj.target} ELE</span>
                                    </div>
                                    <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden"><div className={`h-full ${obj.status === 'blocked' ? 'bg-red-500' : 'bg-blue-400'}`} style={{width: `${(obj.current/obj.target)*100}%`}}></div></div>
                                </div>
                            ))}
                        </div>
                    </main>
                    {editObject && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-4"><div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4"><h3 className="text-xs font-black text-white uppercase italic">Bearbeiten</h3><div className="space-y-3"><input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.address} onChange={(e) => setEditObject({...editObject, address: e.target.value})} /></div><div className="grid grid-cols-2 gap-3"><button onClick={() => setEditObject(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button><button onClick={saveManualEdit} className="bg-blue-500 py-4 rounded-xl text-[10px] font-black uppercase text-white">Speichern</button></div></div></div>
                    )}
                    {showPendenzModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4 my-auto relative">
                                {submitSuccess ? (
                                    <div className="flex flex-col items-center justify-center py-12 space-y-4 page-transition">
                                        <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center text-white animate-bounce">
                                            <Icon name="check" size={32} />
                                        </div>
                                        <p className="text-xs font-black text-white uppercase tracking-widest italic">Gespeichert!</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-black text-white uppercase italic">Pendenz melden</h3>
                                        <textarea className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] h-24" placeholder="Mangel..." value={pendenzForm.description} onChange={(e) => setPendenzForm({...pendenzForm, description: e.target.value})} />
                                        <input type="text" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" placeholder="Monteur Name..." value={pendenzForm.monteur} onChange={(e) => setPendenzForm({...pendenzForm, monteur: e.target.value})} />
                                        <input type="date" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" value={pendenzForm.deadline} onChange={(e) => setPendenzForm({...pendenzForm, deadline: e.target.value})} />

                                            <p className="text-[10px] font-black text-slate-400 uppercase">Fotos hinzufügen</p>
                                            <input type="file" multiple accept="image/*" onChange={handleFileChange} className="hidden" id="admin-file-upload-mobile" />
                                            <label htmlFor="admin-file-upload-mobile" className="w-full p-4 border border-dashed border-white/20 rounded-xl flex items-center justify-center text-slate-400 cursor-pointer active:bg-white/5">
                                                <Icon name="camera" size={20} className="mr-2" /> <span className="text-[10px] font-bold uppercase">Wählen</span>
                                            </label>
                                            <div className="flex gap-2 overflow-x-auto pb-2">
                                                {pendenzForm.images.map((img, i) => (
                                                    <div key={i} className="relative w-16 h-16 shrink-0">
                                                        <img src={img} className="w-full h-full object-cover rounded-lg border border-white/10" />
                                                        <button type="button" onClick={() => setPendenzForm(p => ({...p, images: p.images.filter((_, idx) => idx !== i)}))} className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full flex items-center justify-center text-[10px]"><Icon name="x" size={10} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <button type="button" onClick={() => setShowPendenzModal(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button>
                                            <button 
                                                onClick={submitPendenz} 
                                                disabled={isSubmittingPendenz || !pendenzForm.description || !pendenzForm.monteur} 
                                                className={`bg-amber-500 py-4 rounded-xl text-[10px] font-black uppercase text-white shadow-lg active:scale-95 transition-all ${(isSubmittingPendenz || !pendenzForm.description || !pendenzForm.monteur) ? 'opacity-50 grayscale' : 'opacity-100'}`}
                                            >
                                                {isSubmittingPendenz ? 'Sende...' : 'Senden'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    {showImportModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col"><textarea className="flex-1 w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-[11px] text-white" placeholder="Dispo-Text hierher..." value={importText} onChange={(e) => setImportText(e.target.value)} /><div className="grid grid-cols-2 gap-4 mt-6"><button onClick={() => setShowImportModal(false)} className="py-4 text-slate-500 font-black uppercase">Abbrechen</button><button onClick={processTextImport} className="bg-blue-500 text-white py-4 rounded-xl font-black">Import</button></div></div>
                    )}
                </div>
            );

            if (view === 'worker_list') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea />
                    <header className="p-6 flex flex-col items-center border-b border-white/5 glass no-print">
                        <div className="w-full flex justify-end mb-2">
                             <button onClick={() => setView('login')} className="text-slate-500"><Icon name="power" size={16}/></button>
                        </div>
                        <div className="w-full flex flex-col items-center space-y-3">
                            {activeMonteurs.length > 0 ? (
                                <div className="w-full flex flex-col items-center gap-3">
                                    {activeMonteurs.map(name => {
                                        const count = pendenzen.filter(p => p.monteur?.toLowerCase() === name.toLowerCase() && p.status === 'open').length;
                                        return (
                                            <button key={name} onClick={() => setShowMyPendenzen(name)} className="w-full max-w-sm py-3 px-4 rounded-[1.2rem] flex flex-col items-center justify-center gap-0.5 transition-all border-2 shadow-md badge-pulse bg-blue-500/20 border-blue-400/60">
                                                <span className="text-[7px] font-black text-slate-400 uppercase tracking-[0.15em]">PENDENZ FÜR</span>
                                                <h1 className="text-base font-black text-white uppercase tracking-tight italic">{name}</h1>
                                                <div className="mt-1 flex items-center gap-1.5 bg-blue-500 text-white px-2 py-0.5 rounded-full text-[7px] font-black uppercase">{count} Pendenzen</div>
                                            </button>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="w-full max-w-sm py-5 px-4 rounded-[1.2rem] border-2 border-white/5 bg-slate-700/30 flex flex-col items-center opacity-40">
                                    <span className="text-[7px] font-black text-slate-500 uppercase tracking-[0.15em]">MONTEUR STATUS</span>
                                    <h1 className="text-xs font-black text-slate-500 uppercase italic">Keine Pendenzen offen</h1>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-2 justify-center mt-4">
                            {['de', 'sq', 'it'].map(l => <button key={l} onClick={() => setLang(l)} className={`px-2.5 py-1 rounded-lg text-[8px] font-bold border transition-all ${lang === l ? 'bg-blue-500 border-blue-400 text-white' : 'bg-slate-700 border-white/5 text-slate-400'}`}>{l.toUpperCase()}</button>)}
                        </div>
                    </header>
                    <main className="p-4 space-y-3 no-print">
                        <div className="relative mb-6">
                            <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                            <input type="text" className="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-[11px] text-white font-bold" placeholder={t.search} value={workerSearchTerm} onChange={(e) => setWorkerSearchTerm(e.target.value)} />
                        </div>
                        {filteredObjectsWorker.map(obj => (
                            <button key={obj.id} onClick={() => { setSelectedObject(obj); setView('worker_edit'); }} className="w-full bg-slate-700/60 rounded-xl border border-white/5 p-5 text-left flex justify-between items-center active:bg-slate-700 border-l-4 border-l-blue-400 shadow-lg">
                                <div><h3 className="text-xs font-black text-white uppercase italic truncate max-w-[220px] mb-1">{obj.address}</h3><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{obj.customer} • {obj.houseInfo}</p></div>
                                <Icon name="arrow-right" size={18} className="text-blue-400" />
                            </button>
                        ))}
                    </main>

                                {pendenzen.filter(p => p.monteur?.toLowerCase() === showMyPendenzen?.toLowerCase() && p.status === 'open').map(pen => (

                                        <div className="flex justify-between items-start"><h4 className="text-[11px] font-black text-white uppercase italic">{pen.address}</h4><span className="text-[8px] font-black text-red-400 bg-red-500/10 px-2 py-1 rounded">Bis: {formatDate(pen.deadline)}</span></div>
                                        <p className="text-[11px] font-bold text-slate-300 leading-relaxed border-l-2 border-blue-400 pl-3">{pen.description}</p>

                                            <button onClick={() => triggerDownloadPDF(pen)} className="py-4 bg-blue-500/20 border border-blue-500/40 text-blue-400 rounded-xl font-black uppercase text-[9px] flex items-center justify-center gap-2">PDF</button>

                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );

                <div className="min-h-screen bg-slate-800 flex flex-col page-transition">

                        <button onClick={() => setView('worker_list')} className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center text-blue-400"><Icon name="arrow-left" size={20}/></button>

                    <main className="p-6 space-y-4 max-w-md mx-auto w-full">
                        <button onClick={() => setWorkerStatusMode('partial')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode === 'partial' ? 'bg-blue-500 border-blue-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.partial}</span>
                            {workerStatusMode === 'partial' && <input type="number" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center" placeholder={t.placeholderNum} value={workerRemaining} onChange={(e) => setWorkerRemaining(e.target.value)} onClick={(e) => e.stopPropagation()} />}
                        </button>
                        <button onClick={() => setWorkerStatusMode('finished')} className={`w-full p-5 rounded-2xl border flex items-center justify-between ${workerStatusMode === 'finished' ? 'bg-emerald-500 border-emerald-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.finished}</span><Icon name="check-circle" size={24}/>
                        </button>
                        <button onClick={() => setWorkerStatusMode('blocked')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode === 'blocked' ? 'bg-red-500 border-red-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.blocked}</span>
                            {workerStatusMode === 'blocked' && <textarea className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px]" placeholder={t.reason} value={workerBlockReason} onChange={(e) => setWorkerBlockReason(e.target.value)} onClick={(e) => e.stopPropagation()} />}
                        </button>
                        <div className="h-px bg-white/10 my-4"></div>
                        <button onClick={() => setWorkerStatusMode('hours')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode === 'hours' ? 'bg-blue-600 border-blue-400 shadow-lg' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.hours}</span>
                            {workerStatusMode === 'hours' && (
                                <div className="space-y-3 pt-2" onClick={(e) => e.stopPropagation()}>
                                    <select className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px] font-bold" value={workerHoursName} onChange={(e) => setWorkerHoursName(e.target.value)}>
                                        <option value="" className="text-slate-800">Name wählen...</option>
                                        {monteurs.map(m => <option key={m.id} value={m.name} className="text-slate-800">{m.name}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" step="0.5" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center" placeholder="Std (z.B. 8.5)" value={workerHours} onChange={(e) => setWorkerHours(e.target.value)} />
                                        <input type="date" className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px] font-bold" value={workerHoursDate} onChange={(e) => setWorkerHoursDate(e.target.value)} />
                                    </div>
                                </div>
                            )}
                        </button>
                        {workerStatusMode && <button onClick={submitWorkerUpdate} className="w-full py-5 bg-white text-slate-800 rounded-2xl font-black uppercase tracking-widest text-[11px] mt-6 shadow-2xl">Senden</button>}
                    </main>
                </div>
            );
            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
