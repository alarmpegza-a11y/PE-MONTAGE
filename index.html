<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montage Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD25cVhiguQKP4PTD8evGI4CxSh7rglbBs",
            authDomain: "montage-pe-a5f79.firebaseapp.com",
            projectId: "montage-pe-a5f79",
            storageBucket: "montage-pe-a5f79.firebasestorage.app",
            messagingSenderId: "588324363042",
            appId: "1:588324363042:web:c544a07261f62de427237b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseSDK = { db, auth, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";
        const APP_ID = 'montage-pe-a5f79';

        function App() {
            const [view, setView] = useState('login');
            const [pin, setPin] = useState('');
            const [user, setUser] = useState(null);
            const [objects, setObjects] = useState([]);
            const [importText, setImportText] = useState('');
            const [isImporting, setIsImporting] = useState(false);
            const [error, setError] = useState(null);

            // 1. Firebase Auth & Sync
            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, collection, query, onSnapshot } = window.FirebaseSDK;

                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Auth Error:", e);
                        setError("Authentifizierung fehlgeschlagen.");
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        const path = `artifacts/${APP_ID}/public/data/objects`;
                        const q = query(collection(db, path));
                        const unsubData = onSnapshot(q, 
                            (snap) => setObjects(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                            (err) => {
                                console.error("Firestore Error:", err);
                                setError("Firestore Zugriff verweigert. Prüfe Regeln!");
                            }
                        );
                        return unsubData;
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Import Logik
            const handleImport = async () => {
                if (!importText.trim() || !user) return;
                setIsImporting(true);
                setError(null);

                const lines = importText.split('\n');
                const { db, doc, setDoc } = window.FirebaseSDK;
                let count = 0;

                try {
                    for (let line of lines) {
                        if (line.includes("LIEFERUNG")) {
                            const id = `obj_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
                            const addressMatch = line.match(/LIEFERUNG\s+(.*?)(?=\s+\d+\s+ELE|$)/i);
                            const eleMatch = line.match(/(\d+)\s+ELE/i);
                            
                            const objData = {
                                id,
                                address: addressMatch ? addressMatch[1].trim() : "Unbekannt",
                                target: eleMatch ? parseInt(eleMatch[1]) : 1,
                                current: 0,
                                status: 'active',
                                createdAt: new Date().toISOString()
                            };

                            // PFAD MUSS EXAKT SEIN: artifacts/{appId}/public/data/{collection}/{docId}
                            const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'objects', id);
                            await setDoc(docRef, objData);
                            count++;
                        }
                    }
                    alert(`${count} Objekte importiert.`);
                    setImportText('');
                } catch (e) {
                    console.error("Save Error:", e);
                    setError(`Speichern fehlgeschlagen: ${e.message}`);
                }
                setIsImporting(false);
            };

            const handlePin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length <= 4) setPin(newPin);
                if (newPin === ADMIN_PIN) { setView('admin'); setPin(''); }
                else if (newPin === WORKER_PIN) { setView('worker'); setPin(''); }
                else if (newPin.length === 4) setPin('');
            };

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <h1 className="text-2xl font-bold mb-8 italic">MONTAGE MANAGER</h1>
                    <div className="flex gap-4 mb-8">
                        {[0,1,2,3].map(i => <div key={i} className={`w-4 h-4 rounded-full border-2 border-blue-500 ${pin.length > i ? 'bg-blue-500' : ''}`} />)}
                    </div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n => (
                            <button key={n} onClick={() => handlePin(n.toString())} className="h-16 glass rounded-xl text-xl font-bold active:scale-95 transition-transform">{n}</button>
                        ))}
                        <div/>
                        <button onClick={() => handlePin('0')} className="h-16 glass rounded-xl text-xl font-bold active:scale-95 transition-transform">0</button>
                    </div>
                    {error && <p className="mt-4 text-red-500 text-sm text-center font-bold bg-red-500/10 p-2 rounded">{error}</p>}
                </div>
            );

            if (view === 'admin') return (
                <div className="p-4 max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-bold uppercase tracking-widest text-blue-400">Admin Dashboard</h2>
                        <button onClick={() => setView('login')} className="text-slate-500 text-xs">Logout</button>
                    </div>
                    
                    <div className="glass p-4 rounded-2xl mb-6">
                        <h3 className="text-sm font-bold mb-2">DISPO-TEXT IMPORT</h3>
                        <textarea 
                            className="w-full h-32 p-3 rounded-xl text-xs outline-none" 
                            placeholder="Kopiere Dispo-Text hier rein..."
                            value={importText}
                            onChange={(e) => setImportText(e.target.value)}
                        />
                        <button 
                            disabled={isImporting}
                            onClick={handleImport}
                            className="w-full bg-blue-600 py-3 rounded-xl mt-3 font-bold text-sm uppercase tracking-widest disabled:opacity-50"
                        >
                            {isImporting ? 'Wird gespeichert...' : 'Daten Senden'}
                        </button>
                    </div>

                    <div className="space-y-3">
                        {objects.map(obj => (
                            <div key={obj.id} className="glass p-4 rounded-xl border-l-4 border-blue-500">
                                <p className="text-xs font-bold uppercase">{obj.address}</p>
                                <div className="flex justify-between text-[10px] mt-2 text-slate-400">
                                    <span>{obj.current} / {obj.target} ELE</span>
                                    <span>Status: {obj.status}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return <div className="p-8 text-center">Worker-Ansicht (Coming Soon) <button onClick={() => setView('login')}>Zurück</button></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
