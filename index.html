            const [showMyPendenzen, setShowMyPendenzen] = useState(null);
            const [printData, setPrintData] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [importResult, setImportResult] = useState(null);
            const [pdfLoading, setPdfLoading] = useState(false);

            const appId = 'montage-pe-a5f79';
            const t = translations[lang];

            useEffect(() => {
                const initLiveSync = async () => {
                    if (!window.FirebaseSDK) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.FirebaseSDK;
                    try { await signInAnonymously(auth); } catch(e) {}
                    onAuthStateChanged(auth, (u) => {

                            onSnapshot(collection(db,'artifacts',appId,'public','data','finishedjobs'), (s)=>setFinishedObjects(s.docs.map(d=>({id:d.id,...d.data()}))));
                            onSnapshot(collection(db,'artifacts',appId,'public','data','pendenzen'), (s)=>setPendenzen(s.docs.map(d=>({id:d.id,...d.data()}))));
                            onSnapshot(collection(db,'artifacts',appId,'public','data','hours'), (s)=>setHourLogs(s.docs.map(d=>({id:d.id,...d.data()}))));
                            onSnapshot(collection(db,'artifacts',appId,'public','data','monteurs'), (s)=>setMonteurs(s.docs.map(d=>({id:d.id,...d.data()}))));
                            onSnapshot(collection(db,'artifacts',appId,'public','data','calentries'), (s)=>setCalEntries(s.docs.map(d=>({id:d.id,...d.data()}))));

                            // ═══ AUTOMATISCHE PRÜFUNG: Offene Kalendereinträge ohne Dashboard-Eintrag nachtragen ═══
                            // Läuft bei jedem Login einmal (nicht localStorage-gebunden, da Daten sich ändern)
                            setTimeout(async () => {
                                try {
                                    const { getDocs, collection: col3, setDoc, doc: docRef3 } = window.FirebaseSDK;
                                    const [calSnap, objSnap] = await Promise.all([
                                        getDocs(col3(db,'artifacts',appId,'public','data','calentries')),
                                        getDocs(col3(db,'artifacts',appId,'public','data','objects')),
                                    ]);
                                    const allCal = calSnap.docs.map(d=>({id:d.id,...d.data()}));
                                    const allObj = objSnap.docs.map(d=>({id:d.id,...d.data()}));
                                    let added = 0;
                                    for (const cal of allCal) {
                                        if (cal.doneAt) continue; // bereits erledigt
                                        const calNr = cleanAuftragsNr(cal.auftragsNr||'');
                                        const calAddr = (cal.address||'').trim().toLowerCase();

                                        });

                                            const eleMatch = (cal.memo||'').match(/(\d+)\s*ELE/i);
                                            const target = eleMatch ? parseInt(eleMatch[1]) : (parseInt(cal.target)||1);
                                            await setDoc(docRef3(db,'artifacts',appId,'public','data','objects',objId), {

                                                name: cal.address||cal.customer,

                                                address: cal.address||'',
                                                houseInfo: cal.memo||'Gesamtmontage',

                                            added++;

                                    }
                                    if (added > 0) console.log(`[AutoSync] ${added} fehlende Objekte im Dashboard nachgetragen.`);
                                } catch(e) { console.warn('[AutoSync Fehler]', e); }
                            }, 3000); // 3s Delay damit Snapshots zuerst laden
                            // ═══════════════════════════════════════════════════════════

                            // ═══ EINMALIGE WIEDERHERSTELLUNG — NUR MARKIEREN, NIE LÖSCHEN ═══
                            if (!localStorage.getItem('restore_erledigt_v1')) {
                                (async () => {
                                    const EXCEL_NRS = new Set([
                                        '260267693','251266656','250561902','202212148','251266654','251266655',
                                        '260267855','260368495','260368754','260368751','260469334','260267857',
                                        '240957898','260167588','202519257','251065771','251266658','260469320',
                                        '260469499','260469557','260469095','260469540','260469344','250360650',
                                        '260469389','260469272','260469246','260368543','260368496','11111111',
                                        '250360652','202315444','engel','260469448','251266661','260368852',
                                        '260469082','260469031','260469192','260368276','260469329','260167249',
                                        '260368846','251065772','250662773','260469483','260469388','260569919',
                                        '260469652','260368847','250662978','202518951','250863885','260368849',
                                        '260569905','260368848','260368393','260469350','260469484','260368999',
                                        '260469550','260469747','260469576','251166285','260469581','260570096',
                                        '260469390','260469485','260570145','260469577','260469304','260469486',
                                        '260570199','111111111','260569852','260469568','260570177','260670515',
                                    ]);
                                    const EXCEL_NO_NR = [
                                        { date:'2026-04-20', addr:'via prati', kunde:'sampietro' },
                                        { date:'2026-04-21', addr:'churerstrasse 156', kunde:'ziegler' },
                                        { date:'2026-04-21', addr:'uster / leutenegger', kunde:'leutenegger' },
                                        { date:'2026-04-22', addr:'ottikon', kunde:'leutenegger' },
                                    ];
                                    const cleanNr = (raw) => {
                                        if (!raw) return '';
                                        let s = raw.trim();
                                        s = s.replace(/^(?:\d{1,2}\/)+/,'').trim();
                                        s = s.replace(/^[\d/\s]+ELE\//i,'').trim();
                                        s = s.replace(/\/[A-Za-z]{1,5}$/,'').trim();
                                        return s.toLowerCase();
                                    };
                                    const { getDocs, collection: col2, updateDoc, doc: docRef2 } = window.FirebaseSDK;
                                    const snap = await getDocs(col2(db,'artifacts',appId,'public','data','calentries'));
                                    const nowIso = new Date().toISOString();
                                    let count = 0;
                                    for (const d of snap.docs) {
                                        const data = d.data();
                                        if (data.doneAt) continue;
                                        const calNr    = cleanNr(data.auftragsNr || '');
                                        const calAddr  = (data.address || '').trim().toLowerCase();
                                        const calDate  = (data.deliveryDate || '').substring(0,10);
                                        const calKunde = (data.customer || '').trim().toLowerCase();
                                        let match = calNr && EXCEL_NRS.has(calNr);
                                        if (!match) {
                                            match = EXCEL_NO_NR.some(e =>
                                                e.date === calDate &&
                                                calAddr.includes(e.addr) &&
                                                calKunde.includes(e.kunde)

                                            count++;

                            }
                            // ═══════════════════════════════════════════════════════════

                        }
                    });
                };
                initLiveSync();
            }, []);

            const handleLogin = (digit) => {
                const newPin = pin+digit;
                if (newPin.length<4) { setPin(newPin); return; }
                if (newPin===ADMIN_PIN) setView('dashboard');
                else if (newPin===WORKER_PIN) setView('worker_list');
                else if (newPin===HOURS_PIN) setView('hours_admin');
                setPin('');
            };

            // Keyboard support for login PIN
            useEffect(() => {
                if (view !== 'login') return;
                const onKey = (e) => {
                    if (e.key >= '0' && e.key <= '9') handleLogin(e.key);
                    else if (e.key === 'Backspace') setPin(p => p.slice(0,-1));
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [view, pin]);

            const processTextImport = async () => {
                if (!importText.trim()) return;
                setIsImporting(true);
                const lines = importText.split(/\r?\n/);
                const newObjects = [];
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const parts = trimmed.split('/').map(p=>p.trim());
                    if (parts.length<2) continue;
                    let customer,address,memo,auftragsNrRaw;
                    const firstUpper = parts[0].toUpperCase();
                    if (firstUpper==='LIEFERUNG'||firstUpper==='MONTAGE'||firstUpper==='SERVICE') {
                        customer=parts[1]||'Unbekannter Kunde'; address=parts[2]||'Unbekannte Adresse'; memo=parts[3]||''; auftragsNrRaw=parts.slice(4).join('/').trim();
                    } else {
                        customer=parts[0]||'Unbekannter Kunde'; address=parts[1]||'Unbekannte Adresse'; memo=parts[2]||''; auftragsNrRaw=parts.slice(3).join('/').trim();
                    }
                    const auftragsNr = cleanAuftragsNr(auftragsNrRaw);
                    const eleMatch = memo.match(/(\d+)\s*ELE/i);
                    const target = eleMatch?parseInt(eleMatch[1]):1;
                    const houseInfo = memo.replace(/\d+\s*ELE/gi,'').replace(/\bGIS\b/gi,'').replace(/[-–]\s*$/,'').trim()||'Gesamtmontage';
                    const objId = `obj-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
                    newObjects.push({id:objId,name:address,customer,address,houseInfo,auftragsNr,target,current:0,lastRemaining:null,blockReason:null,deliveryDate:new Date().toISOString(),status:'active',history:[]});
                }
                if (newObjects.length>0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const obj of newObjects) await setDoc(doc(db,'artifacts',appId,'public','data','objects',obj.id),obj);
                }
                setIsImporting(false); setImportText(''); setShowImportModal(false); setImportResult(newObjects.length);
            };

            const submitWorkerUpdate = async () => {
                const now = new Date().toISOString();
                const { db, doc, updateDoc, deleteDoc, addDoc, collection, setDoc } = window.FirebaseSDK;
                const obj = selectedObject;
                if (workerStatusMode==='hours') {
                    if (!workerHoursName||!workerHours) return;
                    await addDoc(collection(db,'artifacts',appId,'public','data','hours'), {objectId:obj.id,address:obj.address,monteurName:workerHoursName,hours:parseFloat(workerHours),date:workerHoursDate,createdAt:now});
                } else {
                    if (workerStatusMode==='finished') {
                        const finishedId = `fin-${obj.id}`;
                        // Memo aus passendem calentry holen (Abgleich via auftragsNr oder Adresse)
                        const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');
                        const objAddr = (obj.address || '').trim().toLowerCase();
                        const matchingCal = calEntries.find(e => {
                            const calAufnr = cleanAuftragsNr(e.auftragsNr || '');
                            const calAddr = (e.address || '').trim().toLowerCase();
                            return (objAufnr && calAufnr && objAufnr === calAufnr) || (objAddr && calAddr && objAddr === calAddr);
                        });
                        const memoFromCal = matchingCal ? (matchingCal.memo || '') : '';
                        await setDoc(doc(db,'artifacts',appId,'public','data','finishedjobs',finishedId), {
                            ...obj,
                            id: finishedId,
                            originalId: obj.id,
                            finishedAt: now,
                            status: 'finished',
                            memo: obj.memo || memoFromCal,
                        });
                        await deleteDoc(doc(db,'artifacts',appId,'public','data','objects',obj.id));
                        // Passendes calentry als "erledigt" markieren
                        if (matchingCal) {
                            await updateDoc(doc(db,'artifacts',appId,'public','data','calentries',matchingCal.id), { doneAt: now });
                        }
                    } else {
                        let updates = {history:[{date:now,mode:workerStatusMode,detail:workerStatusMode==='blocked'?workerBlockReason:workerRemaining},...(obj.history||[])]};
                        if (workerStatusMode==='blocked') updates={...updates,status:'blocked',blockReason:workerBlockReason,lastRemaining:obj.lastRemaining??null};
                        else if (workerStatusMode==='partial') { const open=parseInt(workerRemaining)||0; updates={...updates,current:Math.max(0,obj.target-open),status:'active',lastRemaining:open,blockReason:null}; }
                        await updateDoc(doc(db,'artifacts',appId,'public','data','objects',obj.id),updates);
                    }

                setWorkerStatusMode(''); setWorkerRemaining(''); setWorkerBlockReason(''); setWorkerHours('');

            const compressImage = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width=img.width,height=img.height;
                        if (width>1000) { height*=1000/width; width=1000; }
                        canvas.width=width; canvas.height=height;
                        canvas.getContext('2d').drawImage(img,0,0,width,height);
                        resolve(canvas.toDataURL('image/jpeg',0.6));
                    };
                    img.src=e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                const processed = [];
                for (const file of files) processed.push(await compressImage(file));
                setPendenzForm(prev=>({...prev,images:[...prev.images,...processed]}));
                e.target.value='';
            };

            const submitPendenz = async (e) => {
                if (e) { e.preventDefault?.(); e.stopPropagation?.(); }

                        setTimeout(()=>{ setSubmitSuccess(false); setPendenzForm({description:'',deadline:'',monteur:'',images:[]}); setShowPendenzModal(null); setIsSubmittingPendenz(false); },1200);
                    } catch(err) { setIsSubmittingPendenz(false); }
                }, 100);
            };

            const markPendenzDone = async (pId) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db,'artifacts',appId,'public','data','pendenzen',pId), {status:'done',doneAt:new Date().toISOString()});

            const addMonteur = async (name) => {

            const deleteMonteur = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db,'artifacts',appId,'public','data','monteurs',id));
            };

            const triggerDownloadPDF = (data) => {
                setPrintData(data);
                setTimeout(()=>{
                    const element = document.getElementById('print-area-content');
                    if (!element) return;
                    html2pdf().set({margin:10,filename:`Pendenz_${data.monteur.replace(/\s+/g,'_')}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}}).from(element).save().then(()=>setPrintData(null));
                }, 200);
            };

            const triggerHoursPDF = async (summary) => {
                if (!window.jspdf) { alert('PDF-Bibliothek noch nicht geladen.'); return; }
                setPdfLoading(true);
                try { await generateHoursPDF(summary,selectedDate,hourLogs); }
                catch(err) { alert('PDF-Fehler: '+err.message); }
                finally { setPdfLoading(false); }
            };

            const stats = useMemo(() => {
                let total=0,done=0,blocked=0,partial=0,unknown=0;
                objects.forEach(obj=>{
                    total+=obj.target; done+=obj.current;
                    if (obj.status==='blocked') blocked++;
                    if (obj.lastRemaining>0&&obj.status!=='finished') partial++;
                    if (obj.address?.includes("Unbekannte Adresse")||obj.name?.includes("Unbekannte Adresse")) unknown++;
                });
                return {open:objects.filter(o=>o.status==='active').length,percent:total>0?Math.round((done/total)*100):0,blocked,partial,pendenzen:pendenzen.filter(p=>p.status==='open').length,unknown};
            }, [objects, pendenzen]);

            const hourSummaries = useMemo(() => {
                const map = {};
                monteurs.forEach(m=>{map[m.name]={name:m.name,week:0,month:0,total:0,logs:[],weekDetails:{'Mo':0,'Di':0,'Mi':0,'Do':0,'Fr':0,'Sa':0}};});
                const now = new Date(selectedDate);
                const dayOfWeek = now.getDay();
                const startOfWeek = new Date(now.getFullYear(),now.getMonth(),now.getDate()-dayOfWeek+(dayOfWeek===0?-6:1));
                startOfWeek.setHours(0,0,0,0);
                const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(endOfWeek.getDate()+7);
                const startOfMonth = new Date(now.getFullYear(),now.getMonth(),1);
                hourLogs.forEach(log=>{
                    if (!map[log.monteurName]) map[log.monteurName]={name:log.monteurName,week:0,month:0,total:0,logs:[],weekDetails:{'Mo':0,'Di':0,'Mi':0,'Do':0,'Fr':0,'Sa':0}};
                    const logDate=new Date(log.date); const h=parseFloat(log.hours)||0;
                    map[log.monteurName].total+=h; map[log.monteurName].logs.push(log);
                    if (logDate>=startOfMonth&&logDate<=new Date(now.getFullYear(),now.getMonth()+1,0)) map[log.monteurName].month+=h;
                    if (logDate>=startOfWeek&&logDate<endOfWeek) {
                        map[log.monteurName].week+=h;
                        const dayLabels=['So','Mo','Di','Mi','Do','Fr','Sa'];
                        const label=dayLabels[logDate.getDay()];
                        if (label!=='So'&&map[log.monteurName].weekDetails[label]!==undefined) map[log.monteurName].weekDetails[label]+=h;
                    }
                });
                return Object.values(map);
            }, [hourLogs, monteurs, selectedDate]);

            const filteredObjectsAdmin = useMemo(() => {
                let list = objects;
                if (adminFilter==='blocked') list=list.filter(o=>o.status==='blocked');
                else if (adminFilter==='partial') list=list.filter(o=>o.lastRemaining>0&&o.status!=='finished');
                else if (adminFilter==='pendenzen') { const ids=new Set(pendenzen.filter(p=>p.status==='open').map(p=>p.objectId)); list=list.filter(o=>ids.has(o.id)); }
                else if (adminFilter==='unknown_address') list=list.filter(o=>o.address?.includes("Unbekannte Adresse")||o.name?.includes("Unbekannte Adresse"));
                return list.filter(o=>o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, adminFilter, searchTerm, pendenzen]);

            const filteredObjectsWorker = useMemo(() => {
                return objects.filter(o=>o.status!=='finished').filter(o=>o.address.toLowerCase().includes(workerSearchTerm.toLowerCase())||o.customer.toLowerCase().includes(workerSearchTerm.toLowerCase()));
            }, [objects, workerSearchTerm]);

            const activeMonteurs = useMemo(() => {
                const names=new Set();
                pendenzen.filter(p=>p.status==='open').forEach(p=>{if(p.monteur) names.add(p.monteur.trim());});
                return Array.from(names).sort();
            }, [pendenzen]);

            const changeWeek = (direction) => {
                const newDate=new Date(selectedDate); newDate.setDate(newDate.getDate()+(direction*7)); setSelectedDate(newDate);
            };

            if (view==='calendar') return <CalendarView onBack={()=>setView('dashboard')} calEntries={calEntries} setCalEntries={setCalEntries} appId={appId} finishedObjects={finishedObjects} objects={objects}/>;

            const PrintArea = () => {
                if (!printData) return null;
                return (
                    <div id="print-area">
                        <div id="print-area-content" style={{backgroundColor:'#ffffff',color:'#000000'}}>
                            <div className="pdf-first-page">
                                <h1 style={{fontSize:'24pt',fontWeight:'900',borderBottom:'3pt solid black',paddingBottom:'5mm',marginBottom:'8mm',color:'#000000'}}>PENDENZ-REPORT</h1>
                                <table style={{width:'100%',marginBottom:'10mm',color:'#000000'}}>
                                    <tbody>
                                        <tr><td style={{width:'50%'}}><p style={{fontSize:'8pt',fontWeight:'bold',color:'#666666',textTransform:'uppercase',margin:0}}>Objekt / Adresse</p><p style={{fontSize:'12pt',fontWeight:'bold',margin:0,color:'#000000'}}>{printData.address}</p></td><td><p style={{fontSize:'8pt',fontWeight:'bold',color:'#666666',textTransform:'uppercase',margin:0}}>Monteur</p><p style={{fontSize:'12pt',fontWeight:'bold',margin:0,color:'#000000'}}>{printData.monteur}</p></td></tr>
                                        <tr><td style={{height:'5mm'}}></td></tr>
                                        <tr><td><p style={{fontSize:'8pt',fontWeight:'bold',color:'#666666',textTransform:'uppercase',margin:0}}>Erstellt am</p><p style={{fontSize:'11pt',margin:0,color:'#000000'}}>{formatDate(printData.createdAt||new Date())}</p></td><td><p style={{fontSize:'8pt',fontWeight:'bold',color:'#666666',textTransform:'uppercase',margin:0}}>Frist bis</p><p style={{fontSize:'12pt',fontWeight:'900',color:'#d00000',margin:0}}>{formatDate(printData.deadline)}</p></td></tr>
                                    </tbody>
                                </table>
                                <div style={{backgroundColor:'#f9f9f9',padding:'6mm',borderLeft:'4pt solid black',marginBottom:'10mm'}}>
                                    <p style={{fontSize:'8pt',fontWeight:'bold',color:'#666666',textTransform:'uppercase',marginBottom:'2mm'}}>Beschreibung des Mangels</p>
                                    <p style={{fontSize:'13pt',lineHeight:'1.5',margin:0,color:'#000000'}}>{printData.description}</p>
                                </div>
                            </div>
                            {printData.images?.map((img,i) => (
                                <div key={i} className="pdf-page-break" style={{backgroundColor:'#ffffff'}}>
                                    <div className="pdf-image-container">
                                        <p style={{fontSize:'8pt',color:'#999999',textTransform:'uppercase',marginBottom:'4mm',fontWeight:'bold'}}>Foto {i+1} von {printData.images.length}</p>
                                        <img src={img} alt=""/>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (view==='login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-800">
                    <div className="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white"/></div>
                    <h1 className="text-2xl font-black text-white italic mb-10 uppercase tracking-tight">Montage Manager</h1>
                    <div style={{color:'#475569',fontSize:9,fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>⌨ Tastatureingabe möglich</div>
                    <div className="flex gap-3 mb-10">{[0,1,2,3].map(i=><div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-400 transition-all ${pin.length>i?'bg-blue-400 scale-110':'bg-transparent opacity-20'}`}/>)}</div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} onClick={()=>handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">{n}</button>)}
                        <button onClick={()=>setPin('')} className="h-16 flex items-center justify-center text-slate-400"><Icon name="delete" size={24}/></button>
                        <button onClick={()=>handleLogin('0')} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">0</button>
                    </div>
                </div>
            );

            if (view==='hours_admin') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea/>
                    {pdfLoading && <div className="pdf-loading-overlay"><div className="pdf-spinner"></div><div style={{color:'#fff',fontSize:13,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>PDF wird erstellt...</div></div>}
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center">
                        <h2 className="text-sm font-black text-white italic uppercase">Stunden Dashboard</h2>
                        <button onClick={()=>setView('login')} className="p-2 text-slate-400"><Icon name="log-out" size={18}/></button>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6">
                        <section className="card-gradient p-4 rounded-2xl flex justify-between items-center">
                            <button onClick={()=>changeWeek(-1)} className="p-3 bg-slate-900/50 rounded-xl text-blue-400 active:scale-90 transition-transform"><Icon name="chevron-left" size={20}/></button>
                            <div className="text-center"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kalenderwoche</p><p className="text-lg font-black text-white italic">KW {getWeekNumber(selectedDate)}</p></div>
                            <button onClick={()=>changeWeek(1)} className="p-3 bg-slate-900/50 rounded-xl text-blue-400 active:scale-90 transition-transform"><Icon name="chevron-right" size={20}/></button>
                        </section>
                        <section className="card-gradient p-6 rounded-2xl space-y-4">
                            <h3 className="text-xs font-black text-blue-400 uppercase tracking-widest">Monteure verwalten</h3>
                            <div className="flex gap-2">
                                <input id="monteur-name-input" type="text" className="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-3 text-xs text-white" placeholder="Name (z.B. Martin)"/>
                                <button onClick={()=>{ const el=document.getElementById('monteur-name-input'); addMonteur(el.value); el.value=''; }} className="bg-blue-500 px-4 rounded-xl font-black text-xs uppercase text-white">Neu</button>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {monteurs.map(m=>(
                                    <div key={m.id} className="bg-slate-800 border border-white/10 px-3 py-2 rounded-lg flex items-center gap-3">
                                        <span className="text-[10px] font-bold text-white uppercase">{m.name}</span>
                                        <button onClick={()=>deleteMonteur(m.id)} className="text-red-400"><Icon name="trash" size={12}/></button>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section className="space-y-4">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Zusammenfassung</h3>
                            {hourSummaries.map(summary=>(
                                <div key={summary.name} className="card-gradient p-5 rounded-2xl border border-white/5 flex flex-col gap-4">
                                    <div className="flex justify-between items-center">
                                        <h4 className="text-sm font-black text-white uppercase italic">{summary.name}</h4>
                                        <button onClick={()=>triggerHoursPDF(summary)} className="p-2 text-blue-400 hover:bg-blue-500/10 rounded-lg flex items-center gap-2"><Icon name="download" size={18}/><span className="text-[9px] font-black uppercase">PDF</span></button>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="bg-slate-900/50 p-3 rounded-xl">
                                            <p className="text-[8px] text-slate-500 uppercase font-black mb-2 tracking-widest">Wochenansicht (KW {getWeekNumber(selectedDate)})</p>
                                            <div className="grid grid-cols-6 gap-1">
                                                {Object.entries(summary.weekDetails).map(([day,val])=>(
                                                    <div key={day} className="flex flex-col items-center"><span className="text-[7px] text-slate-500 font-bold uppercase">{day}</span><span className={`text-[10px] font-black ${val>0?'text-blue-400':'text-slate-700'}`}>{val}h</span></div>
                                                ))}
                                            </div>
                                            <div className="mt-3 pt-2 border-t border-white/5 flex justify-between items-center"><span className="text-[8px] text-slate-400 font-black uppercase">Woche Total</span><span className="text-xs font-black text-blue-400">{summary.week}h</span></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-slate-900/50 p-3 rounded-xl flex justify-between items-center"><p className="text-[8px] text-slate-500 uppercase font-black">Monat</p><p className="text-xs font-black text-emerald-400">{summary.month}h</p></div>
                                            <div className="bg-slate-900/50 p-3 rounded-xl flex justify-between items-center"><p className="text-[8px] text-slate-500 uppercase font-black">Gesamt</p><p className="text-xs font-black text-white">{summary.total}h</p></div>
                                        </div>
                                        <div className="bg-slate-900/50 p-3 rounded-xl space-y-2">
                                            <p className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Detail Einträge</p>
                                            {summary.logs.filter(l=>(parseFloat(l.hours)||0)>0).sort((a,b)=>new Date(b.date)-new Date(a.date)).map((log)=>(
                                                <div key={log.id} className="flex items-center justify-between gap-2 border-b border-white/5 pb-2 last:border-0">
                                                    <div className="flex flex-col"><span className="text-[8px] text-white font-bold">{formatDate(log.date)}</span><span className="text-[8px] text-slate-400 truncate max-w-[100px]">{log.address}</span></div>
                                                    <div className="flex items-center gap-1.5 shrink-0">
                                                        <input type="number" step="0.5" defaultValue={log.hours} id={`input-hours-${log.id}`} className="w-10 bg-slate-800 border border-white/10 rounded px-1 py-0.5 text-[10px] font-black text-white text-center focus:outline-none focus:border-blue-400"/>
                                                        <button onClick={()=>{ const v=document.getElementById(`input-hours-${log.id}`).value; updateHourEntry(log.id,v); }} className="p-1 text-emerald-400 hover:bg-emerald-400/10 rounded"><Icon name="save" size={14}/></button>
                                                        <button onClick={()=>deleteHourEntry(log.id)} className="p-1 text-red-400 hover:bg-red-400/10 rounded"><Icon name="trash" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </section>
                    </main>
                </div>
            );

            if (view==='dashboard') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea/>
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center">
                        <h2 className="text-sm font-black text-white italic uppercase tracking-widest">Admin Panel</h2>
                        <button onClick={()=>setView('login')} className="p-2 text-slate-400"><Icon name="log-out" size={18}/></button>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6">
                        <div className="grid grid-cols-5 gap-2">
                            {[{label:'Aktiv',val:stats.open,color:'blue',filter:'all'},{label:'Blockiert',val:stats.blocked,color:'red',filter:'blocked'},{label:'Teilweise',val:stats.partial,color:'orange',filter:'partial'},{label:'Pendenzen',val:stats.pendenzen,color:'amber',filter:'pendenzen'},{label:'Adresse',val:stats.unknown,color:'emerald',filter:'unknown_address'}].map((s,i)=>(
                                <div key={i} onClick={()=>setAdminFilter(s.filter)} className={`card-gradient p-2 rounded-xl border transition-all cursor-pointer ${adminFilter===s.filter?`border-${s.color}-400`:'border-white/5'}`}>
                                    <p className="text-[7px] font-black text-slate-400 uppercase tracking-tighter">{s.label}</p>
                                    <div className={`text-lg font-black ${s.color==='emerald'?'text-emerald-400':s.color==='blue'?'text-blue-400':s.color==='red'?'text-red-400':s.color==='amber'?'text-amber-400':'text-orange-400'}`}>{s.val}</div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>setView('calendar')} className="w-full card-gradient border border-blue-400/30 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-transform">
                            <Icon name="calendar" size={16} className="text-blue-400"/><span>Wochenkalender</span><Icon name="arrow-right" size={14} className="text-blue-400"/>
                        </button>
                        <button onClick={()=>setShowImportModal(true)} className="w-full bg-blue-500 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-500/10">Dispo-Text Importieren</button>
                        <div className="space-y-3">
                            <div className="relative mb-4">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"/>
                                <input type="text" className="w-full bg-slate-900/50 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-xs text-white" placeholder="Objekt suchen..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                            </div>
                            {filteredObjectsAdmin.map(obj=>{
                                const aufnr = cleanAuftragsNr(obj.auftragsNr||'');
                                return (
                                    <div key={obj.id} onClick={()=>setEditObject(obj)} className={`card-gradient rounded-xl border p-4 relative cursor-pointer ${obj.status==='blocked'?'border-red-400/40':'border-white/5'}`}>
                                        {/* Lieferdatum Badge oben rechts */}
                                        <div className="flex justify-between items-start mb-2">
                                            <div style={{flex:1,minWidth:0}}>
                                                <h3 className="text-xs font-black text-white italic uppercase">{(obj.address?.includes("Unbekannte Adresse")||obj.name?.includes("Unbekannte Adresse"))?<span className="text-emerald-400 animate-pulse">Unbekannte Adresse</span>:obj.address}</h3>
                                                <div className="flex items-center gap-2 mt-1 flex-wrap">
                                                    {aufnr && <div className="text-[9px] font-black text-blue-400">#{aufnr}</div>}
                                                    {obj.deliveryDate && (
                                                        <div style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.35)',borderRadius:5,padding:'1px 7px'}}>
                                                            <span style={{fontSize:7,color:'#94a3b8',fontWeight:900,textTransform:'uppercase'}}>📅 Lieferung</span>
                                                            <span style={{fontSize:9,color:'#60a5fa',fontWeight:900}}>{formatDate(obj.deliveryDate)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 shrink-0">
                                                <button onClick={e=>{e.stopPropagation();setShowPendenzModal(obj);}} className="px-2 py-1 bg-amber-500/20 border border-amber-500/40 rounded text-amber-500 text-[8px] font-black uppercase">Pendenzen</button>
                                                <button onClick={e=>deleteObject(e,obj.id)} className="p-1.5 bg-red-500/20 text-red-500 rounded hover:bg-red-500/30 transition-colors"><Icon name="trash-2" size={14}/></button>
                                            </div>
                                        </div>
                                        <p className="text-[10px] font-bold text-blue-300 mb-2 uppercase">{obj.customer}</p>
                                        {/* Memo prominent anzeigen */}
                                        {(obj.memo||obj.houseInfo) && (
                                            <div style={{background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.3)',borderLeft:'3px solid #f59e0b',borderRadius:6,padding:'5px 10px',marginBottom:8}}>
                                                <span style={{fontSize:7,color:'#f59e0b',fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>📝 Memo </span>
                                                <span style={{fontSize:10,color:'#fde68a',fontWeight:800}}>{obj.memo||obj.houseInfo}</span>
                                            </div>
                                        )}
                                        {obj.status==='blocked'&&obj.blockReason && (
                                            <div className="bg-red-500/10 border border-red-500/30 p-3 rounded-lg mb-3">
                                                <div className="flex justify-between items-start gap-2">
                                                    <div><p className="text-[8px] font-black text-red-400 uppercase tracking-widest mb-1">Blockier-Grund:</p><p className="text-[11px] font-bold text-red-200">{obj.blockReason}</p></div>
                                                    <button onClick={e=>unblockObject(e,obj)} className="shrink-0 px-2 py-1.5 bg-emerald-500/20 border border-emerald-500/40 rounded-lg text-emerald-400 text-[8px] font-black uppercase whitespace-nowrap active:scale-95 transition-transform">✓ Freigeben</button>
                                                </div>
                                            </div>
                                        )}
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                {obj.lastRemaining>0&&obj.status!=='finished'&&<span className="text-[9px] font-black text-orange-400 uppercase italic">Offen: {obj.lastRemaining} ELE</span>}
                                            </div>
                                            <span className="text-[10px] font-black text-white">{obj.current}/{obj.target} ELE</span>
                                        </div>
                                        <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden"><div className={`h-full ${obj.status==='blocked'?'bg-red-500':'bg-blue-400'}`} style={{width:`${obj.target>0?(obj.current/obj.target)*100:0}%`}}></div></div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {editObject && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-4">
                            <div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4">
                                <h3 className="text-xs font-black text-white uppercase italic">Bearbeiten</h3>
                                <div className="space-y-3"><label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Objekt / Adresse</label><input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.address} onChange={e=>setEditObject({...editObject,address:e.target.value})}/></div>
                                <div className="grid grid-cols-2 gap-3"><button onClick={()=>setEditObject(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button><button onClick={saveManualEdit} className="bg-blue-500 py-4 rounded-xl text-[10px] font-black uppercase text-white">Speichern</button></div>
                            </div>
                        </div>
                    )}

                    {showPendenzModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4 my-auto relative">
                                {submitSuccess ? (
                                    <div className="flex flex-col items-center justify-center py-12 space-y-4 page-transition"><div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center text-white animate-bounce"><Icon name="check" size={32}/></div><p className="text-xs font-black text-white uppercase tracking-widest italic">Gespeichert!</p></div>
                                ) : (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-black text-white uppercase italic">Pendenz melden</h3>
                                        <textarea className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] h-24" placeholder="Mangel..." value={pendenzForm.description} onChange={e=>setPendenzForm({...pendenzForm,description:e.target.value})}/>
                                        <input type="text" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" placeholder="Monteur Name..." value={pendenzForm.monteur} onChange={e=>setPendenzForm({...pendenzForm,monteur:e.target.value})}/>
                                        <input type="date" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" value={pendenzForm.deadline} onChange={e=>setPendenzForm({...pendenzForm,deadline:e.target.value})}/>
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-black text-slate-400 uppercase">Fotos</p>
                                            <input type="file" multiple accept="image/*" onChange={handleFileChange} className="hidden" id="admin-file-upload-mobile"/>
                                            <label htmlFor="admin-file-upload-mobile" className="w-full p-4 border border-dashed border-white/20 rounded-xl flex items-center justify-center text-slate-400 cursor-pointer active:bg-white/5"><Icon name="camera" size={20} className="mr-2"/><span className="text-[10px] font-bold uppercase">Wählen</span></label>
                                            <div className="flex gap-2 overflow-x-auto pb-2">{pendenzForm.images.map((img,i)=>(<div key={i} className="relative w-16 h-16 shrink-0"><img src={img} className="w-full h-full object-cover rounded-lg border border-white/10"/><button type="button" onClick={()=>setPendenzForm(p=>({...p,images:p.images.filter((_,idx)=>idx!==i)}))} className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full flex items-center justify-center text-[10px]"><Icon name="x" size={10}/></button></div>))}</div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <button type="button" onClick={()=>setShowPendenzModal(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button>
                                            <button onClick={submitPendenz} disabled={isSubmittingPendenz||!pendenzForm.description||!pendenzForm.monteur} className={`bg-amber-500 py-4 rounded-xl text-[10px] font-black uppercase text-white shadow-lg active:scale-95 transition-all ${(isSubmittingPendenz||!pendenzForm.description||!pendenzForm.monteur)?'opacity-50 grayscale':'opacity-100'}`}>{isSubmittingPendenz?'Sende...':'Senden'}</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showImportModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col">
                            <div style={{color:'#60a5fa',fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Dispo-Text Import</div>
                            <div style={{color:'#94a3b8',fontSize:9,fontWeight:700,marginBottom:12}}>Format: <span style={{color:'#34d399'}}>LIEFERUNG / Kunde / Adresse / Memo / AuftragsNr</span></div>
                            <textarea className="flex-1 w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-[11px] text-white font-mono" placeholder={"LIEFERUNG / Herzog Haustechnik AG Luzern / Zürichstrasse 34, 6004 Luzern / 6 ELE / 260368365/SLI"} value={importText} onChange={e=>setImportText(e.target.value)}/>
                            <div className="grid grid-cols-2 gap-4 mt-6"><button onClick={()=>setShowImportModal(false)} className="py-4 text-slate-500 font-black uppercase">Abbrechen</button><button onClick={processTextImport} disabled={isImporting} className="bg-blue-500 text-white py-4 rounded-xl font-black">{isImporting?'Importiere...':'Import'}</button></div>
                        </div>
                    )}

                    {importResult!==null && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-6">
                            <div className="glass rounded-3xl p-8 w-full max-w-xs flex flex-col items-center gap-5">
                                <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg"><Icon name="check" size={32} className="text-white"/></div>
                                <div className="text-center"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Import abgeschlossen</p><p className="text-4xl font-black text-white italic">{importResult}</p><p className="text-[11px] font-black text-emerald-400 uppercase tracking-widest mt-1">Aufträge erfasst</p></div>
                                <button onClick={()=>setImportResult(null)} className="w-full bg-blue-500 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view==='worker_list') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea/>
                    <header className="p-6 flex flex-col items-center border-b border-white/5 glass">
                        <div className="w-full flex justify-end mb-2"><button onClick={()=>setView('login')} className="text-slate-500"><Icon name="power" size={16}/></button></div>
                        <div className="w-full flex flex-col items-center space-y-3">
                            {activeMonteurs.length>0 ? (
                                <div className="w-full flex flex-col items-center gap-3">
                                    {activeMonteurs.map(name=>{
                                        const count = pendenzen.filter(p=>p.monteur?.toLowerCase()===name.toLowerCase()&&p.status==='open').length;
                                        return (
                                            <button key={name} onClick={()=>setShowMyPendenzen(name)} className="w-full max-w-sm py-3 px-4 rounded-[1.2rem] flex flex-col items-center justify-center gap-0.5 transition-all border-2 shadow-md badge-pulse bg-blue-500/20 border-blue-400/60">
                                                <span className="text-[7px] font-black text-slate-400 uppercase tracking-[0.15em]">PENDENZ FÜR</span>
                                                <h1 className="text-base font-black text-white uppercase tracking-tight italic">{name}</h1>
                                                <div className="mt-1 flex items-center gap-1.5 bg-blue-500 text-white px-2 py-0.5 rounded-full text-[7px] font-black uppercase">{count} Pendenzen</div>
                                            </button>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="w-full py-5 px-4 rounded-[1.2rem] border-2 border-white/5 bg-slate-700/30 flex flex-col items-center opacity-40"><span className="text-[7px] font-black text-slate-500 uppercase tracking-[0.15em]">MONTEUR STATUS</span><h1 className="text-xs font-black text-slate-500 uppercase italic">Keine Pendenzen offen</h1></div>
                            )}
                        </div>
                        <div className="flex gap-2 justify-center mt-4 flex-wrap">
                            {['de','sq','it','bg','cs','el'].map(l=><button key={l} onClick={()=>setLang(l)} className={`px-2.5 py-1 rounded-lg text-[8px] font-bold border transition-all ${lang===l?'bg-blue-500 border-blue-400 text-white':'bg-slate-700 border-white/5 text-slate-400'}`}>{l.toUpperCase()}</button>)}
                        </div>
                    </header>
                    <main className="p-4 space-y-3">
                        <div className="relative mb-6"><Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"/><input type="text" className="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-[11px] text-white font-bold" placeholder={t.search} value={workerSearchTerm} onChange={e=>setWorkerSearchTerm(e.target.value)}/></div>
                        {filteredObjectsWorker.map(obj=>(
                            <button key={obj.id} onClick={()=>{setSelectedObject(obj);setView('worker_edit');}} className="w-full bg-slate-700/60 rounded-xl border border-white/5 p-4 text-left active:bg-slate-700 border-l-4 border-l-blue-400 shadow-lg" style={{display:'block'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                                    <div style={{flex:1,minWidth:0}}>
                                        <h3 className="text-xs font-black text-white uppercase italic truncate mb-1">{obj.address}</h3>
                                        <p className="text-[9px] font-bold text-blue-300 uppercase mb-2">{obj.customer}</p>
                                        {/* Lieferdatum */}
                                        {obj.deliveryDate && (
                                            <div style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:5,padding:'2px 8px',marginBottom:6}}>
                                                <span style={{fontSize:8,color:'#94a3b8',fontWeight:900}}>📅</span>
                                                <span style={{fontSize:10,color:'#60a5fa',fontWeight:900}}>{formatDate(obj.deliveryDate)}</span>
                                            </div>
                                        )}
                                        {/* Memo prominent */}
                                        {(obj.memo||obj.houseInfo) && (
                                            <div style={{background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.3)',borderLeft:'3px solid #f59e0b',borderRadius:5,padding:'4px 8px'}}>
                                                <span style={{fontSize:8,color:'#f59e0b',fontWeight:900,textTransform:'uppercase'}}>📝 </span>
                                                <span style={{fontSize:10,color:'#fde68a',fontWeight:800}}>{obj.memo||obj.houseInfo}</span>
                                            </div>
                                        )}
                                    </div>
                                    <Icon name="arrow-right" size={18} className="text-blue-400" style={{flexShrink:0,marginTop:2}}/>
                                </div>
                            </button>
                        ))}
                    </main>
                    {showMyPendenzen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col page-transition overflow-y-auto">
                            <div className="flex justify-between items-center mb-6"><h3 className="text-sm font-black text-white uppercase italic">Pendenzen: {showMyPendenzen}</h3><button onClick={()=>setShowMyPendenzen(null)} className="p-2 text-slate-500"><Icon name="x" size={24}/></button></div>
                            <div className="space-y-4">
                                {pendenzen.filter(p=>p.monteur?.toLowerCase()===showMyPendenzen?.toLowerCase()&&p.status==='open').map(pen=>(
                                    <div key={pen.id} className="card-gradient rounded-2xl p-5 border border-white/5 space-y-3">
                                        <div className="flex justify-between items-start"><h4 className="text-[11px] font-black text-white uppercase italic">{pen.address}</h4><span className="text-[8px] font-black text-red-400 bg-red-500/10 px-2 py-1 rounded">Bis: {formatDate(pen.deadline)}</span></div>
                                        <p className="text-[11px] font-bold text-slate-300 leading-relaxed border-l-2 border-blue-400 pl-3">{pen.description}</p>
                                        {pen.images?.length>0 && <div className="flex gap-2 overflow-x-auto py-2">{pen.images.map((img,idx)=><img key={idx} src={img} className="w-20 h-20 object-cover rounded-lg border border-white/10"/>)}</div>}
                                        <div className="grid grid-cols-2 gap-2 pt-2">
                                            <button onClick={()=>triggerDownloadPDF(pen)} className="py-4 bg-blue-500/20 border border-blue-500/40 text-blue-400 rounded-xl font-black uppercase text-[9px] flex items-center justify-center gap-2">PDF</button>
                                            <button onClick={()=>markPendenzDone(pen.id)} className="py-4 bg-emerald-500 text-white rounded-xl font-black uppercase text-[9px] shadow-lg shadow-emerald-500/10 active:scale-95 transition-transform">ERLEDIGT</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view==='worker_edit') return (
                <div className="min-h-screen bg-slate-800 flex flex-col page-transition">
                    <header className="p-4 flex items-center gap-4 glass shadow-sm">
                        <button onClick={()=>setView('worker_list')} className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center text-blue-400"><Icon name="arrow-left" size={20}/></button>
                        <div style={{flex:1,minWidth:0}}>
                            <div className="text-[10px] font-black text-white uppercase italic truncate">{selectedObject?.address}</div>
                            <div className="text-[9px] font-bold text-blue-300 uppercase mt-0.5">{selectedObject?.customer}</div>
                            <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                                {selectedObject?.deliveryDate && (
                                    <div style={{display:'inline-flex',alignItems:'center',gap:3,background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:4,padding:'1px 6px'}}>
                                        <span style={{fontSize:8,color:'#60a5fa',fontWeight:900}}>📅 {formatDate(selectedObject.deliveryDate)}</span>
                                    </div>
                                )}
                                {selectedObject?.auftragsNr && (
                                    <div style={{display:'inline-flex',alignItems:'center',background:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:4,padding:'1px 6px'}}>
                                        <span style={{fontSize:8,color:'#a5b4fc',fontWeight:900}}>#{cleanAuftragsNr(selectedObject.auftragsNr)}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>
                    {/* Memo Banner — gross und deutlich für den Monteur */}
                    {(selectedObject?.memo||selectedObject?.houseInfo) && (
                        <div style={{background:'rgba(245,158,11,0.15)',borderBottom:'2px solid rgba(245,158,11,0.4)',padding:'10px 20px',display:'flex',alignItems:'flex-start',gap:8}}>
                            <span style={{fontSize:18,flexShrink:0}}>📝</span>
                            <div>
                                <div style={{fontSize:8,color:'#f59e0b',fontWeight:900,textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>Wichtige Hausinfo / Memo</div>
                                <div style={{fontSize:13,color:'#fde68a',fontWeight:900,lineHeight:1.4}}>{selectedObject.memo||selectedObject.houseInfo}</div>
                            </div>
                        </div>
                    )}
                    <main className="p-6 space-y-4 max-w-md mx-auto w-full">
                        <button onClick={()=>setWorkerStatusMode('partial')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode==='partial'?'bg-blue-500 border-blue-300':'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.partial}</span>
                            {workerStatusMode==='partial' && <input type="number" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center" placeholder={t.placeholderNum} value={workerRemaining} onChange={e=>setWorkerRemaining(e.target.value)} onClick={e=>e.stopPropagation()}/>}
                        </button>
                        <button onClick={()=>setWorkerStatusMode('finished')} className={`w-full p-5 rounded-2xl border flex items-center justify-between ${workerStatusMode==='finished'?'bg-emerald-500 border-emerald-300':'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.finished}</span><Icon name="check-circle" size={24}/>
                        </button>
                        <button onClick={()=>setWorkerStatusMode('blocked')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode==='blocked'?'bg-red-500 border-red-300':'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.blocked}</span>
                            {workerStatusMode==='blocked' && <textarea className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px]" placeholder={t.reason} value={workerBlockReason} onChange={e=>setWorkerBlockReason(e.target.value)} onClick={e=>e.stopPropagation()}/>}
                        </button>
                        <div className="h-px bg-white/10 my-4"></div>
                        <button onClick={()=>setWorkerStatusMode('hours')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode==='hours'?'bg-blue-600 border-blue-400 shadow-lg':'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.hours}</span>
                            {workerStatusMode==='hours' && (
                                <div className="space-y-3 pt-2" onClick={e=>e.stopPropagation()}>
                                    <select className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px] font-bold" value={workerHoursName} onChange={e=>setWorkerHoursName(e.target.value)}>
                                        <option value="" className="text-slate-800">Name wählen...</option>
                                        {monteurs.map(m=><option key={m.id} value={m.name} className="text-slate-800">{m.name}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" step="0.5" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center" placeholder="Std (z.B. 8.5)" value={workerHours} onChange={e=>setWorkerHours(e.target.value)}/>
                                        <input type="date" className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px] font-bold" value={workerHoursDate} onChange={e=>setWorkerHoursDate(e.target.value)}/>
                                    </div>
                                </div>
                            )}
                        </button>
                        {workerStatusMode && <button onClick={submitWorkerUpdate} className="w-full py-5 bg-white text-slate-800 rounded-2xl font-black uppercase tracking-widest text-[11px] mt-6 shadow-2xl">Senden</button>}
                    </main>
                </div>
            );

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
