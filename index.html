<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Montage Manager Pro Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Bibliothek für direkten PDF-Download hinzugefügt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, addDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD25cVhiguQKP4PTD8evGI4CxSh7rglbBs",
            authDomain: "montage-pe-a5f79.firebaseapp.com",
            projectId: "montage-pe-a5f79",
            storageBucket: "montage-pe-a5f79.firebasestorage.app",
            messagingSenderId: "588324363042",
            appId: "1:588324363042:web:c544a07261f62de427237b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseSDK = { db, auth, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, addDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        :root { 
            --primary: #60a5fa; 
            --bg-main: #1e293b; 
            --card-bg: #334155;
            --accent: #38bdf8;
        }
        body { 
            overscroll-behavior-y: contain; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased; 
        }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(51, 65, 85, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: #334155; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .page-transition { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        .badge-pulse { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
            50% { box-shadow: 0 0 15px 5px rgba(56, 189, 248, 0.3); background-color: rgba(56, 189, 248, 0.4); border-color: rgba(56, 189, 248, 1); } 
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
        }
        
        /* Das Print-Areal wird für html2pdf genutzt, bleibt aber im UI unsichtbar */
        #print-area { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo } = React;

        const translations = {
            de: { partial: "Offen zum montieren", finished: "Fertig montiert", blocked: "Blockiert / Problem", openItems: "Offen?", reason: "Grund...", submit: "Senden", cancel: "Abbrechen", placeholderNum: "Zahl...", back: "Zurück", search: "Suchen..." },
            sq: { partial: "Hapur për montim", finished: "Përfunduar", blocked: "Bllokuar", openItems: "Hapur?", reason: "Arsyeja...", submit: "Dërgo", cancel: "Anulo", placeholderNum: "Numri...", back: "Mbrapa", search: "Kërko..." },
            it: { partial: "Aperto per il montaggio", finished: "Finito", blocked: "Bloccato", openItems: "Aperti?", reason: "Motivo...", submit: "Invia", cancel: "Indietro", placeholderNum: "Num...", back: "Indietro", search: "Cerca..." }
        };

        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide-name', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, nameAttr: 'data-lucide-name' });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;
        });

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";

        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [workerSearchTerm, setWorkerSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);
            const [editObject, setEditObject] = useState(null); 
            const [importText, setImportText] = useState('');
            const [isImporting, setIsImporting] = useState(false);
            const [selectedObject, setSelectedObject] = useState(null);
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('de');
            const [adminFilter, setAdminFilter] = useState('all'); 
            const [workerStatusMode, setWorkerStatusMode] = useState(''); 
            const [workerRemaining, setWorkerRemaining] = useState('');
            const [workerBlockReason, setWorkerBlockReason] = useState('');
            const [objects, setObjects] = useState([]);
            
            const [pendenzen, setPendenzen] = useState([]);
            const [showPendenzModal, setShowPendenzModal] = useState(null);
            const [pendenzForm, setPendenzForm] = useState({ description: '', deadline: '', monteur: '', images: [] });
            
            const [showMyPendenzen, setShowMyPendenzen] = useState(null);
            const [printData, setPrintData] = useState(null);

            const appId = 'montage-pe-a5f79';
            const t = translations[lang];

            useEffect(() => {
                const initLiveSync = async () => {
                    if (!window.FirebaseSDK) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot, query } = window.FirebaseSDK;
                    try { await signInAnonymously(auth); } catch(e) {}
                    const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            const objRef = collection(db, 'artifacts', appId, 'public', 'data', 'objects');
                            const unsubscribeObjects = onSnapshot(query(objRef), (snapshot) => {
                                setObjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                            });
                            const penRef = collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen');
                            const unsubscribePendenzen = onSnapshot(query(penRef), (snapshot) => {
                                setPendenzen(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                            });
                            return () => { unsubscribeObjects(); unsubscribePendenzen(); };
                        }
                    });
                    return () => unsubscribeAuth();
                };
                initLiveSync();
            }, []);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) setPin(newPin);
                else {
                    if (newPin === ADMIN_PIN) setView('dashboard');
                    else if (newPin === WORKER_PIN) setView('worker_list');
                    setPin('');
                }
            };

            const processTextImport = async () => {
                if (!importText.trim()) return;
                setIsImporting(true);
                const lines = importText.split(/\r?\n/);
                let currentDay = new Date();
                const newObjects = [];
                const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i;

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const dayMatch = trimmed.match(dayRegex);
                    if (dayMatch) {
                        const [_, dName, dStr] = dayMatch;
                        const [d, m, y] = dStr.split('.');
                        currentDay = new Date(y, m - 1, d);
                        continue;
                    }
                    if (trimmed.toUpperCase().startsWith("LIEFERUNG")) {
                        const content = trimmed.replace(/^LIEFERUNG\s*/i, "").trim();
                        const addressRegex = /([A-ZÄÖÜa-zäöüß\s\.\-]+\s\d*[a-z]?,\s\d{4,5}\s[A-ZÄÖÜa-zäöüß\s\.\-]+)/;
                        const addressMatch = content.match(addressRegex);
                        let address = addressMatch ? addressMatch[0].trim() : "Unbekannte Adresse";
                        const parts = content.split(address);
                        let customer = parts[0]?.trim().replace(/,$/, '') || "Kunde";
                        let remainder = parts[1]?.trim() || "";
                        const eleMatch = remainder.match(/(\d+)\s?ELE/i);
                        const houseMatch = remainder.match(/(Haus\s?\d+)/i);
                        const objId = `obj-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
                        newObjects.push({
                            id: objId, name: address, customer, address,
                            houseInfo: houseMatch ? houseMatch[0] : "Gesamtmontage",
                            target: eleMatch ? parseInt(eleMatch[1]) : 1,
                            current: 0, lastRemaining: null, blockReason: null, 
                            deliveryDate: currentDay.toISOString(), status: 'active', history: []
                        });
                    }
                }
                if (newObjects.length > 0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const obj of newObjects) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), obj);
                }
                setIsImporting(false); setImportText(''); setShowImportModal(false);
            };

            const submitWorkerUpdate = async () => {
                const now = new Date().toISOString();
                const { db, doc, updateDoc } = window.FirebaseSDK;
                const obj = selectedObject;
                let updates = { history: [{ date: now, mode: workerStatusMode, detail: workerStatusMode === 'blocked' ? workerBlockReason : workerRemaining }, ...(obj.history || [])] };
                if (workerStatusMode === 'finished') updates = { ...updates, current: obj.target, status: 'finished', finishedAt: now, lastRemaining: 0, blockReason: null };
                else if (workerStatusMode === 'blocked') updates = { ...updates, status: 'blocked', blockReason: workerBlockReason };
                else if (workerStatusMode === 'partial') {
                    const open = parseInt(workerRemaining) || 0;
                    updates = { ...updates, current: Math.max(0, obj.target - open), status: 'active', lastRemaining: open, blockReason: null };
                }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), updates);
                setWorkerStatusMode(''); setWorkerRemaining(''); setWorkerBlockReason(''); setView('worker_list');
            };

            const saveManualEdit = async () => {
                if (!editObject) return;
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', editObject.id), {
                    address: editObject.address, customer: editObject.customer, houseInfo: editObject.houseInfo, target: parseInt(editObject.target) || 0
                });
                setEditObject(null);
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setPendenzForm(prev => ({ ...prev, images: [...prev.images, ev.target.result] }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const submitPendenz = async () => {
                if (!pendenzForm.description || !pendenzForm.monteur) return;
                const { db, addDoc, collection } = window.FirebaseSDK;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen'), {
                    objectId: showPendenzModal.id, address: showPendenzModal.address, description: pendenzForm.description,
                    deadline: pendenzForm.deadline, monteur: pendenzForm.monteur.trim(), images: pendenzForm.images, status: 'open', createdAt: new Date().toISOString()
                });
                setShowPendenzModal(null); setPendenzForm({ description: '', deadline: '', monteur: '', images: [] });
            };

            const markPendenzDone = async (pId) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pendenzen', pId), { status: 'done', doneAt: new Date().toISOString() });
            };

            // ANGEPASSTE FUNKTION FÜR DIREKTEN PDF-DOWNLOAD
            const triggerDownloadPDF = (data) => {
                setPrintData(data);
                
                // Kurze Verzögerung um sicherzustellen, dass React das Hidden-Div gerendert hat
                setTimeout(() => {
                    const element = document.getElementById('print-area-content');
                    if (!element) return;

                    const opt = {
                        margin:       [15, 15],
                        filename:     `Pendenz_${data.monteur.replace(/\s+/g, '_')}_${new Date().toLocaleDateString('de-DE').replace(/\./g, '-')}.pdf`,
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    // Direkter Download
                    html2pdf().set(opt).from(element).save().then(() => {
                        setPrintData(null);
                    });
                }, 100);
            };

            const stats = useMemo(() => {
                let total = 0, done = 0, blocked = 0, partial = 0;
                objects.forEach(obj => {
                    total += obj.target; done += obj.current;
                    if (obj.status === 'blocked') blocked++;
                    if (obj.lastRemaining > 0 && obj.status !== 'finished' && obj.status !== 'blocked') partial++;
                });
                return { open: objects.filter(o => o.status === 'active').length, percent: total > 0 ? Math.round((done/total)*100) : 0, blocked, partial, pendenzen: pendenzen.filter(p => p.status === 'open').length };
            }, [objects, pendenzen]);

            const filteredObjectsAdmin = useMemo(() => {
                let list = objects;
                if (adminFilter === 'blocked') list = list.filter(o => o.status === 'blocked');
                else if (adminFilter === 'partial') list = list.filter(o => o.lastRemaining > 0 && o.status !== 'finished' && o.status !== 'blocked');
                else if (adminFilter === 'pendenzen') {
                    const idsWithPendenzen = new Set(pendenzen.filter(p => p.status === 'open').map(p => p.objectId));
                    list = list.filter(o => idsWithPendenzen.has(o.id));
                }
                return list.filter(o => o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, adminFilter, searchTerm, pendenzen]);

            const filteredObjectsWorker = useMemo(() => {
                return objects
                    .filter(o => o.status !== 'finished')
                    .filter(o => o.address.toLowerCase().includes(workerSearchTerm.toLowerCase()) || o.customer.toLowerCase().includes(workerSearchTerm.toLowerCase()));
            }, [objects, workerSearchTerm]);

            const activeMonteurs = useMemo(() => {
                const names = new Set();
                pendenzen.filter(p => p.status === 'open').forEach(p => {
                    if (p.monteur) names.add(p.monteur.trim());
                });
                return Array.from(names).sort();
            }, [pendenzen]);

            const PrintArea = () => {
                if (!printData) return null;
                return (
                    <div id="print-area" className="hidden">
                        <div id="print-area-content" className="p-8 bg-white text-black" style={{ fontFamily: 'Inter, sans-serif' }}>
                            <div className="border-b-4 border-black pb-4 mb-6">
                                <h1 className="text-3xl font-black uppercase italic text-black">Pendenz-Report</h1>
                            </div>
                            <div className="space-y-6">
                                <div><h2 className="text-[10px] font-black uppercase text-slate-500 mb-1">Objekt</h2><p className="text-xl font-bold">{printData.address}</p></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><h2 className="text-[10px] font-black uppercase text-slate-500 mb-1">Monteur</h2><p className="text-lg font-bold">{printData.monteur}</p></div>
                                    <div><h2 className="text-[10px] font-black uppercase text-slate-500 mb-1">Frist</h2><p className="text-lg font-bold">{formatDate(printData.deadline)}</p></div>
                                </div>
                                <div><h2 className="text-[10px] font-black uppercase text-slate-500 mb-1">Mangel</h2><p className="text-base font-medium border-l-2 border-black pl-4">{printData.description}</p></div>
                                {printData.images?.length > 0 && (
                                    <div className="grid grid-cols-2 gap-2 pt-4">
                                        {printData.images.map((img, i) => <img key={i} src={img} className="w-full h-64 object-cover border" />)}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-800">
                    <div className="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white" /></div>
                    <h1 className="text-2xl font-black text-white italic mb-10 uppercase tracking-tight">Montage Manager</h1>
                    <div className="flex gap-3 mb-10">{[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-400 transition-all ${pin.length > i ? 'bg-blue-400 scale-110' : 'bg-transparent opacity-20'}`} />)}</div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">{n}</button>)}
                        <button onClick={() => setPin('')} className="h-16 flex items-center justify-center text-slate-400"><Icon name="delete" size={24}/></button>
                        <button onClick={() => handleLogin('0')} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">0</button>
                    </div>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea />
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center no-print">
                        <h2 className="text-sm font-black text-white italic uppercase tracking-widest">Admin Panel</h2>
                        <button onClick={() => setView('login')} className="p-2 text-slate-400 hover:text-white transition-colors"><Icon name="log-out" size={18}/></button>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6 no-print">
                        <div className="grid grid-cols-5 gap-2">
                            {[ 
                                { label: 'Aktiv', val: stats.open, color: 'blue', filter: 'all' },
                                { label: 'Blockiert', val: stats.blocked, color: 'red', filter: 'blocked' },
                                { label: 'Teilweise', val: stats.partial, color: 'orange', filter: 'partial' },
                                { label: 'Pendenzen', val: stats.pendenzen, color: 'amber', filter: 'pendenzen' },
                                { label: 'Status', val: `${stats.percent}%`, color: 'emerald', filter: null }
                            ].map((s,i) => (
                                <div key={i} onClick={() => s.filter && setAdminFilter(s.filter)} className={`card-gradient p-2 rounded-xl border transition-all cursor-pointer ${adminFilter === s.filter ? `border-${s.color}-400` : 'border-white/5'}`}>
                                    <p className="text-[7px] font-black text-slate-400 uppercase tracking-tighter">{s.label}</p>
                                    <div className={`text-lg font-black ${s.color === 'emerald' ? 'text-emerald-400' : s.color === 'blue' ? 'text-blue-400' : s.color === 'red' ? 'text-red-400' : s.color === 'amber' ? 'text-amber-400' : 'text-orange-400'}`}>{s.val}</div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setShowImportModal(true)} className="w-full bg-blue-500 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-500/10">Dispo-Text Importieren</button>
                        <div className="space-y-3">
                            <div className="relative mb-4">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input type="text" className="w-full bg-slate-900/50 border border-white/5 rounded-xl py-4 pl-12 pr-4 text-xs text-white" placeholder="Objekt suchen..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            {filteredObjectsAdmin.map(obj => (
                                <div key={obj.id} onClick={() => setEditObject(obj)} className={`card-gradient rounded-xl border p-4 relative cursor-pointer ${obj.status === 'blocked' ? 'border-red-400/40' : 'border-white/5'}`}>
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="text-xs font-black text-white italic uppercase">{obj.address}</h3>
                                        <button onClick={(e) => { e.stopPropagation(); setShowPendenzModal(obj); }} className="px-2 py-1 bg-amber-500/20 border border-amber-500/40 rounded text-amber-500 text-[8px] font-black uppercase">Pendenzen melden</button>
                                    </div>
                                    <p className="text-[10px] font-bold text-blue-300 mb-2 uppercase">{obj.customer} | {obj.houseInfo}</p>
                                    <div className="flex items-center justify-between">
                                        <span className="text-[8px] text-slate-400 font-bold uppercase">{formatDate(obj.deliveryDate)}</span>
                                        <span className="text-[10px] font-black text-white">{obj.current}/{obj.target} ELE</span>
                                    </div>
                                    <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden"><div className={`h-full ${obj.status === 'blocked' ? 'bg-red-500' : 'bg-blue-400'}`} style={{width: `${(obj.current/obj.target)*100}%`}}></div></div>
                                </div>
                            ))}
                        </div>
                    </main>
                    {editObject && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-4"><div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4"><h3 className="text-xs font-black text-white uppercase italic">Bearbeiten</h3><div className="space-y-3"><input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.address} onChange={(e) => setEditObject({...editObject, address: e.target.value})} /></div><div className="grid grid-cols-2 gap-3"><button onClick={() => setEditObject(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button><button onClick={saveManualEdit} className="bg-blue-500 py-4 rounded-xl text-[10px] font-black uppercase text-white">Speichern</button></div></div></div>
                    )}
                    {showPendenzModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4 my-auto">
                                <h3 className="text-xs font-black text-white uppercase italic">Pendenz melden</h3>
                                <textarea className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] h-24" placeholder="Mangel..." value={pendenzForm.description} onChange={(e) => setPendenzForm({...pendenzForm, description: e.target.value})} />
                                <input type="text" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" placeholder="Monteur Name (z.B. Spyro)..." value={pendenzForm.monteur} onChange={(e) => setPendenzForm({...pendenzForm, monteur: e.target.value})} />
                                <input type="date" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px]" value={pendenzForm.deadline} onChange={(e) => setPendenzForm({...pendenzForm, deadline: e.target.value})} />
                                
                                <div className="space-y-2">
                                    <p className="text-[10px] font-black text-slate-400 uppercase">Fotos hinzufügen</p>
                                    <input type="file" multiple accept="image/*" onChange={handleFileChange} className="hidden" id="admin-file-upload" />
                                    <label htmlFor="admin-file-upload" className="w-full p-4 border border-dashed border-white/20 rounded-xl flex items-center justify-center text-slate-400 cursor-pointer hover:bg-white/5 transition-colors">
                                        <Icon name="camera" size={20} className="mr-2" /> <span className="text-[10px] font-bold uppercase">Wählen</span>
                                    </label>
                                    <div className="flex gap-2 overflow-x-auto pb-2">
                                        {pendenzForm.images.map((img, i) => (
                                            <div key={i} className="relative w-16 h-16 shrink-0">
                                                <img src={img} className="w-full h-full object-cover rounded-lg border border-white/10" />
                                                <button onClick={() => setPendenzForm(p => ({...p, images: p.images.filter((_, idx) => idx !== i)}))} className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full flex items-center justify-center text-[10px]"><Icon name="x" size={10} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setShowPendenzModal(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button>
                                    <button onClick={submitPendenz} className="bg-amber-500 py-4 rounded-xl text-[10px] font-black uppercase text-white">Senden</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showImportModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col"><textarea className="flex-1 w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-[11px] text-white" placeholder="Dispo-Text hierher..." value={importText} onChange={(e) => setImportText(e.target.value)} /><div className="grid grid-cols-2 gap-4 mt-6"><button onClick={() => setShowImportModal(false)} className="py-4 text-slate-500 font-black uppercase">Abbrechen</button><button onClick={processTextImport} className="bg-blue-500 text-white py-4 rounded-xl font-black">Import</button></div></div>
                    )}
                </div>
            );

            if (view === 'worker_list') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea />
                    
                    <header className="p-6 flex flex-col items-center border-b border-white/5 glass no-print">
                        <div className="w-full flex justify-end mb-2">
                             <button onClick={() => setView('login')} className="text-slate-500"><Icon name="power" size={16}/></button>
                        </div>
                        
                        <div className="w-full flex flex-col items-center space-y-3">
                            {activeMonteurs.length > 0 ? (
                                <div className="w-full flex flex-col items-center gap-3">
                                    {activeMonteurs.map(name => {
                                        const count = pendenzen.filter(p => p.monteur?.toLowerCase() === name.toLowerCase() && p.status === 'open').length;
                                        return (
                                            <button 
                                                key={name}
                                                onClick={() => setShowMyPendenzen(name)}
                                                className="w-full max-w-sm py-3 px-4 rounded-[1.2rem] flex flex-col items-center justify-center gap-0.5 transition-all border-2 shadow-md badge-pulse bg-blue-500/20 border-blue-400/60 scale-[1.0]"
                                            >
                                                <span className="text-[7px] font-black text-slate-400 uppercase tracking-[0.15em]">PENDENZ FÜR</span>
                                                <h1 className="text-base font-black text-white uppercase tracking-tight italic">{name}</h1>
                                                <div className="mt-1 flex items-center gap-1.5 bg-blue-500 text-white px-2 py-0.5 rounded-full text-[7px] font-black uppercase">
                                                    {count} Pendenzen
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="w-full max-w-sm py-5 px-4 rounded-[1.2rem] border-2 border-white/5 bg-slate-700/30 flex flex-col items-center opacity-40">
                                    <span className="text-[7px] font-black text-slate-500 uppercase tracking-[0.15em]">MONTEUR STATUS</span>
                                    <h1 className="text-xs font-black text-slate-500 uppercase italic">Keine Pendenzen offen</h1>
                                </div>
                            )}
                        </div>

                        <div className="flex gap-2 justify-center mt-4">
                            {['de', 'sq', 'it'].map(l => <button key={l} onClick={() => setLang(l)} className={`px-2.5 py-1 rounded-lg text-[8px] font-bold border transition-all ${lang === l ? 'bg-blue-500 border-blue-400 text-white' : 'bg-slate-700 border-white/5 text-slate-400'}`}>{l.toUpperCase()}</button>)}
                        </div>
                    </header>

                    <main className="p-4 space-y-3 no-print">
                        <div className="relative mb-6">
                            <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                            <input 
                                type="text" 
                                className="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-[11px] text-white font-bold" 
                                placeholder={t.search} 
                                value={workerSearchTerm} 
                                onChange={(e) => setWorkerSearchTerm(e.target.value)} 
                            />
                        </div>

                        <div className="flex items-center justify-between px-2 mb-2">
                             <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Verfügbare Montagen</h4>
                             <div className="h-[1px] flex-1 bg-white/5 ml-4"></div>
                        </div>
                        {filteredObjectsWorker.map(obj => (
                            <button key={obj.id} onClick={() => { setSelectedObject(obj); setView('worker_edit'); }} className="w-full bg-slate-700/60 rounded-xl border border-white/5 p-5 text-left flex justify-between items-center active:bg-slate-700 border-l-4 border-l-blue-400 shadow-lg">
                                <div>
                                    <h3 className="text-xs font-black text-white uppercase italic truncate max-w-[220px] mb-1">{obj.address}</h3>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{obj.customer} • {obj.houseInfo}</p>
                                </div>
                                <Icon name="arrow-right" size={18} className="text-blue-400" />
                            </button>
                        ))}
                    </main>

                    {showMyPendenzen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col page-transition overflow-y-auto no-print">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-sm font-black text-white uppercase italic">Pendenzen: {showMyPendenzen}</h3>
                                <button onClick={() => setShowMyPendenzen(null)} className="p-2 text-slate-500"><Icon name="x" size={24}/></button>
                            </div>
                            <div className="space-y-4">
                                {pendenzen.filter(p => p.monteur?.toLowerCase() === showMyPendenzen?.toLowerCase() && p.status === 'open').map(pen => (
                                    <div key={pen.id} className="card-gradient rounded-2xl p-5 border border-white/5 space-y-3">
                                        <div className="flex justify-between items-start">
                                            <h4 className="text-[11px] font-black text-white uppercase italic">{pen.address}</h4>
                                            <span className="text-[8px] font-black text-red-400 bg-red-500/10 px-2 py-1 rounded">Bis: {formatDate(pen.deadline)}</span>
                                        </div>
                                        <p className="text-[11px] font-bold text-slate-300 leading-relaxed border-l-2 border-blue-400 pl-3">{pen.description}</p>
                                        
                                        {pen.images?.length > 0 && (
                                            <div className="flex gap-2 overflow-x-auto py-2">
                                                {pen.images.map((img, idx) => (
                                                    <img key={idx} src={img} className="w-20 h-20 object-cover rounded-lg border border-white/10 shrink-0" />
                                                ))}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-2 gap-2 pt-2">
                                            {/* GEÄNDERTER PDF-DOWNLOAD BUTTON */}
                                            <button onClick={() => triggerDownloadPDF(pen)} className="py-4 bg-blue-500/20 border border-blue-500/40 text-blue-400 rounded-xl font-black uppercase text-[9px] flex items-center justify-center gap-2 active:bg-blue-500/30">
                                                <Icon name="download" size={14} /> PDF HERUNTERLADEN
                                            </button>
                                            <button onClick={() => markPendenzDone(pen.id)} className="py-4 bg-emerald-500 text-white rounded-xl font-black uppercase text-[9px] shadow-lg shadow-emerald-500/10 active:scale-95 transition-transform">ERLEDIGT</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'worker_edit') return (
                <div className="min-h-screen bg-slate-800 flex flex-col page-transition">
                    <header className="p-4 flex items-center gap-4 glass shadow-sm">
                        <button onClick={() => setView('worker_list')} className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center text-blue-400"><Icon name="arrow-left" size={20}/></button>
                        <h2 className="text-[10px] font-black text-white uppercase italic truncate">{selectedObject?.address}</h2>
                    </header>
                    <main className="p-6 space-y-4 max-w-md mx-auto w-full">
                        <button onClick={() => setWorkerStatusMode('partial')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode === 'partial' ? 'bg-blue-500 border-blue-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.partial}</span>
                            {workerStatusMode === 'partial' && <input type="number" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center" placeholder={t.placeholderNum} value={workerRemaining} onChange={(e) => setWorkerRemaining(e.target.value)} onClick={(e) => e.stopPropagation()} />}
                        </button>
                        <button onClick={() => setWorkerStatusMode('finished')} className={`w-full p-5 rounded-2xl border flex items-center justify-between ${workerStatusMode === 'finished' ? 'bg-emerald-500 border-emerald-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.finished}</span><Icon name="check-circle" size={24}/>
                        </button>
                        <button onClick={() => setWorkerStatusMode('blocked')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 ${workerStatusMode === 'blocked' ? 'bg-red-500 border-red-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.blocked}</span>
                            {workerStatusMode === 'blocked' && <textarea className="w-full bg-white/20 rounded-xl p-3 text-white text-[10px]" placeholder={t.reason} value={workerBlockReason} onChange={(e) => setWorkerBlockReason(e.target.value)} onClick={(e) => e.stopPropagation()} />}
                        </button>
                        {workerStatusMode && <button onClick={submitWorkerUpdate} className="w-full py-5 bg-white text-slate-800 rounded-2xl font-black uppercase tracking-widest text-[11px] mt-6 shadow-2xl">Senden</button>}
                    </main>
                </div>
            );
            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
