        .paste-target-col { background: rgba(245, 158, 11, 0.08) !important; }
        .paste-target-col:hover { background: rgba(245, 158, 11, 0.18) !important; cursor: copy; }

        /* PDF loading overlay */
        .pdf-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15,23,42,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .pdf-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(96,165,250,0.2);
            border-top: 4px solid #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

        const translations = {
            de: { partial: "Offen zum montieren", finished: "Fertig montiert", blocked: "Blockiert / Problem", hours: "Stunden erfassen", openItems: "Offen?", reason: "Grund...", submit: "Senden", cancel: "Abbrechen", placeholderNum: "Zahl...", back: "Zurück", search: "Suchen..." },
            sq: { partial: "Hapur për montim", finished: "Përfunduar", blocked: "Bllokuar", hours: "Regjistro orët", openItems: "Hapur?", reason: "Arsyeja...", submit: "Dërgo", cancel: "Anulo", placeholderNum: "Numri...", back: "Mbrapa", search: "Kërko..." },
            it: { partial: "Aperto per il montaggio", finished: "Finito", blocked: "Bloccato", hours: "Registra ore", openItems: "Aperti?", reason: "Motivo...", submit: "Invia", cancel: "Indietro", placeholderNum: "Num...", back: "Indietro", search: "Cerca..." },
            bg: { partial: "Отворено за монтаж", finished: "Завършено", blocked: "Блокирано", hours: "Запис часове", openItems: "Отворено?", reason: "Причина...", submit: "Изпрати", cancel: "Отказ", placeholderNum: "Число...", back: "Назад", search: "Търси..." },
            cs: { partial: "Otevřeno pro montáž", finished: "Hotovo", blocked: "Blokováno", hours: "Zaznamenat hodiny", openItems: "Otevřeno?", reason: "Důvod...", submit: "Odeslat", cancel: "Zrušit", placeholderNum: "Číslo...", back: "Zpět", search: "Hledat..." },
            el: { partial: "Ανοιχτό για μοντάρισμα", finished: "Ολοκληρώθηκε", blocked: "Μπλοκαρισμένο", hours: "Καταγραφή ωρών", openItems: "Ανοιχτό;", reason: "Αιτία...", submit: "Αποστολή", cancel: "Ακύρωση", placeholderNum: "Αριθμός...", back: "Πίσω", search: "Αναζήτηση..." }
        };

        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide-name', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, nameAttr: 'data-lucide-name' });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;
        });

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const getCalWeekDays = (base) => {
            const d = new Date(base);
            const day = d.getDay();
            const diffToMon = (day === 0) ? -6 : 1 - day;
            const mon = new Date(d.getFullYear(), d.getMonth(), d.getDate() + diffToMon);
            return Array.from({length: 6}, (_, i) => {
                return new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + i);
            });
        };

        const toLocalDateStr = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const CARD_COLORS = ['#cfe2ff','#d1e7dd','#fff3cd','#f8d7da','#e2d9f3','#d0f4de','#fce4ec','#e8f5e9','#fff8e1','#e3f2fd','#f3e5f5','#e0f7fa'];
        const CARD_BORDER = ['#0d6efd','#198754','#ffc107','#dc3545','#6f42c1','#20c997','#e91e63','#4caf50','#ff9800','#2196f3','#9c27b0','#00bcd4'];
        const CARD_TEXT  = ['#052c65','#0a3622','#664d03','#58151c','#2c1654','#0a3622','#560a21','#1b5e20','#4d3700','#0d2b6e','#3b0764','#003d47'];

        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";
        const HOURS_PIN = "8888";

        // ─────────────────────────────────────────────────────────────
        // RELIABLE PDF GENERATION using jsPDF directly
        // This avoids all rendering/timing issues with html2pdf hidden elements
        // ─────────────────────────────────────────────────────────────
        const generateHoursPDF = (summary, selectedDate, hourLogs) => {
            return new Promise((resolve) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
                
                const now = new Date(selectedDate);
                const dayOfWeek = now.getDay();
                const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
                const startOfWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1));
                startOfWeek.setHours(0,0,0,0);
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(endOfWeek.getDate() + 7);
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                const kw = getWeekNumber(selectedDate);
                const dateRangeStr = `${formatDate(toLocalDateStr(startOfWeek))} - ${formatDate(toLocalDateStr(new Date(endOfWeek.getTime() - 1)))}`;
                
                const currentWeekLogs = (summary.logs || [])
                    .filter(l => {
                        const d = new Date(l.date);
                        return d >= startOfWeek && d < endOfWeek && (parseFloat(l.hours) || 0) > 0;
                    })
                    .sort((a, b) => new Date(a.date) - new Date(b.date));

                const pageW = 210;
                const pageH = 297;
                const margin = 20;
                const contentW = pageW - margin * 2;
                let y = 25;

                // ── HEADER ──
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.5);

                // Title
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(26);
                doc.setTextColor(0, 0, 0);
                doc.text('STUNDENBERICHT', margin, y);

                // KW top right
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');
                doc.text(`KW ${kw}`, pageW - margin, y - 4, { align: 'right' });
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 100, 100);
                doc.text(dateRangeStr, pageW - margin, y + 3, { align: 'right' });

                // Subtitle
                doc.setFontSize(11);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text('Montage Manager Pro', margin, y + 7);

                y += 14;
                doc.line(margin, y, pageW - margin, y);
                y += 10;

                // ── MONTEUR NAME ──
                doc.setFontSize(9);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(120, 120, 120);
                doc.text('MONTEUR', margin, y);
                y += 6;
                doc.setFontSize(20);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text(summary.name.toUpperCase(), margin, y);
                y += 14;

                // ── STATS BOXES ──
                const boxW = (contentW - 8) / 3;
                const boxH = 18;
                const boxes = [
                    { label: 'WOCHE TOTAL', value: `${summary.week}h`, color: [37, 99, 235] },
                    { label: 'MONAT TOTAL', value: `${summary.month}h`, color: [16, 185, 129] },
                    { label: 'GESAMT', value: `${summary.total}h`, color: [0, 0, 0] },
                ];
                boxes.forEach((box, i) => {
                    const bx = margin + i * (boxW + 4);
                    doc.setDrawColor(220, 220, 220);
                    doc.setLineWidth(0.3);
                    doc.setFillColor(250, 250, 250);
                    doc.roundedRect(bx, y, boxW, boxH, 2, 2, 'FD');
                    doc.setFontSize(7);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(140, 140, 140);
                    doc.text(box.label, bx + 4, y + 6);
                    doc.setFontSize(16);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(...box.color);
                    doc.text(box.value, bx + 4, y + 14);
                });
                y += boxH + 12;

                // ── WEEK DETAIL TABLE HEADER ──
                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text(`DETAIL-EINTRÄGE KW ${kw}`, margin, y);
                y += 3;
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.4);
                doc.line(margin, y, pageW - margin, y);
                y += 7;

                // Table header row
                const col1 = margin;
                const col2 = margin + 35;
                const col3 = pageW - margin;
                doc.setFontSize(8);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('DATUM', col1, y);
                doc.text('OBJEKT / ADRESSE', col2, y);
                doc.text('STUNDEN', col3, y, { align: 'right' });
                y += 2;
                doc.setDrawColor(180, 180, 180);
                doc.setLineWidth(0.3);
                doc.line(margin, y, pageW - margin, y);
                y += 6;

                // Table rows
                if (currentWeekLogs.length === 0) {
                    doc.setFontSize(10);
                    doc.setFont('helvetica', 'italic');
                    doc.setTextColor(160, 160, 160);
                    doc.text('Keine Einträge diese Woche.', margin + contentW / 2, y + 6, { align: 'center' });
                    y += 16;
                } else {
                    currentWeekLogs.forEach((log, i) => {
                        // Check if we need a new page
                        if (y > pageH - 50) {
                            doc.addPage();
                            y = 25;
                        }
                        
                        const rowBg = i % 2 === 0;
                        if (rowBg) {
                            doc.setFillColor(248, 250, 252);
                            doc.rect(margin - 1, y - 4, contentW + 2, 10, 'F');
                        }
                        
                        doc.setFontSize(10);
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(0, 0, 0);
                        doc.text(formatDate(log.date), col1, y);
                        
                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(40, 40, 40);
                        // Truncate long address
                        const addr = (log.address || '').length > 45 ? (log.address || '').substring(0, 45) + '…' : (log.address || '');
                        doc.text(addr, col2, y);
                        
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(37, 99, 235);
                        doc.text(`${log.hours}h`, col3, y, { align: 'right' });
                        
                        y += 2;
                        doc.setDrawColor(230, 230, 230);
                        doc.setLineWidth(0.2);
                        doc.line(margin, y, pageW - margin, y);
                        y += 6;
                    });
                }

                // ── TOTAL ROW ──
                y += 2;
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.5);
                doc.line(margin, y - 2, pageW - margin, y - 2);
                doc.setFillColor(245, 245, 245);
                doc.rect(margin - 1, y - 1, contentW + 2, 12, 'F');
                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('WOCHEN-SUMME', col1, y + 7);
                doc.setFontSize(16);
                doc.setTextColor(37, 99, 235);
                doc.text(`${summary.week}h`, col3, y + 8, { align: 'right' });
                y += 20;

                // ── SIGNATURES ──
                // Check page space
                if (y > pageH - 45) {
                    doc.addPage();
                    y = 25;
                }

                y = Math.max(y, pageH - 45);
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.4);
                // Signature line 1
                doc.line(margin, y, margin + 65, y);
                doc.setFontSize(8);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('UNTERSCHRIFT MONTEUR', margin, y + 5);
                // Signature line 2
                doc.line(pageW - margin - 65, y, pageW - margin, y);
                doc.text('UNTERSCHRIFT BAULEITUNG', pageW - margin - 65, y + 5);

                // ── FOOTER ──
                doc.setFontSize(7);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(180, 180, 180);
                doc.text(`Montage Manager Pro • Erstellt: ${new Date().toLocaleDateString('de-DE')}`, pageW / 2, pageH - 8, { align: 'center' });

                // Save
                const filename = `Stundenbericht_${summary.name}_KW${kw}.pdf`;
                doc.save(filename);
                resolve();
            });
        };

        // ─────────────────────────────────────────────────────────────
        // CALENDAR VIEW
        // ─────────────────────────────────────────────────────────────
        function CalendarView({ onBack, calEntries, setCalEntries, appId }) {
            const [calWeek, setCalWeek] = useState(new Date());
            const [editCalEntry, setEditCalEntry] = useState(null);
            const [showCalImport, setShowCalImport] = useState(false);
            const [calImportText, setCalImportText] = useState('');
            const [calImportResult, setCalImportResult] = useState(null);
            const [showCalPdfModal, setShowCalPdfModal] = useState(null);
            const [deleteMode, setDeleteMode] = useState(false);
            const [copyEntry, setCopyEntry] = useState(null);
            const [pasteTargetDay, setPasteTargetDay] = useState(null);

            const days = getCalWeekDays(calWeek);
            const DAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

            const entriesForDay = useCallback((dayStr) => {
                return calEntries.filter(e => {
                    if (!e.deliveryDate) return false;
                    const storedDatePart = e.deliveryDate.substring(0, 10);
                    return storedDatePart === dayStr;
                });
            }, [calEntries]);

            const colorIndex = useMemo(() => {
                const map = {};
                calEntries.forEach((e,i) => { map[e.id] = i % CARD_COLORS.length; });
                return map;
            }, [calEntries]);

            const deleteCalEntry = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'calentries', id));
            };

            const compressCalImage = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1200) { h *= 1200/w; w = 1200; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const saveCalEntry = async (entry) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'calentries', entry.id), {
                    entryType: entry.entryType || 'LIEFERUNG',
                    customer: entry.customer,
                    address: entry.address,
                    memo: entry.memo,
                    auftragsNr: entry.auftragsNr,
                    target: parseInt(entry.target) || 0,
                    deliveryDate: entry.deliveryDate,
                    image: entry.image || null,
                });
                setEditCalEntry(null);
            };

            const saveNewCalEntry = async (entry) => {
                const { db, doc, setDoc } = window.FirebaseSDK;
                const id = `cal-${crypto.randomUUID()}`;
                const payload = { ...entry, id, createdAt: new Date().toISOString() };
                delete payload.isNew;
                if (!payload.entryType) payload.entryType = 'LIEFERUNG';
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'calentries', id), payload);
                setEditCalEntry(null);
            };

            const processCalImport = async () => {
                if (!calImportText.trim()) return;
                const lines = calImportText.split(/\r?\n/);
                let currentDay = null;
                const newEntries = [];
                const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i;
                const weekDayMap = {};
                DAY_NAMES.forEach((name, i) => { weekDayMap[name.toLowerCase()] = days[i]; });
                weekDayMap['sonntag'] = null;
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const dayMatch = trimmed.match(dayRegex);
                    if (dayMatch) {
                        const dayNameLower = dayMatch[1].toLowerCase();
                        if (weekDayMap[dayNameLower]) {
                            currentDay = weekDayMap[dayNameLower];
                        } else {
                            const [d,m,y] = dayMatch[2].split('.');
                            currentDay = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
                        }
                        continue;
                    }
                    if (!currentDay) continue;
                    const rawParts = trimmed.split('/');
                    if (rawParts.length < 3) continue;
                    const p = rawParts.map(x => x.trim());
                    if (p[0].toUpperCase() !== 'LIEFERUNG') continue;
                    const customer = p[1] || '';
                    const address = p[2] || '';
                    const memo = p[3] || '';
                    const auftragsNr = p.slice(4).join('/').trim();
                    if (!customer && !address) continue;
                    const eleMatch = memo.match(/(\d+)\s*ELE/i);
                    const target = eleMatch ? parseInt(eleMatch[1]) : 0;
                    const id = `cal-${crypto.randomUUID()}`;
                    const deliveryDateStr = toLocalDateStr(currentDay);
                    newEntries.push({ id, entryType: 'LIEFERUNG', customer, address, memo, auftragsNr, target, deliveryDate: deliveryDateStr, image: null, createdAt: new Date().toISOString() });
                }
                if (newEntries.length > 0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const e of newEntries) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'calentries', e.id), e);
                    }
                }
                setCalImportText('');
                setShowCalImport(false);
                setCalImportResult(newEntries.length);
            };

            const triggerEntryPDF = (entry) => {
                setShowCalPdfModal(entry);
                setTimeout(() => {
                    const el = document.getElementById('cal-single-pdf-content');
                    if (!el) return;
                    html2pdf().set({
                        margin: 10,
                        filename: `Auftrag_${(entry.auftragsNr||'export').replace(/\//g,'_')}.pdf`,
                        image: { type:'jpeg', quality:0.98 },
                        html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff' },
                        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
                        pagebreak: { mode: ['css'] }
                    }).from(el).save().then(() => setShowCalPdfModal(null));
                }, 300);
            };

            const triggerWeekPDF = () => {
                setTimeout(() => {
                    const el = document.getElementById('cal-week-pdf-content');
                    if (!el) return;
                    html2pdf().set({
                        margin: 5,
                        filename: `Kalender_KW${getWeekNumber(calWeek)}.pdf`,
                        image: { type:'jpeg', quality:0.98 },
                        html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff' },
                        jsPDF: { unit:'mm', format:'a3', orientation:'landscape' },
                    }).from(el).save();
                }, 200);
            };

            const pasteCopyToDay = async (dayStr) => {
                if (!copyEntry) return;
                const { db, doc, setDoc } = window.FirebaseSDK;
                const id = `cal-${crypto.randomUUID()}`;
                const newEntry = { ...copyEntry, id, deliveryDate: dayStr, createdAt: new Date().toISOString() };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'calentries', id), newEntry);
                setCopyEntry(null);
                setPasteTargetDay(null);
            };

            const defaultNewDate = toLocalDateStr(days[0]);
            const emptyEntry = { isNew: true, customer: '', address: '', memo: '', auftragsNr: '', target: '', image: null, deliveryDate: defaultNewDate };

            return (
                <div style={{ minHeight:'100vh', background:'#f1f5f9', display:'flex', flexDirection:'column' }}>
                    <div style={{ position:'absolute', left:'-9999px', top:0 }}>
                        {showCalPdfModal && (
                            <div id="cal-single-pdf-content" style={{ padding:'15mm', background:'#fff', color:'#000', fontFamily:'Inter,Arial,sans-serif', width:'190mm' }}>
                                <h1 style={{ fontSize:'22pt', fontWeight:900, borderBottom:'2pt solid #000', paddingBottom:'4mm', marginBottom:'6mm', textTransform:'uppercase' }}>Auftrag</h1>
                                <table style={{ width:'100%', marginBottom:'8mm', fontSize:'11pt' }}>
                                    <tbody>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', width:'35mm', paddingBottom:'3mm' }}>Auftragsnr.</td><td style={{ fontWeight:900 }}>{showCalPdfModal.auftragsNr || '—'}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Kunde</td><td style={{ fontWeight:'bold' }}>{showCalPdfModal.customer}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Adresse</td><td>{showCalPdfModal.address}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Datum</td><td>{formatDate(showCalPdfModal.deliveryDate)}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Memo</td><td>{showCalPdfModal.memo}</td></tr>
                                        {showCalPdfModal.target > 0 && <tr><td style={{ color:'#888', fontWeight:'bold' }}>ELE</td><td style={{ fontWeight:900 }}>{showCalPdfModal.target} ELE</td></tr>}
                                    </tbody>
                                </table>
                                {showCalPdfModal.image && (
                                    <div style={{ textAlign:'center', marginTop:'8mm' }}>
                                        <p style={{ fontSize:'8pt', color:'#888', marginBottom:'4mm', fontWeight:'bold', textTransform:'uppercase' }}>Foto</p>
                                        <img src={showCalPdfModal.image} style={{ maxWidth:'100%', maxHeight:'160mm', objectFit:'contain', display:'block', margin:'0 auto' }} />
                                    </div>
                                )}
                            </div>
                        )}
                        <div id="cal-week-pdf-content" style={{ padding:'8mm', background:'#fff', fontFamily:'Inter,Arial,sans-serif', width:'420mm' }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5mm', borderBottom:'1.5pt solid #000', paddingBottom:'3mm' }}>
                                <div>
                                    <h1 style={{ fontSize:'16pt', fontWeight:900, margin:0, textTransform:'uppercase' }}>Wochenkalender</h1>
                                    <div style={{ fontSize:'12pt', fontWeight:900, color:'#2563eb', margin:'1mm 0 0 0' }}>KW {getWeekNumber(calWeek)}</div>
                                </div>
                                <p style={{ margin:0, fontSize:'9pt', color:'#666' }}>{formatDate(toLocalDateStr(days[0]))} – {formatDate(toLocalDateStr(days[5]))}</p>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:'3mm' }}>
                                {days.map((day,di) => {
                                    const dayStr = toLocalDateStr(day);
                                    const dayEnt = entriesForDay(dayStr);
                                    return (
                                        <div key={di}>
                                            <div style={{ background:'#f1f5f9', borderRadius:'4pt', padding:'3mm', marginBottom:'2mm', textAlign:'center' }}>
                                                <div style={{ fontSize:'9pt', fontWeight:900, textTransform:'uppercase', color:'#1e293b' }}>{DAY_NAMES[di]}</div>
                                                <div style={{ fontSize:'7pt', color:'#64748b' }}>{formatDate(dayStr)}</div>
                                                <div style={{ fontSize:'6pt', color:'#3b82f6', fontWeight:'bold' }}>{dayEnt.length} Aufträge</div>
                                            </div>
                                            {dayEnt.map((e,ei) => {
                                                const ci = colorIndex[e.id] || 0;
                                                return (
                                                    <div key={ei} style={{ background:CARD_COLORS[ci], borderLeft:`2pt solid ${CARD_BORDER[ci]}`, borderRadius:'4pt', padding:'2mm 3mm', marginBottom:'2mm' }}>
                                                        {e.auftragsNr && <div style={{ fontSize:'5.5pt', color:CARD_TEXT[ci], fontWeight:900, opacity:0.7, marginBottom:'1mm' }}>{e.auftragsNr}</div>}
                                                        <div style={{ fontSize:'7pt', fontWeight:900, color:CARD_TEXT[ci], lineHeight:1.2, marginBottom:'1mm' }}>{e.customer}</div>
                                                        <div style={{ fontSize:'6pt', color:CARD_TEXT[ci], opacity:0.8, lineHeight:1.2, marginBottom:'1mm' }}>{e.address}</div>
                                                        <div style={{ fontSize:'6pt', color:CARD_TEXT[ci], opacity:0.7, lineHeight:1.2 }}>{e.memo}</div>
                                                        {e.target > 0 && <div style={{ display:'inline-block', background:CARD_BORDER[ci], color:'#fff', fontSize:'5.5pt', fontWeight:900, padding:'0.5mm 2mm', borderRadius:'3pt', marginTop:'1mm' }}>{e.target} ELE</div>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div style={{ background:'#1e293b', padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top:0, zIndex:40, borderBottom:'2px solid #334155', flexShrink:0 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                            <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                                <Icon name="arrow-left" size={16} className="text-blue-400"/>
                            </button>
                            <div>
                                <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>Wochenkalender</div>
                                <div style={{ color:'#fff', fontSize:13, fontWeight:900, fontStyle:'italic' }}>
                                    KW {getWeekNumber(calWeek)} — {formatDate(toLocalDateStr(days[0]))} bis {formatDate(toLocalDateStr(days[5]))}
                                </div>
                            </div>
                        </div>
                        <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
                            <button onClick={() => { const d=new Date(calWeek); d.setDate(d.getDate()-7); setCalWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                                <Icon name="chevron-left" size={14} className="text-blue-400"/>
                            </button>
                            <button onClick={() => setCalWeek(new Date())} style={{ background:'#334155', border:'none', borderRadius:8, padding:'4px 10px', color:'#cbd5e1', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Heute</button>
                            <button onClick={() => { const d=new Date(calWeek); d.setDate(d.getDate()+7); setCalWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                                <Icon name="chevron-right" size={14} className="text-blue-400"/>
                            </button>
                            <button onClick={() => setEditCalEntry({...emptyEntry})} style={{ background:'#10b981', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                                <Icon name="plus" size={12}/>Neu
                            </button>
                            <button onClick={() => setShowCalImport(true)} style={{ background:'#3b82f6', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                                <Icon name="upload" size={12}/>Import
                            </button>
                            <button onClick={triggerWeekPDF} style={{ background:'#475569', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                                <Icon name="download" size={12}/>A3 PDF
                            </button>
                            <button onClick={() => { setDeleteMode(!deleteMode); setCopyEntry(null); }} style={{ background: deleteMode ? '#ef4444' : '#334155', border: deleteMode ? '2px solid #fca5a5' : 'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                                <Icon name={deleteMode ? "x" : "trash-2"} size={12}/>{deleteMode ? 'Fertig' : 'Löschen'}
                            </button>
                        </div>
                    </div>

                    {deleteMode && (
                        <div style={{ background:'#ef4444', padding:'8px 16px', textAlign:'center', fontSize:10, fontWeight:900, color:'#fff', textTransform:'uppercase', letterSpacing:1 }}>
                            🗑 LÖSCHMODUS AKTIV — Auftrag anklicken zum löschen — dann „Fertig" klicken
                        </div>
                    )}
                    {copyEntry && (
                        <div style={{ background:'#f59e0b', padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:10, fontWeight:900, color:'#fff' }}>
                            <span>📋 KOPIEREN: „{copyEntry.customer}" — Auf einen Tag-Bereich klicken zum Einfügen</span>
                            <button onClick={() => setCopyEntry(null)} style={{ background:'rgba(0,0,0,0.2)', border:'none', borderRadius:6, padding:'3px 10px', color:'#fff', cursor:'pointer', fontSize:9, fontWeight:900 }}>Abbrechen</button>
                        </div>
                    )}

                    <div style={{ flex:1, overflowX:'auto', overflowY:'auto' }}>
                        <div style={{ minWidth:760 }}>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', borderBottom:'2px solid #000', background:'#1e293b' }}>
                                {DAY_NAMES.map((name,di) => (
                                    <div key={di} style={{ textAlign:'center', padding:'6px 4px', borderRight: di<5 ? '1px solid #334155':'none' }}>
                                        <div style={{ fontSize:10, fontWeight:900, color:'#fff', textTransform:'uppercase', letterSpacing:1 }}>{name}</div>
                                        <div style={{ fontSize:9, color:'#94a3b8', marginTop:1 }}>{formatDate(toLocalDateStr(days[di]))}</div>
                                        <div style={{ fontSize:9, color:'#60a5fa', marginTop:1 }}>{entriesForDay(toLocalDateStr(days[di])).length} Aufträge</div>
                                    </div>
                                ))}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#fff', alignItems:'start' }}>
                                {days.map((day,di) => {
                                    const dayStr = toLocalDateStr(day);
                                    const dayEnt = entriesForDay(dayStr);
                                    const isPasteTarget = copyEntry && !deleteMode;
                                    return (
                                        <div key={di} className={`cal-col${isPasteTarget ? ' paste-target-col' : ''}`} onClick={() => { if (isPasteTarget) pasteCopyToDay(dayStr); }} style={{ cursor: isPasteTarget ? 'copy' : 'default' }}>
                                            {dayEnt.length === 0 && (
                                                <div style={{ height:40, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                                    {isPasteTarget ? <span style={{ fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</span> : <span style={{ fontSize:9, color:'#cbd5e1', fontStyle:'italic' }}>—</span>}
                                                </div>
                                            )}
                                            {dayEnt.map((e) => {
                                                const ci = colorIndex[e.id] || 0;
                                                return (
                                                    <div key={e.id} className={`cal-card-item${deleteMode ? ' delete-mode-card' : ''}`} style={{ background:CARD_COLORS[ci], borderLeftColor:CARD_BORDER[ci], color:CARD_TEXT[ci], cursor:'pointer' }}
                                                        onClick={(ev) => {
                                                            ev.stopPropagation();
                                                            if (deleteMode) { if (confirm(`"${e.customer}" löschen?`)) deleteCalEntry(e.id); }
                                                            else if (copyEntry) { pasteCopyToDay(dayStr); }
                                                            else { setEditCalEntry({...e}); }
                                                        }}>
                                                        {e.image && <div className="green-dot"></div>}
                                                        {deleteMode && <div style={{ position:'absolute', top:3, left:3, background:'#ef4444', borderRadius:'50%', width:14, height:14, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:'#fff', fontWeight:900 }}>✕</div>}
                                                        <div style={{ fontSize:8, fontWeight:900, letterSpacing:1, textTransform:'uppercase', marginBottom:3, padding:'1px 5px', background:CARD_BORDER[ci], color:'#fff', borderRadius:2, display:'inline-block', marginLeft: deleteMode ? 16 : 0 }}>{e.entryType || 'LIEFERUNG'}</div>
                                                        {e.auftragsNr && <div style={{ fontSize:8, fontWeight:900, opacity:0.75, marginBottom:2, textTransform:'uppercase', paddingRight: e.image ? 10 : 0 }}>{e.auftragsNr}</div>}
                                                        <div style={{ fontSize:10, fontWeight:900, lineHeight:1.3, marginBottom:2, textTransform:'uppercase' }}>{e.customer}</div>
                                                        <div style={{ fontSize:9, fontWeight:700, lineHeight:1.3, marginBottom:2, opacity:0.85 }}>{e.address}</div>
                                                        {e.memo && <div style={{ fontSize:8, lineHeight:1.3, opacity:0.75 }}>{e.memo}</div>}
                                                        {e.target > 0 && <div style={{ marginTop:3, display:'inline-block', background:CARD_BORDER[ci], color:'#fff', fontSize:8, fontWeight:900, padding:'1px 5px', borderRadius:3 }}>{e.target} ELE</div>}
                                                        {!deleteMode && !copyEntry && <button onClick={(ev) => { ev.stopPropagation(); setCopyEntry({...e}); }} title="Kopieren" style={{ position:'absolute', bottom:3, right:22, background:'rgba(37,99,235,0.15)', border:'none', borderRadius:3, padding:'1px 4px', cursor:'pointer', fontSize:9, color:'#2563eb', lineHeight:1 }}>⧉</button>}
                                                        {!deleteMode && <button onClick={(ev) => { ev.stopPropagation(); if(!copyEntry) deleteCalEntry(e.id); }} style={{ position:'absolute', bottom:3, right:3, background:'rgba(220,38,38,0.15)', border:'none', borderRadius:3, padding:'1px 4px', cursor:'pointer', fontSize:9, color:'#dc2626', lineHeight:1 }}>✕</button>}
                                                    </div>
                                                );
                                            })}
                                            {isPasteTarget && dayEnt.length > 0 && (
                                                <div style={{ margin:'4px 0', padding:'6px', background:'rgba(245,158,11,0.15)', border:'1px dashed #f59e0b', borderRadius:4, textAlign:'center', fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {editCalEntry && (
                        <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.96)', display:'flex', alignItems:'center', justifyContent:'center', padding:16, overflowY:'auto' }}>
                            <div style={{ width:'100%', maxWidth:400, background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:24, display:'flex', flexDirection:'column', gap:12 }}>
                                <h3 style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', margin:0 }}>{editCalEntry.isNew ? 'Neuer Eintrag' : 'Auftrag bearbeiten'}</h3>
                                {!editCalEntry.isNew && <button onClick={() => triggerEntryPDF(editCalEntry)} style={{ alignSelf:'flex-start', background:'#3b82f6', border:'none', borderRadius:8, padding:'6px 12px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}><Icon name="download" size={12}/>PDF exportieren</button>}
                                <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'2px solid #3b82f6', color:'#60a5fa', fontSize:12, fontWeight:900, textTransform:'uppercase', letterSpacing:1, boxSizing:'border-box' }} placeholder="Typ (z.B. LIEFERUNG)" value={editCalEntry.entryType || 'LIEFERUNG'} onChange={e => setEditCalEntry({...editCalEntry, entryType:e.target.value.toUpperCase()})}/>
                                <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} placeholder="Kunde *" value={editCalEntry.customer} onChange={e => setEditCalEntry({...editCalEntry, customer:e.target.value})}/>
                                <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} placeholder="Adresse" value={editCalEntry.address} onChange={e => setEditCalEntry({...editCalEntry, address:e.target.value})}/>
                                <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} placeholder="Memo / Hausinfo" value={editCalEntry.memo} onChange={e => setEditCalEntry({...editCalEntry, memo:e.target.value})}/>
                                <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} placeholder="Auftragsnr." value={editCalEntry.auftragsNr} onChange={e => setEditCalEntry({...editCalEntry, auftragsNr:e.target.value})}/>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                                    <input type="number" style={{ padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} placeholder="ELE" value={editCalEntry.target || ''} onChange={e => setEditCalEntry({...editCalEntry, target:e.target.value})}/>
                                    <input type="date" style={{ padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }} value={editCalEntry.deliveryDate?.substring(0,10) || ''} onChange={e => setEditCalEntry({...editCalEntry, deliveryDate: e.target.value})}/>
                                </div>
                                <div>
                                    <input type="file" accept="image/*" className="hidden" id="cal-img-upload-modal" onChange={async(ev) => { if (!ev.target.files[0]) return; const b64 = await compressCalImage(ev.target.files[0]); setEditCalEntry(prev => ({...prev, image:b64})); ev.target.value = ''; }}/>
                                    <label htmlFor="cal-img-upload-modal" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'10px', border:'1px dashed rgba(255,255,255,0.2)', borderRadius:10, color:'#94a3b8', cursor:'pointer', fontSize:9, fontWeight:700, textTransform:'uppercase' }}>
                                        <Icon name="camera" size={14}/>{editCalEntry.image ? 'Foto ersetzen' : 'Foto anhängen'}
                                    </label>
                                    {editCalEntry.image && (
                                        <div style={{ position:'relative', marginTop:6 }}>
                                            <img src={editCalEntry.image} style={{ width:'100%', height:80, objectFit:'cover', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)' }}/>
                                            <button onClick={() => setEditCalEntry(p => ({...p, image:null}))} style={{ position:'absolute', top:4, right:4, background:'#ef4444', border:'none', borderRadius:'50%', width:18, height:18, cursor:'pointer', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10 }}>✕</button>
                                        </div>
                                    )}
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                                    <button onClick={() => setEditCalEntry(null)} style={{ padding:'12px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                    <button onClick={() => { if (!editCalEntry.customer) return; if (editCalEntry.isNew) saveNewCalEntry(editCalEntry); else saveCalEntry(editCalEntry); }} style={{ padding:'12px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Speichern</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCalImport && (
                        <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.98)', padding:24, display:'flex', flexDirection:'column' }}>
                            <div style={{ color:'#60a5fa', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:4 }}>Import → KW {getWeekNumber(calWeek)} ({formatDate(toLocalDateStr(days[0]))} – {formatDate(toLocalDateStr(days[5]))})</div>
                            <div style={{ color:'#94a3b8', fontSize:9, fontWeight:700, marginBottom:8 }}>Format: Montag 20.04.2026 → LIEFERUNG / Kunde / Adresse / Memo / AuftragsNr</div>
                            <textarea style={{ flex:1, width:'100%', background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', padding:16, borderRadius:12, fontSize:11, color:'#fff', fontFamily:'monospace', resize:'none', boxSizing:'border-box' }} placeholder={"Montag 20.04.2026 (3)\nLIEFERUNG / E.O. Knecht AG / Segelhofstrasse, 5405 Dättwil AG / Haus A12 47 ELE / 251266654/SLI"} value={calImportText} onChange={e => setCalImportText(e.target.value)} />
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginTop:24 }}>
                                <button onClick={() => setShowCalImport(false)} style={{ padding:'14px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={processCalImport} style={{ padding:'14px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, cursor:'pointer' }}>Import in KW {getWeekNumber(calWeek)}</button>
                            </div>
                        </div>
                    )}

                    {calImportResult !== null && (
                        <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.95)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
                            <div style={{ background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:32, width:'100%', maxWidth:300, display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
                                <div style={{ width:64, height:64, background:'#10b981', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="check" size={32} className="text-white"/></div>
                                <div style={{ textAlign:'center' }}>
                                    <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>Kalender Import KW {getWeekNumber(calWeek)}</div>
                                    <div style={{ color:'#fff', fontSize:48, fontWeight:900, fontStyle:'italic', lineHeight:1 }}>{calImportResult}</div>
                                    <div style={{ color:'#10b981', fontSize:11, fontWeight:900, textTransform:'uppercase', marginTop:4 }}>Aufträge erfasst</div>
                                </div>
                                <button onClick={() => setCalImportResult(null)} style={{ width:'100%', padding:'14px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─────────────────────────────────────────────────────────────
        // MAIN APP
        // ─────────────────────────────────────────────────────────────
        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [workerSearchTerm, setWorkerSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);
            const [editObject, setEditObject] = useState(null); 
            const [importText, setImportText] = useState('');
            const [isImporting, setIsImporting] = useState(false);
            const [selectedObject, setSelectedObject] = useState(null);
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('de');
            const [adminFilter, setAdminFilter] = useState('all'); 
            const [workerStatusMode, setWorkerStatusMode] = useState(''); 
            const [workerRemaining, setWorkerRemaining] = useState('');
            const [workerBlockReason, setWorkerBlockReason] = useState('');
            const [workerHours, setWorkerHours] = useState('');
            const [workerHoursDate, setWorkerHoursDate] = useState(new Date().toISOString().split('T')[0]);
            const [workerHoursName, setWorkerHoursName] = useState('');
            
            const [objects, setObjects] = useState([]);
            const [pendenzen, setPendenzen] = useState([]);
            const [hourLogs, setHourLogs] = useState([]);
            const [monteurs, setMonteurs] = useState([]);
            const [calEntries, setCalEntries] = useState([]);
            
            const [showPendenzModal, setShowPendenzModal] = useState(null);
            const [pendenzForm, setPendenzForm] = useState({ description: '', deadline: '', monteur: '', images: [] });
            const [isSubmittingPendenz, setIsSubmittingPendenz] = useState(false);
            const [submitSuccess, setSubmitSuccess] = useState(false);
            
            const [showMyPendenzen, setShowMyPendenzen] = useState(null);
            const [printData, setPrintData] = useState(null);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [importResult, setImportResult] = useState(null);
            const [pdfLoading, setPdfLoading] = useState(false);

            const appId = 'montage-pe-a5f79';
            const t = translations[lang];

            useEffect(() => {
                const initLiveSync = async () => {
                    if (!window.FirebaseSDK) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot } = window.FirebaseSDK;
                    try { await signInAnonymously(auth); } catch(e) {}
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'objects'), (s) => setObjects(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen'), (s) => setPendenzen(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'hours'), (s) => setHourLogs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'monteurs'), (s) => setMonteurs(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'calentries'), (s) => setCalEntries(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                        }
                    });
                };
                initLiveSync();
            }, []);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) { setPin(newPin); return; }
                if (newPin === ADMIN_PIN) setView('dashboard');
                else if (newPin === WORKER_PIN) setView('worker_list');
                else if (newPin === HOURS_PIN) setView('hours_admin');
                setPin('');
            };

            const processTextImport = async () => {
                if (!importText.trim()) return;
                setIsImporting(true);
                const lines = importText.split(/\r?\n/);
                const newObjects = [];
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const parts = trimmed.split('/').map(p => p.trim());
                    if (parts.length < 2) continue;
                    const customer = parts[0] || 'Unbekannter Kunde';
                    const address  = parts[1] || 'Unbekannte Adresse';
                    const memo     = parts[2] || '';
                    const eleMatch = memo.match(/(\d+)\s*ELE/i);
                    const target = eleMatch ? parseInt(eleMatch[1]) : 1;
                    const houseInfo = memo.replace(/\d+\s*ELE/gi, '').replace(/\bGIS\b/gi, '').replace(/[-–]\s*$/, '').trim() || 'Gesamtmontage';
                    const objId = `obj-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
                    newObjects.push({ id: objId, name: address, customer, address, houseInfo, target, current: 0, lastRemaining: null, blockReason: null, deliveryDate: new Date().toISOString(), status: 'active', history: [] });
                }
                if (newObjects.length > 0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const obj of newObjects) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), obj);
                    }
                }
                setIsImporting(false);
                setImportText('');
                setShowImportModal(false);
                setImportResult(newObjects.length);
            };

            const submitWorkerUpdate = async () => {
                const now = new Date().toISOString();
                const { db, doc, updateDoc, deleteDoc, addDoc, collection } = window.FirebaseSDK;
                const obj = selectedObject;
                if (workerStatusMode === 'hours') {
                    if (!workerHoursName || !workerHours) return;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'hours'), {
                        objectId: obj.id, address: obj.address, monteurName: workerHoursName, hours: parseFloat(workerHours), date: workerHoursDate, createdAt: now
                    });
                } else {
                    if (workerStatusMode === 'finished') {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id));
                    } else {
                        let updates = { history: [{ date: now, mode: workerStatusMode, detail: workerStatusMode === 'blocked' ? workerBlockReason : workerRemaining }, ...(obj.history || [])] };
                        if (workerStatusMode === 'blocked') {
                            updates = { ...updates, status: 'blocked', blockReason: workerBlockReason, lastRemaining: obj.lastRemaining ?? null };
                        } else if (workerStatusMode === 'partial') {
                            const open = parseInt(workerRemaining) || 0;
                            updates = { ...updates, current: Math.max(0, obj.target - open), status: 'active', lastRemaining: open, blockReason: null };
                        }
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), updates);
                    }
                }
                setWorkerStatusMode(''); setWorkerRemaining(''); setWorkerBlockReason(''); setWorkerHours('');
                setView('worker_list');
            };

            const saveManualEdit = async () => {
                if (!editObject) return;
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', editObject.id), {
                    address: editObject.address, customer: editObject.customer, houseInfo: editObject.houseInfo,
                    target: parseInt(editObject.target) || 0, name: editObject.address
                });
                setEditObject(null);
            };

            const deleteObject = async (e, objId) => {
                e.stopPropagation();
                if (!confirm("Möchten Sie dieses Objekt wirklich löschen?")) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', objId));
            };

            const unblockObject = async (e, obj) => {
                e.stopPropagation();
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), { status: 'active', blockReason: null });
            };

            const deleteHourEntry = async (logId) => {
                if (!confirm("Diesen Eintrag unwiderruflich löschen?")) return;
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hours', logId));
            };

            const updateHourEntry = async (logId, newVal) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hours', logId), { hours: parseFloat(newVal) || 0 });
            };

            const compressImage = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 1000) { height *= 1000 / width; width = 1000; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                const processed = [];
                for (const file of files) processed.push(await compressImage(file));
                setPendenzForm(prev => ({ ...prev, images: [...prev.images, ...processed] }));
                e.target.value = '';
            };

            const submitPendenz = async (e) => {
                if (e) { e.preventDefault?.(); e.stopPropagation?.(); }
                if (!pendenzForm.description || !pendenzForm.monteur || !showPendenzModal || isSubmittingPendenz) return;
                setIsSubmittingPendenz(true);
                setTimeout(async () => {
                    try {
                        const { db, addDoc, collection } = window.FirebaseSDK;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pendenzen'), {
                            objectId: showPendenzModal.id, address: showPendenzModal.address,
                            description: pendenzForm.description.trim(),
                            deadline: pendenzForm.deadline || new Date().toISOString().split('T')[0],
                            monteur: pendenzForm.monteur.trim(),
                            images: [...pendenzForm.images],
                            status: 'open', createdAt: new Date().toISOString()
                        });
                        setSubmitSuccess(true);
                        setTimeout(() => {
                            setSubmitSuccess(false);
                            setPendenzForm({ description: '', deadline: '', monteur: '', images: [] });
                            setShowPendenzModal(null);
                            setIsSubmittingPendenz(false);
                        }, 1200);
                    } catch (err) {
                        setIsSubmittingPendenz(false);
                    }
                }, 100);
            };

            const markPendenzDone = async (pId) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pendenzen', pId), { status: 'done', doneAt: new Date().toISOString() });
            };

            const addMonteur = async (name) => {
                if (!name.trim()) return;
                const { db, collection, addDoc } = window.FirebaseSDK;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'monteurs'), { name: name.trim() });
            };

            const deleteMonteur = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'monteurs', id));
            };

            const triggerDownloadPDF = (data) => {
                setPrintData(data);
                setTimeout(() => {
                    const element = document.getElementById('print-area-content');
                    if (!element) return;
                    html2pdf().set({
                        margin: 10, filename: `Pendenz_${data.monteur.replace(/\s+/g, '_')}.pdf`,
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                        pagebreak: { mode: ['css', 'legacy'] }
                    }).from(element).save().then(() => setPrintData(null));
                }, 200);
            };

            // ── NEW: Reliable Hours PDF using jsPDF directly ──
            const triggerHoursPDF = async (summary) => {
                if (!window.jspdf) {
                    alert('PDF-Bibliothek noch nicht geladen. Bitte warte einen Moment und versuche es erneut.');
                    return;
                }
                setPdfLoading(true);
                try {
                    await generateHoursPDF(summary, selectedDate, hourLogs);
                } catch(err) {
                    console.error('PDF error:', err);
                    alert('PDF-Fehler: ' + err.message);
                } finally {
                    setPdfLoading(false);
                }
            };

            const stats = useMemo(() => {
                let total = 0, done = 0, blocked = 0, partial = 0, unknown = 0;
                objects.forEach(obj => {
                    total += obj.target; done += obj.current;
                    if (obj.status === 'blocked') blocked++;
                    if (obj.lastRemaining > 0 && obj.status !== 'finished') partial++;
                    if (obj.address?.includes("Unbekannte Adresse") || obj.name?.includes("Unbekannte Adresse")) unknown++;
                });
                return { open: objects.filter(o => o.status === 'active').length, percent: total > 0 ? Math.round((done/total)*100) : 0, blocked, partial, pendenzen: pendenzen.filter(p => p.status === 'open').length, unknown };
            }, [objects, pendenzen]);

            const hourSummaries = useMemo(() => {
                const map = {};
                monteurs.forEach(m => {
                    map[m.name] = { name: m.name, week: 0, month: 0, total: 0, logs: [], weekDetails: { 'Mo': 0, 'Di': 0, 'Mi': 0, 'Do': 0, 'Fr': 0, 'Sa': 0 } };
                });
                const now = new Date(selectedDate);
                const dayOfWeek = now.getDay();
                const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
                const startOfWeek = new Date(now.setDate(diff));
                startOfWeek.setHours(0,0,0,0);
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(endOfWeek.getDate() + 7);
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                hourLogs.forEach(log => {
                    if (!map[log.monteurName]) map[log.monteurName] = { name: log.monteurName, week: 0, month: 0, total: 0, logs: [], weekDetails: { 'Mo': 0, 'Di': 0, 'Mi': 0, 'Do': 0, 'Fr': 0, 'Sa': 0 } };
                    const logDate = new Date(log.date);
                    const h = parseFloat(log.hours) || 0;
                    map[log.monteurName].total += h;
                    map[log.monteurName].logs.push(log);
                    if (logDate >= startOfMonth && logDate <= new Date(now.getFullYear(), now.getMonth() + 1, 0)) map[log.monteurName].month += h;
                    if (logDate >= startOfWeek && logDate < endOfWeek) {
                        map[log.monteurName].week += h;
                        const dayLabels = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
                        const label = dayLabels[logDate.getDay()];
                        if (label !== 'So' && map[log.monteurName].weekDetails[label] !== undefined) map[log.monteurName].weekDetails[label] += h;
                    }
                });
                return Object.values(map);
            }, [hourLogs, monteurs, selectedDate]);

            const filteredObjectsAdmin = useMemo(() => {
                let list = objects;
                if (adminFilter === 'blocked') list = list.filter(o => o.status === 'blocked');
                else if (adminFilter === 'partial') list = list.filter(o => o.lastRemaining > 0 && o.status !== 'finished');
                else if (adminFilter === 'pendenzen') {
                    const idsWithOpenPendenzen = new Set(pendenzen.filter(p => p.status === 'open').map(p => p.objectId));
                    list = list.filter(o => idsWithOpenPendenzen.has(o.id));
                } else if (adminFilter === 'unknown_address') {
                    list = list.filter(o => o.address?.includes("Unbekannte Adresse") || o.name?.includes("Unbekannte Adresse"));
                }
                return list.filter(o => o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, adminFilter, searchTerm, pendenzen]);

            const filteredObjectsWorker = useMemo(() => {
                return objects.filter(o => o.status !== 'finished').filter(o =>
                    o.address.toLowerCase().includes(workerSearchTerm.toLowerCase()) ||
                    o.customer.toLowerCase().includes(workerSearchTerm.toLowerCase())
                );
            }, [objects, workerSearchTerm]);

            const activeMonteurs = useMemo(() => {
                const names = new Set();
                pendenzen.filter(p => p.status === 'open').forEach(p => { if (p.monteur) names.add(p.monteur.trim()); });
                return Array.from(names).sort();
            }, [pendenzen]);

            const changeWeek = (direction) => {
                const newDate = new Date(selectedDate);
                newDate.setDate(newDate.getDate() + (direction * 7));
                setSelectedDate(newDate);
            };

            if (view === 'calendar') {
                return <CalendarView onBack={() => setView('dashboard')} calEntries={calEntries} setCalEntries={setCalEntries} appId={appId} />;
            }

            const PrintArea = () => {
                if (!printData) return null;
                return (
                    <div id="print-area">
                        <div id="print-area-content" style={{ backgroundColor: '#ffffff', color: '#000000' }}>
                            <div className="pdf-first-page">
                                <h1 style={{fontSize: '24pt', fontWeight: '900', borderBottom: '3pt solid black', paddingBottom: '5mm', marginBottom: '8mm', color: '#000000'}}>PENDENZ-REPORT</h1>
                                <table style={{width: '100%', marginBottom: '10mm', color: '#000000'}}>
                                    <tbody>
                                        <tr>
                                            <td style={{width: '50%'}}>
                                                <p style={{fontSize: '8pt', fontWeight: 'bold', color: '#666666', textTransform: 'uppercase', margin: 0}}>Objekt / Adresse</p>
                                                <p style={{fontSize: '12pt', fontWeight: 'bold', margin: 0, color: '#000000'}}>{printData.address}</p>
                                            </td>
                                            <td>
                                                <p style={{fontSize: '8pt', fontWeight: 'bold', color: '#666666', textTransform: 'uppercase', margin: 0}}>Monteur</p>
                                                <p style={{fontSize: '12pt', fontWeight: 'bold', margin: 0, color: '#000000'}}>{printData.monteur}</p>
                                            </td>
                                        </tr>
                                        <tr><td style={{height: '5mm'}}></td></tr>
                                        <tr>
                                            <td>
                                                <p style={{fontSize: '8pt', fontWeight: 'bold', color: '#666666', textTransform: 'uppercase', margin: 0}}>Erstellt am</p>
                                                <p style={{fontSize: '11pt', margin: 0, color: '#000000'}}>{formatDate(printData.createdAt || new Date())}</p>
                                            </td>
                                            <td>
                                                <p style={{fontSize: '8pt', fontWeight: 'bold', color: '#666666', textTransform: 'uppercase', margin: 0}}>Frist bis</p>
                                                <p style={{fontSize: '12pt', fontWeight: '900', color: '#d00000', margin: 0}}>{formatDate(printData.deadline)}</p>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                                <div style={{backgroundColor: '#f9f9f9', padding: '6mm', borderLeft: '4pt solid black', marginBottom: '10mm'}}>
                                    <p style={{fontSize: '8pt', fontWeight: 'bold', color: '#666666', textTransform: 'uppercase', marginBottom: '2mm'}}>Beschreibung des Mangels</p>
                                    <p style={{fontSize: '13pt', lineHeight: '1.5', margin: 0, color: '#000000'}}>{printData.description}</p>
                                </div>
                            </div>
                            {printData.images?.map((img, i) => (
                                <div key={i} className="pdf-page-break" style={{ backgroundColor: '#ffffff' }}>
                                    <div className="pdf-image-container">
                                        <p style={{fontSize: '8pt', color: '#999999', textTransform: 'uppercase', marginBottom: '4mm', fontWeight: 'bold'}}>Foto {i+1} von {printData.images.length}</p>
                                        <img src={img} alt="" />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // ── LOGIN ──
            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-800">
                    <div className="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white" /></div>
                    <h1 className="text-2xl font-black text-white italic mb-10 uppercase tracking-tight">Montage Manager</h1>
                    <div className="flex gap-3 mb-10">{[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-400 transition-all ${pin.length > i ? 'bg-blue-400 scale-110' : 'bg-transparent opacity-20'}`} />)}</div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">{n}</button>)}
                        <button onClick={() => setPin('')} className="h-16 flex items-center justify-center text-slate-400"><Icon name="delete" size={24}/></button>
                        <button onClick={() => handleLogin('0')} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">0</button>
                    </div>
                </div>
            );

            // ── HOURS ADMIN ──
            if (view === 'hours_admin') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <PrintArea />
                    
                    {/* PDF Loading Overlay */}
                    {pdfLoading && (
                        <div className="pdf-loading-overlay">
                            <div className="pdf-spinner"></div>
                            <div style={{ color: '#fff', fontSize: 13, fontWeight: 900, textTransform: 'uppercase', letterSpacing: 1 }}>PDF wird erstellt...</div>
                            <div style={{ color: '#94a3b8', fontSize: 10, fontWeight: 600 }}>Bitte warten</div>
                        </div>
                    )}

                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kalenderwoche</p>
                                <p className="text-lg font-black text-white italic">KW {getWeekNumber(selectedDate)}</p>
                            </div>
                            <button onClick={() => changeWeek(1)} className="p-3 bg-slate-900/50 rounded-xl text-blue-400 active:scale-90 transition-transform"><Icon name="chevron-right" size={20} /></button>
