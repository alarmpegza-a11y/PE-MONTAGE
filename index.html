<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Montage Manager Pro Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
        }
        body { 
            overscroll-behavior-y: contain; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-gradient {
            background: linear-gradient(135deg, rgba(30, 41, 59, 1) 0%, rgba(15, 23, 42, 1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .page-transition {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Nutze die vom System bereitgestellte Konfiguration um Permission-Errors zu vermeiden
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "", 
                authDomain: "montage-pe.firebaseapp.com",
                projectId: "montage-pe",
                storageBucket: "montage-pe.firebasestorage.app",
                messagingSenderId: "535448567697",
                appId: "1:535448567697:web:e57520e9c568939ab32430"
            };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Globaler Export für den React-Teil
        window.FB = { 
            db, auth, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, 
            query, writeBatch, serverTimestamp, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";

        const translations = {
            de: { search: "Suche Adresse...", partial: "Teilweise montiert", finished: "Fertig montiert", blocked: "Blockiert / Problem", openItems: "Wie viele Elemente sind noch offen?", submit: "Status Senden", cancel: "Abbrechen", back: "Zurück" },
            sq: { search: "Kërko adresën...", partial: "Montuar pjesërisht", finished: "Montimi përfundoi", blocked: "E bllokuar / Problem", openItems: "Sa elemente janë ende të hapura?", submit: "Dërgo Statusin", cancel: "Anuloj", back: "Mbrapa" },
            it: { search: "Cerca indirizzo...", partial: "Parzialmente montato", finished: "Montaggio completato", blocked: "Bloccato / Problema", openItems: "Quanti elementi sind noch offen?", submit: "Invia Stato", cancel: "Annulla", back: "Indietro" }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        nameAttr: 'data-lucide-name'
                    });
                }
            }, [name, className, size]);
            return <span className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}><i ref={iconRef} data-lucide-name={name}></i></span>;
        };

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
        };

        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);
            const [importText, setImportText] = useState('');
            const [importSummary, setImportSummary] = useState(null);
            const [selectedObject, setSelectedObject] = useState(null);
            const [lang, setLang] = useState('de');
            const [objects, setObjects] = useState([]);
            const [user, setUser] = useState(null);
            const [workerStatusMode, setWorkerStatusMode] = useState('');
            const [workerRemaining, setWorkerRemaining] = useState('');

            // Auth & Echtzeit-Synchronisierung
            useEffect(() => {
                const initAuth = async () => {
                    const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FB;
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                    });
                };

                const interval = setInterval(() => {
                    if (window.FB) {
                        initAuth();
                        clearInterval(interval);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;
                const { db, collection, onSnapshot, query } = window.FB;
                
                // Nutze den korrekten Pfad laut Sicherheitsregeln
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'objects');
                
                const unsubscribe = onSnapshot(query(collRef), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setObjects(items);
                }, (err) => {
                    console.error("Firestore Error:", err);
                });
                
                return () => unsubscribe();
            }, [user]);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) setPin(newPin);
                else {
                    if (newPin === ADMIN_PIN) setView('dashboard');
                    else if (newPin === WORKER_PIN) setView('worker_list');
                    setPin('');
                }
            };

            const parseDispoLine = (line, currentDay) => {
                if (!line.trim().toUpperCase().startsWith("LIEFERUNG")) return null;
                const content = line.trim().replace(/^LIEFERUNG\s*/i, "").trim();
                const addressRegex = /([A-ZÄÖÜa-zäöüß\s\.\-]+\s\d*[a-z]?,\s\d{4,5}\s[A-ZÄÖÜa-zäöüß\s\.\-]+)/;
                const addressMatch = content.match(addressRegex);
                const address = addressMatch ? addressMatch[0].trim() : content;
                const customer = content.split(address)[0]?.trim().replace(/,$/, '') || "Kunde";
                const eleMatch = content.match(/(\d+)\s?ELE/i);
                const targetCount = eleMatch ? parseInt(eleMatch[1]) : 1;
                const houseMatch = content.match(/(Haus\s?\d+)/i);

                return {
                    address, customer, target: targetCount, current: 0,
                    houseInfo: houseMatch ? houseMatch[0] : "Gesamtmontage",
                    deliveryDate: currentDay.toISOString(), status: 'active',
                    timestamp: window.FB.serverTimestamp()
                };
            };

            const processTextImport = async () => {
                if (!importText.trim() || !window.FB) return;
                const { db, doc, collection, writeBatch } = window.FB;

                const lines = importText.split(/\r?\n/);
                let currentDay = new Date();
                let currentDayLabel = "Heute";
                const batch = writeBatch(db);
                let count = 0;
                const summaryMap = {};

                lines.forEach(line => {
                    const dayMatch = line.match(/(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i);
                    if (dayMatch) {
                        currentDayLabel = dayMatch[0];
                        const [d, m, y] = dayMatch[2].split('.');
                        currentDay = new Date(y, m - 1, d);
                        return;
                    }
                    if (line.trim().toUpperCase().startsWith("LIEFERUNG")) {
                        const obj = parseDispoLine(line, currentDay);
                        if (obj) {
                            const newDocRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'objects'));
                            batch.set(newDocRef, obj);
                            summaryMap[currentDayLabel] = (summaryMap[currentDayLabel] || 0) + 1;
                            count++;
                        }
                    }
                });

                if (count > 0) {
                    await batch.commit();
                    setImportSummary({ 
                        days: Object.entries(summaryMap).map(([label, count]) => ({ label, count })),
                        total: count 
                    });
                }
                
                setImportText('');
                setShowImportModal(false);
            };

            const stats = useMemo(() => {
                let total = 0, done = 0, blocked = 0;
                objects.forEach(o => { total += o.target; done += o.current; if (o.status === 'blocked') blocked++; });
                return { open: objects.filter(o => o.status === 'active').length, percent: total > 0 ? Math.round((done/total)*100) : 0, blocked };
            }, [objects]);

            const filteredObjects = useMemo(() => {
                return [...objects].sort((a,b) => new Date(a.deliveryDate) - new Date(b.deliveryDate))
                              .filter(o => o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, searchTerm]);

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-950">
                    <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white" /></div>
                    <h1 className="text-2xl font-black text-white italic mb-10 uppercase">Montage Manager</h1>
                    <div className="flex gap-3 mb-10">
                        {[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-500 transition-all ${pin.length > i ? 'bg-blue-500 scale-110' : 'opacity-20'}`} />)}
                    </div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9, 'delete', 0].map(n => (
                            <button key={n} onClick={() => n === 'delete' ? setPin('') : handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-bold text-white border border-white/5 active:scale-90 transition-transform">
                                {n === 'delete' ? <Icon name="delete" /> : n}
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen bg-slate-950 pb-20 page-transition">
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center">
                        <h2 className="text-sm font-black text-white uppercase italic tracking-widest">Admin Dashboard</h2>
                        <button onClick={() => setView('login')} className="p-2 text-slate-400"><Icon name="log-out" size={18}/></button>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6">
                        <div className="grid grid-cols-3 gap-3">
                            <div className="card-gradient p-3 rounded-xl border border-white/5 text-center">
                                <p className="text-[8px] font-black text-slate-500 uppercase">Offen</p>
                                <div className="text-xl font-black text-white">{stats.open}</div>
                            </div>
                            <div className="card-gradient p-3 rounded-xl border border-white/5 text-center">
                                <p className="text-[8px] font-black text-slate-500 uppercase">Blockiert</p>
                                <div className="text-xl font-black text-red-500">{stats.blocked}</div>
                            </div>
                            <div className="card-gradient p-3 rounded-xl border border-white/5 text-center">
                                <p className="text-[8px] font-black text-slate-500 uppercase">Fortschritt</p>
                                <div className="text-xl font-black text-blue-500">{stats.percent}%</div>
                            </div>
                        </div>

                        <button onClick={() => setShowImportModal(true)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Dispo-Text Importieren</button>

                        {importSummary && (
                            <div className="bg-blue-900/40 border border-blue-500/50 rounded-xl p-4 animate-in fade-in slide-in-from-top-4 duration-500">
                                <div className="flex items-center justify-between mb-2">
                                    <h5 className="text-[10px] font-black text-blue-400 uppercase italic tracking-widest flex items-center gap-2">
                                        <Icon name="check-circle" size={14}/> Import Erfolgreich
                                    </h5>
                                    <button onClick={() => setImportSummary(null)} className="text-slate-500"><Icon name="x" size={14}/></button>
                                </div>
                                <div className="space-y-1">
                                    {importSummary.days.map((day, i) => (
                                        <p key={i} className="text-[11px] font-bold text-slate-200">
                                            {day.label}: <span className="text-blue-400">{day.count} Objekte</span>
                                        </p>
                                    ))}
                                    <div className="pt-2 mt-1 border-t border-white/5 text-xs font-black text-white italic">
                                        Gesamt: {importSummary.total} Lieferungen hinzugefügt
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="space-y-3">
                            <div className="flex justify-between items-center px-1">
                                <h4 className="text-[10px] font-black text-slate-500 uppercase italic">Objektliste</h4>
                                <input type="text" placeholder="Suche..." className="bg-transparent border-b border-white/10 text-[10px] text-white outline-none w-32" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            {filteredObjects.length === 0 ? (
                                <p className="text-center py-10 text-slate-600 text-xs italic font-bold uppercase tracking-widest">Keine Objekte vorhanden</p>
                            ) : filteredObjects.map(obj => (
                                <div key={obj.id} className="card-gradient rounded-xl border border-white/5 p-4 relative">
                                    <button onClick={async () => { if(confirm('Löschen?')) { await window.FB.deleteDoc(window.FB.doc(window.FB.db, 'artifacts', appId, 'public', 'data', 'objects', obj.id)); }}} className="absolute top-4 right-4 text-slate-600 hover:text-red-500"><Icon name="trash-2" size={14}/></button>
                                    <h3 className="text-xs font-black text-white uppercase italic mb-1">{obj.address}</h3>
                                    <p className="text-[10px] font-bold text-blue-400 mb-2">{obj.customer} | {obj.houseInfo}</p>
                                    <div className="flex justify-between items-end">
                                        <span className="text-[8px] text-slate-500 font-bold uppercase">{formatDate(obj.deliveryDate)}</span>
                                        <div className="flex items-center gap-2">
                                            {obj.status === 'finished' && <Icon name="check-circle" size={12} className="text-green-500" />}
                                            <span className={`text-[10px] font-black ${obj.status === 'finished' ? 'text-green-500' : 'text-white'}`}>{obj.current}/{obj.target} ELE</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {showImportModal && (
                        <div className="fixed inset-0 z-50 bg-slate-950/95 p-6 flex flex-col">
                            <h3 className="text-sm font-black text-white uppercase italic mb-4">Text Import</h3>
                            <textarea className="flex-1 w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-[11px] text-white outline-none font-mono" placeholder="Kopiere hier die Dispo-Liste hinein..." value={importText} onChange={(e) => setImportText(e.target.value)}></textarea>
                            <div className="grid grid-cols-2 gap-4 mt-6">
                                <button onClick={() => setShowImportModal(false)} className="py-4 text-slate-400 font-black uppercase text-[10px]">Abbrechen</button>
                                <button onClick={processTextImport} className="bg-indigo-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">Import starten</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'worker_list') return (
                <div className="min-h-screen bg-slate-950 p-4 pb-20">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-xl font-black text-white italic uppercase tracking-tighter">MO-BOARD</h1>
                        <button onClick={() => setView('login')} className="text-slate-500"><Icon name="power" size={20}/></button>
                    </div>
                    <div className="flex gap-2 mb-4 justify-center">
                        {['de', 'sq', 'it'].map(l => <button key={l} onClick={() => setLang(l)} className={`px-4 py-1 rounded-lg text-[10px] font-black border ${lang === l ? 'bg-blue-600 border-blue-400 text-white' : 'bg-slate-900 border-white/10 text-slate-500'}`}>{l.toUpperCase()}</button>)}
                    </div>
                    <div className="space-y-3">
                        {objects.filter(o => o.status !== 'finished').length === 0 ? (
                            <p className="text-center py-20 text-slate-500 text-xs font-black uppercase italic">Alles fertig montiert! 🚀</p>
                        ) : objects.filter(o => o.status !== 'finished').map(obj => (
                            <button key={obj.id} onClick={() => { setSelectedObject(obj); setView('worker_edit'); }} className="w-full card-gradient border border-white/5 p-4 rounded-xl text-left flex justify-between items-center active:scale-[0.98] transition-transform">
                                <div>
                                    <h3 className="text-[11px] font-black text-white uppercase italic">{obj.address}</h3>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase">{obj.customer} • {obj.houseInfo}</p>
                                </div>
                                <div className="flex flex-col items-end">
                                    <span className="text-[10px] font-black text-blue-500">{obj.current}/{obj.target}</span>
                                    <Icon name="chevron-right" size={16} className="text-slate-600" />
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'worker_edit') return (
                <div className="min-h-screen bg-slate-950 p-6 flex flex-col items-center">
                    <header className="w-full flex items-center gap-4 mb-10">
                        <button onClick={() => setView('worker_list')} className="p-2 bg-slate-900 rounded-xl text-blue-500"><Icon name="arrow-left"/></button>
                        <h2 className="text-xs font-black text-white uppercase italic truncate">{selectedObject?.address}</h2>
                    </header>
                    <div className="w-full max-w-sm space-y-4">
                        <button onClick={() => setWorkerStatusMode('partial')} className={`w-full p-6 rounded-2xl border text-left flex flex-col gap-2 transition-all ${workerStatusMode === 'partial' ? 'bg-blue-600 border-blue-400' : 'bg-slate-900 border-white/5'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{translations[lang].partial}</span>
                            {workerStatusMode === 'partial' && (
                                <div className="mt-2" onClick={(e) => e.stopPropagation()}>
                                    <p className="text-[8px] font-bold text-white/50 uppercase mb-1">{translations[lang].openItems}</p>
                                    <input type="number" className="w-full bg-black/30 border border-white/10 rounded-lg p-3 text-white font-black outline-none focus:border-blue-300" value={workerRemaining} onChange={(e) => setWorkerRemaining(e.target.value)} autoFocus />
                                </div>
                            )}
                        </button>
                        <button onClick={() => setWorkerStatusMode('finished')} className={`w-full p-6 rounded-2xl border flex justify-between items-center transition-all ${workerStatusMode === 'finished' ? 'bg-green-600 border-green-400' : 'bg-slate-900 border-white/5'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{translations[lang].finished}</span>
                            <Icon name="check-circle" size={20}/>
                        </button>
                        <button onClick={async () => {
                             if (!workerStatusMode || !window.FB) return;
                             const { db, doc, updateDoc, serverTimestamp } = window.FB;
                             const obj = selectedObject;
                             let current = obj.current, status = 'active';
                             
                             if(workerStatusMode === 'finished') { 
                                current = obj.target; 
                                status = 'finished'; 
                             } else if(workerStatusMode === 'partial') { 
                                current = Math.max(0, obj.target - (parseInt(workerRemaining) || 0)); 
                             }

                             await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), {
                                current, status, lastUpdate: serverTimestamp()
                             });
                             
                             setView('worker_list'); 
                             setWorkerStatusMode(''); 
                             setWorkerRemaining('');
                        }} className="w-full py-5 bg-white text-black rounded-2xl font-black uppercase text-[11px] shadow-xl mt-6 active:scale-95 transition-transform">{translations[lang].submit}</button>
                    </div>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
