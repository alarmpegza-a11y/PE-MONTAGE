<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montage Manager</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel für die Logik -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (SVG Icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { overscroll-behavior-y: contain; font-family: sans-serif; }
        button { user-select: none; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS KOMPONENTE ---
        // Da wir im Browser sind, bauen wir kleine SVG Wrapper für die Icons
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- DATEN ---
        const INITIAL_USERS = [
            { id: 'u1', name: 'Admin', pin: '0000', role: 'admin' },
            { id: 'u2', name: 'Max Mustermann', pin: '1234', role: 'worker' },
            { id: 'u3', name: 'Andreas Montage', pin: '5678', role: 'worker' },
        ];

        const INITIAL_PROJECTS = [
            { id: 'p1', name: 'Wohnanlage Alster', customer: 'Immo Nord GmbH' },
            { id: 'p2', name: 'Büropark West', customer: 'TechCorp' },
        ];

        const INITIAL_OBJECTS = [
            { id: 'o1', projectId: 'p1', name: 'Fenster EG', target: 20, current: 5, status: 'active' },
            { id: 'o2', projectId: 'p1', name: 'Türen 1. OG', target: 15, current: 0, status: 'active' },
            { id: 'o3', projectId: 'p2', name: 'Fassadenelemente', target: 100, current: 45, status: 'active' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login');
            const [users] = useState(INITIAL_USERS);
            const [projects] = useState(INITIAL_PROJECTS);
            const [objects, setObjects] = useState(() => JSON.parse(localStorage.getItem('mt_objects')) || INITIAL_OBJECTS);
            const [selectedObject, setSelectedObject] = useState(null);

            useEffect(() => {
                localStorage.setItem('mt_objects', JSON.stringify(objects));
            }, [objects]);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) {
                    setPin(newPin);
                } else {
                    const foundUser = users.find(u => u.pin === newPin);
                    if (foundUser) {
                        setUser(foundUser);
                        setPin('');
                        setView(foundUser.role === 'admin' ? 'dashboard' : 'worker_projects');
                    } else {
                        setPin('');
                    }
                }
            };

            // --- UI: LOGIN ---
            if (view === 'login') return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-white p-6">
                    <div className="mb-12 text-center">
                        <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-900">
                            <Icon name="package" size={40} className="text-white" />
                        </div>
                        <h1 className="text-3xl font-bold mb-2">Montage Manager</h1>
                        <p className="text-slate-400">PIN eingeben</p>
                    </div>
                    <div className="flex gap-4 mb-12">
                        {[0, 1, 2, 3].map(i => (
                            <div key={i} className={`w-4 h-4 rounded-full border-2 border-blue-400 transition-all ${pin.length > i ? 'bg-blue-400 scale-125' : 'bg-transparent'}`} />
                        ))}
                    </div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => (
                            <button key={n} onClick={() => handleLogin(n.toString())} className="h-20 text-2xl font-bold bg-slate-800 rounded-2xl active:bg-blue-600 transition-colors">{n}</button>
                        ))}
                        <div />
                        <button onClick={() => handleLogin('0')} className="h-20 text-2xl font-bold bg-slate-800 rounded-2xl active:bg-blue-600">0</button>
                        <button onClick={() => setPin('')} className="h-20 text-sm font-semibold text-red-400 active:bg-red-900/20 rounded-2xl">Reset</button>
                    </div>
                </div>
            );

            // --- UI: WORKER PROJECTS ---
            if (view === 'worker_projects') return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col p-4 pb-10">
                    <div className="flex justify-between items-center mb-8 pt-4">
                        <h2 className="text-xl font-bold">Hallo, {user.name}</h2>
                        <button onClick={() => setView('login')} className="p-2 text-slate-400"><Icon name="log-out" /></button>
                    </div>
                    <div className="space-y-6">
                        {projects.map(proj => (
                            <div key={proj.id}>
                                <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">{proj.name}</h3>
                                <div className="space-y-3">
                                    {objects.filter(o => o.projectId === proj.id).map(obj => (
                                        <button 
                                            key={obj.id} 
                                            onClick={() => { setSelectedObject(obj); setView('worker_detail'); }}
                                            className="w-full bg-slate-800 border border-slate-700/50 p-5 rounded-3xl flex items-center justify-between active:scale-95 transition-transform"
                                        >
                                            <div className="text-left">
                                                <p className="font-bold text-lg">{obj.name}</p>
                                                <p className="text-sm text-slate-400">{obj.current} / {obj.target} fertig</p>
                                            </div>
                                            <Icon name="chevron-right" className="text-slate-600" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // --- UI: WORKER DETAIL ---
            if (view === 'worker_detail') {
                const obj = objects.find(o => o.id === selectedObject.id);
                const update = (amt) => {
                    setObjects(prev => prev.map(o => o.id === obj.id ? {...o, current: Math.min(o.target, o.current + amt)} : o));
                };
                return (
                    <div className="min-h-screen bg-slate-900 text-white flex flex-col p-4">
                        <button onClick={() => setView('worker_projects')} className="flex items-center text-blue-400 font-bold mb-8 pt-4">
                            <Icon name="chevron-left" className="mr-1" /> Zurück
                        </button>
                        <h2 className="text-2xl font-bold mb-2">{obj.name}</h2>
                        <div className="bg-slate-800 rounded-3xl p-10 text-center mb-8 border border-slate-700">
                            <span className="text-7xl font-black text-blue-400">{obj.current}</span>
                            <span className="text-xl text-slate-600 ml-2">/ {obj.target}</span>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <button onClick={() => update(1)} className="bg-blue-600 h-32 rounded-3xl flex flex-col items-center justify-center active:bg-blue-700">
                                <Icon name="plus" size={32} /><span className="font-bold mt-2">+1</span>
                            </button>
                            <button onClick={() => update(10)} className="bg-blue-500 h-32 rounded-3xl flex flex-col items-center justify-center active:bg-blue-600">
                                <Icon name="plus" size={32} /><span className="font-bold mt-2">+10</span>
                            </button>
                        </div>
                        <button onClick={() => update(obj.target - obj.current)} className="bg-green-600 w-full py-5 rounded-2xl font-bold flex items-center justify-center gap-2 active:bg-green-700">
                            <Icon name="check-circle" /> Alles fertig melden
                        </button>
                    </div>
                );
            }

            // --- UI: ADMIN DASHBOARD (Vereinfacht) ---
            if (view === 'dashboard') return (
                <div className="min-h-screen bg-slate-50 flex flex-col p-4">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl font-bold text-slate-800">Admin Dashboard</h2>
                        <button onClick={() => setView('login')} className="p-2 text-slate-400"><Icon name="log-out" /></button>
                    </div>
                    <div className="bg-blue-600 text-white p-6 rounded-3xl mb-6 shadow-lg">
                        <p className="text-blue-100 mb-1">Status Gesamt</p>
                        <h3 className="text-4xl font-bold mb-4">Übersicht</h3>
                        <div className="space-y-4">
                            {objects.map(o => (
                                <div key={o.id} className="text-sm">
                                    <div className="flex justify-between mb-1">
                                        <span>{o.name}</span>
                                        <span className="font-mono">{o.current}/{o.target}</span>
                                    </div>
                                    <div className="w-full bg-blue-400/30 h-2 rounded-full">
                                        <div className="bg-white h-full rounded-full" style={{width: `${(o.current/o.target)*100}%`}}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <p className="text-center text-slate-400 text-sm italic mt-auto">Weitere Admin-Funktionen folgen in Kürze...</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
