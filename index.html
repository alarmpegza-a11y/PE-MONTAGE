<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Montage Manager Pro Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD25cVhiguQKP4PTD8evGI4CxSh7rglbBs",
            authDomain: "montage-pe-a5f79.firebaseapp.com",
            projectId: "montage-pe-a5f79",
            storageBucket: "montage-pe-a5f79.firebasestorage.app",
            messagingSenderId: "588324363042",
            appId: "1:588324363042:web:c544a07261f62de427237b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseSDK = { db, auth, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        :root { 
            --primary: #60a5fa; 
            --bg-main: #1e293b; 
            --card-bg: #334155;
            --accent: #38bdf8;
        }
        body { 
            overscroll-behavior-y: contain; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased; 
        }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(51, 65, 85, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: #334155; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .page-transition { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        input:focus, textarea:focus { border-color: var(--primary) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo } = React;

        const translations = {
            de: { search: "Suche Adresse...", partial: "Offen zum montieren", finished: "Fertig montiert", blocked: "Blockiert / Problem", openItems: "Offen?", reason: "Grund...", submit: "Senden", cancel: "Abbrechen", placeholderNum: "Zahl...", back: "Zurück" },
            sq: { search: "Kërko adresën...", partial: "Hapur për montim", finished: "Përfunduar", blocked: "Bllokuar", openItems: "Hapur?", reason: "Arsyeja...", submit: "Dërgo", cancel: "Anulo", placeholderNum: "Numri...", back: "Mbrapa" },
            it: { search: "Cerca...", partial: "Aperto per il montaggio", finished: "Finito", blocked: "Bloccato", openItems: "Aperti?", reason: "Motivo...", submit: "Invia", cancel: "Annulla", placeholderNum: "Num...", back: "Indietro" }
        };

        const Icon = memo(({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide-name', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, nameAttr: 'data-lucide-name' });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;
        });

        const formatDate = (isoStr) => {
            if (!isoStr) return "N/A";
            const d = new Date(isoStr);
            return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        };

        const ADMIN_PIN = "8852";
        const WORKER_PIN = "8623";

        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [workerSearchTerm, setWorkerSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);
            const [editObject, setEditObject] = useState(null); // Für manuelle Bearbeitung
            const [importText, setImportText] = useState('');
            const [importSummary, setImportSummary] = useState(null);
            const [isImporting, setIsImporting] = useState(false);
            const [selectedObject, setSelectedObject] = useState(null);
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('de');
            const [adminFilter, setAdminFilter] = useState('all'); 
            const [workerStatusMode, setWorkerStatusMode] = useState(''); 
            const [workerRemaining, setWorkerRemaining] = useState('');
            const [workerBlockReason, setWorkerBlockReason] = useState('');
            const [objects, setObjects] = useState([]);

            const appId = 'montage-pe-a5f79';
            const t = translations[lang];

            useEffect(() => {
                const initLiveSync = async () => {
                    if (!window.FirebaseSDK) return;
                    const { auth, signInAnonymously, onAuthStateChanged, db, collection, onSnapshot, query } = window.FirebaseSDK;
                    
                    try {
                        await signInAnonymously(auth);
                    } catch(e) { console.error("Auth Error", e); }

                    const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'objects');
                            const q = query(collRef);
                            const unsubscribeData = onSnapshot(q, (snapshot) => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                setObjects(data);
                            }, (err) => {
                                console.error("Firestore Sync Error", err);
                            });
                            return () => unsubscribeData();
                        }
                    });
                    return () => unsubscribeAuth();
                };
                initLiveSync();
            }, [appId]);

            const handleLogin = (digit) => {
                const newPin = pin + digit;
                if (newPin.length < 4) setPin(newPin);
                else {
                    if (newPin === ADMIN_PIN) setView('dashboard');
                    else if (newPin === WORKER_PIN) setView('worker_list');
                    setPin('');
                }
            };

            const processTextImport = async () => {
                if (!importText.trim()) return;
                setIsImporting(true);
                const lines = importText.split(/\r?\n/);
                let currentDay = new Date();
                let currentDayLabel = "Heute";
                const newObjects = [];
                const summaryEntries = [];
                const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i;

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const dayMatch = trimmed.match(dayRegex);
                    if (dayMatch) {
                        const [_, dName, dStr] = dayMatch;
                        const [d, m, y] = dStr.split('.');
                        currentDay = new Date(y, m - 1, d);
                        currentDayLabel = `${dName} ${dStr}`;
                        continue;
                    }
                    if (trimmed.toUpperCase().startsWith("LIEFERUNG")) {
                        const content = trimmed.replace(/^LIEFERUNG\s*/i, "").trim();
                        const addressRegex = /([A-ZÄÖÜa-zäöüß\s\.\-]+\s\d*[a-z]?,\s\d{4,5}\s[A-ZÄÖÜa-zäöüß\s\.\-]+)/;
                        const addressMatch = content.match(addressRegex);
                        let address = addressMatch ? addressMatch[0].trim() : "Unbekannte Adresse";
                        const parts = content.split(address);
                        let customer = parts[0]?.trim().replace(/,$/, '') || "Kunde";
                        let remainder = parts[1]?.trim() || "";
                        const eleMatch = remainder.match(/(\d+)\s?ELE/i);
                        const houseMatch = remainder.match(/(Haus\s?\d+)/i);
                        const objId = `obj-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
                        newObjects.push({
                            id: objId, name: address, customer, address,
                            houseInfo: houseMatch ? houseMatch[0] : "Gesamtmontage",
                            target: eleMatch ? parseInt(eleMatch[1]) : 1,
                            current: 0, lastRemaining: null, blockReason: null, 
                            deliveryDate: currentDay.toISOString(), status: 'active', history: []
                        });
                        let entry = summaryEntries.find(e => e.label === currentDayLabel);
                        if (!entry) summaryEntries.push({ label: currentDayLabel, count: 1 });
                        else entry.count++;
                    }
                }
                if (newObjects.length > 0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const obj of newObjects) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), obj);
                    setImportSummary({ days: summaryEntries, total: newObjects.length });
                }
                setIsImporting(false); setImportText(''); setShowImportModal(false);
            };

            const submitWorkerUpdate = async () => {
                const now = new Date().toISOString();
                const { db, doc, updateDoc } = window.FirebaseSDK;
                const obj = selectedObject;
                let updates = { history: [{ date: now, mode: workerStatusMode, detail: workerStatusMode === 'blocked' ? workerBlockReason : workerRemaining }, ...(obj.history || [])] };
                if (workerStatusMode === 'finished') updates = { ...updates, current: obj.target, status: 'finished', finishedAt: now, lastRemaining: 0, blockReason: null };
                else if (workerStatusMode === 'blocked') updates = { ...updates, status: 'blocked', blockReason: workerBlockReason };
                else if (workerStatusMode === 'partial') {
                    const open = parseInt(workerRemaining) || 0;
                    updates = { ...updates, current: Math.max(0, obj.target - open), status: 'active', lastRemaining: open, blockReason: null };
                }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id), updates);
                setWorkerStatusMode(''); setWorkerRemaining(''); setWorkerBlockReason(''); setView('worker_list');
            };

            const saveManualEdit = async () => {
                if (!editObject) return;
                const { db, doc, updateDoc } = window.FirebaseSDK;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', editObject.id), {
                        address: editObject.address,
                        customer: editObject.customer,
                        houseInfo: editObject.houseInfo,
                        target: parseInt(editObject.target) || 0
                    });
                    setEditObject(null);
                } catch (e) { alert("Fehler beim Speichern: " + e.message); }
            };

            const stats = useMemo(() => {
                let total = 0, done = 0, blocked = 0, partial = 0;
                objects.forEach(obj => {
                    total += obj.target; done += obj.current;
                    if (obj.status === 'blocked') blocked++;
                    if (obj.lastRemaining > 0 && obj.status !== 'finished' && obj.status !== 'blocked') partial++;
                });
                return { open: objects.filter(o => o.status === 'active').length, percent: total > 0 ? Math.round((done/total)*100) : 0, blocked, partial };
            }, [objects]);

            const filteredObjects = useMemo(() => {
                let list = objects;
                if (adminFilter === 'blocked') list = list.filter(o => o.status === 'blocked');
                else if (adminFilter === 'partial') list = list.filter(o => o.lastRemaining > 0 && o.status !== 'finished' && o.status !== 'blocked');
                return list.filter(o => o.address.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [objects, adminFilter, searchTerm]);

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-800">
                    <div className="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-xl mb-6"><Icon name="shield-check" size={32} className="text-white" /></div>
                    <h1 className="text-2xl font-black text-white italic mb-10 uppercase tracking-tight">Montage Manager</h1>
                    <div className="flex gap-3 mb-10">{[0,1,2,3].map(i => <div key={i} className={`w-3 h-3 rounded-full border-2 border-blue-400 transition-all ${pin.length > i ? 'bg-blue-400 scale-110' : 'bg-transparent opacity-20'}`} />)}</div>
                    <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                        {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleLogin(n.toString())} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">{n}</button>)}
                        <button onClick={() => setPin('')} className="h-16 flex items-center justify-center text-slate-400"><Icon name="delete" size={24}/></button>
                        <button onClick={() => handleLogin('0')} className="h-16 glass rounded-xl text-xl font-black text-white active:scale-90 border border-white/5 shadow-sm">0</button>
                    </div>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <nav className="p-4 sticky top-0 z-40 glass border-b border-white/10 flex justify-between items-center shadow-md">
                        <h2 className="text-sm font-black text-white italic uppercase tracking-widest">Admin Panel</h2>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('login')} className="p-2 text-slate-400 hover:text-white transition-colors"><Icon name="log-out" size={18}/></button>
                        </div>
                    </nav>
                    <main className="p-4 max-w-3xl mx-auto space-y-6">
                        <div className="grid grid-cols-4 gap-2">
                            {[ 
                                { label: 'Aktiv', val: stats.open, color: 'blue', filter: 'all' },
                                { label: 'Blockiert', val: stats.blocked, color: 'red', filter: 'blocked' },
                                { label: 'Teilweise', val: stats.partial, color: 'orange', filter: 'partial' },
                                { label: 'Status', val: `${stats.percent}%`, color: 'emerald', filter: null }
                            ].map((s,i) => (
                                <div key={i} onClick={() => s.filter && setAdminFilter(s.filter)} className={`card-gradient p-2 rounded-xl border transition-all cursor-pointer ${adminFilter === s.filter ? `border-${s.color}-400` : 'border-white/5'}`}>
                                    <p className="text-[7px] font-black text-slate-400 uppercase tracking-tighter">{s.label}</p>
                                    <div className={`text-lg font-black text-${s.color === 'emerald' ? 'emerald-400' : s.color === 'blue' ? 'blue-400' : s.color === 'red' ? 'red-400' : 'orange-400'}`}>{s.val}</div>
                                </div>
                            ))}
                        </div>

                        <button onClick={() => setShowImportModal(true)} className="w-full bg-blue-500 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-500/10 active:scale-95 transition-all">Dispo-Text Importieren</button>

                        <div className="flex items-center justify-between px-1">
                             <h4 className="text-[10px] font-black text-slate-400 uppercase italic">Objekt Liste</h4>
                             <input type="text" placeholder="Suche..." className="bg-transparent text-[10px] font-bold text-white border-b border-white/10 outline-none w-24 placeholder:text-slate-600" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>

                        <div className="space-y-3">
                            {filteredObjects.map(obj => (
                                <div key={obj.id} onClick={() => setEditObject(obj)} className={`card-gradient rounded-xl border p-4 relative transition-all active:scale-[0.98] cursor-pointer ${obj.status === 'blocked' ? 'border-red-400/40' : 'border-white/5 hover:border-white/20'}`}>
                                    <button onClick={(e) => {
                                        e.stopPropagation();
                                        if(confirm('Objekt endgültig löschen?')) {
                                            const { db, doc, deleteDoc } = window.FirebaseSDK;
                                            deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'objects', obj.id));
                                        }
                                    }} className="absolute top-4 right-4 text-slate-500 hover:text-red-400"><Icon name="trash-2" size={14}/></button>
                                    
                                    <h3 className="text-xs font-black text-white italic uppercase mb-1 pr-6 tracking-tight">{obj.address}</h3>
                                    
                                    {obj.status === 'blocked' && obj.blockReason && (
                                        <div className="bg-red-500/10 border border-red-500/20 rounded p-2 mb-2">
                                            <p className="text-[10px] font-bold text-red-400 uppercase">Grund: {obj.blockReason}</p>
                                        </div>
                                    )}

                                    <p className="text-[10px] font-bold text-blue-300 mb-2 uppercase">{obj.customer} | {obj.houseInfo}</p>
                                    
                                    <div className="flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-[8px] text-slate-400 font-bold uppercase">{formatDate(obj.deliveryDate)}</span>
                                            {obj.lastRemaining > 0 && obj.status !== 'finished' && (
                                                <span className="text-[10px] font-black text-orange-400 uppercase mt-0.5 animate-pulse">Offen: {obj.lastRemaining} Elemente</span>
                                            )}
                                        </div>
                                        <span className="text-[10px] font-black text-white">{obj.current}/{obj.target} ELE</span>
                                    </div>
                                    
                                    <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden shadow-inner">
                                        <div className={`h-full transition-all duration-1000 ${obj.status === 'blocked' ? 'bg-red-500' : 'bg-blue-400'}`} style={{width: `${(obj.current/obj.target)*100}%`}}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MANUELLE BEARBEITUNG MODAL */}
                    {editObject && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-4 page-transition">
                            <div className="w-full max-w-sm glass rounded-3xl p-6 space-y-4">
                                <h3 className="text-xs font-black text-white uppercase italic mb-2 tracking-widest">Objekt bearbeiten</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-[8px] uppercase font-black text-slate-400 ml-2">Adresse</label>
                                        <input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.address} onChange={(e) => setEditObject({...editObject, address: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[8px] uppercase font-black text-slate-400 ml-2">Kunde</label>
                                        <input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.customer} onChange={(e) => setEditObject({...editObject, customer: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[8px] uppercase font-black text-slate-400 ml-2">Haus-Info</label>
                                        <input className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.houseInfo} onChange={(e) => setEditObject({...editObject, houseInfo: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[8px] uppercase font-black text-slate-400 ml-2">Ziel-Elemente (ELE)</label>
                                        <input type="number" className="w-full p-3 rounded-xl bg-slate-800 border border-white/10 text-white text-[11px] font-bold" value={editObject.target} onChange={(e) => setEditObject({...editObject, target: e.target.value})} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 pt-4">
                                    <button onClick={() => setEditObject(null)} className="py-4 text-[10px] font-black uppercase text-slate-500">Abbrechen</button>
                                    <button onClick={saveManualEdit} className="bg-blue-500 py-4 rounded-xl text-[10px] font-black uppercase text-white shadow-lg shadow-blue-500/20">Speichern</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showImportModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/98 p-6 flex flex-col page-transition">
                            <h3 className="text-sm font-black text-white uppercase italic mb-4">Text Import</h3>
                            <textarea className="flex-1 w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-[11px] text-white outline-none font-mono resize-none focus:border-blue-400 transition-colors" placeholder="Kopiere die Dispo-Liste hier hinein..." value={importText} onChange={(e) => setImportText(e.target.value)}></textarea>
                            <div className="grid grid-cols-2 gap-4 mt-6">
                                <button onClick={() => setShowImportModal(false)} className="py-4 text-slate-500 font-black uppercase text-[10px]">Abbrechen</button>
                                <button onClick={processTextImport} disabled={isImporting} className="bg-blue-500 text-white py-4 rounded-xl font-black uppercase text-[10px] disabled:opacity-50 shadow-lg shadow-blue-500/20">
                                    {isImporting ? 'Lädt...' : 'Import starten'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'worker_list') return (
                <div className="min-h-screen bg-slate-800 pb-20 page-transition">
                    <header className="p-6 flex flex-col gap-4 border-b border-white/5 glass">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-black text-white italic uppercase tracking-tighter">MO-BOARD</h1>
                            <button onClick={() => setView('login')} className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center text-slate-400"><Icon name="power" size={18}/></button>
                        </div>
                        <div className="flex gap-2 justify-center">
                            {['de', 'sq', 'it'].map(l => <button key={l} onClick={() => setLang(l)} className={`px-4 py-2 rounded-xl text-[10px] font-bold border transition-all ${lang === l ? 'bg-blue-500 border-blue-400 text-white' : 'bg-slate-700 border-white/5 text-slate-400'}`}>{l.toUpperCase()}</button>)}
                        </div>
                    </header>
                    <main className="p-4 space-y-3">
                        <input type="text" placeholder={t.search} className="w-full bg-slate-900 border border-white/5 rounded-xl py-4 px-4 text-sm font-bold text-white outline-none focus:border-blue-400 transition-all placeholder:text-slate-600 shadow-inner" value={workerSearchTerm} onChange={(e) => setWorkerSearchTerm(e.target.value)} />
                        {objects.filter(o => o.status !== 'finished' && o.address.toLowerCase().includes(workerSearchTerm.toLowerCase())).map(obj => (
                            <button key={obj.id} onClick={() => { setSelectedObject(obj); setView('worker_edit'); }} className="w-full bg-slate-700/60 rounded-xl border border-white/5 p-5 text-left flex justify-between items-center active:bg-slate-700 shadow-sm transition-all border-l-4 border-l-blue-400">
                                <div>
                                    <h3 className="text-xs font-black text-white uppercase italic truncate max-w-[200px] mb-1">{obj.address}</h3>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{obj.customer} • {obj.houseInfo}</p>
                                </div>
                                <Icon name="arrow-right" size={18} className="text-blue-400" />
                            </button>
                        ))}
                    </main>
                </div>
            );

            if (view === 'worker_edit') return (
                <div className="min-h-screen bg-slate-800 flex flex-col page-transition">
                    <header className="p-4 flex items-center gap-4 border-b border-white/5 glass shadow-sm">
                        <button onClick={() => { setView('worker_list'); setWorkerStatusMode(''); }} className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center text-blue-400 active:scale-90 transition-transform"><Icon name="arrow-left" size={20}/></button>
                        <h2 className="text-[10px] font-black text-white uppercase italic truncate">{selectedObject?.address}</h2>
                    </header>
                    <main className="p-6 space-y-4 max-w-md mx-auto w-full">
                        <button onClick={() => setWorkerStatusMode('partial')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 transition-all shadow-md ${workerStatusMode === 'partial' ? 'bg-blue-500 scale-[1.02] border-blue-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.partial}</span>
                            {workerStatusMode === 'partial' && <input type="number" className="w-full bg-white/20 rounded-xl p-3 text-white font-black text-center outline-none border border-white/10" placeholder={t.placeholderNum} value={workerRemaining} onChange={(e) => setWorkerRemaining(e.target.value)} onClick={(e) => e.stopPropagation()} autoFocus />}
                        </button>
                        <button onClick={() => setWorkerStatusMode('finished')} className={`w-full p-5 rounded-2xl border flex items-center justify-between transition-all shadow-md ${workerStatusMode === 'finished' ? 'bg-emerald-500 scale-[1.02] border-emerald-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.finished}</span>
                            <Icon name="check-circle" size={24} className="text-white"/>
                        </button>
                        <button onClick={() => setWorkerStatusMode('blocked')} className={`w-full p-5 rounded-2xl border flex flex-col gap-2 transition-all shadow-md ${workerStatusMode === 'blocked' ? 'bg-red-500 scale-[1.02] border-red-300' : 'bg-slate-700 border-white/5 opacity-80'}`}>
                            <span className="text-[10px] font-black uppercase text-white">{t.blocked}</span>
                            {workerStatusMode === 'blocked' && <textarea className="mt-2 w-full bg-white/20 rounded-xl p-3 text-white text-[10px] font-bold h-24 border border-white/10 outline-none" placeholder={t.reason} value={workerBlockReason} onChange={(e) => setWorkerBlockReason(e.target.value)} onClick={(e) => e.stopPropagation()} autoFocus></textarea>}
                        </button>
                        {workerStatusMode && <button onClick={submitWorkerUpdate} className="w-full py-5 bg-white text-slate-800 rounded-2xl font-black uppercase tracking-widest text-[11px] mt-6 shadow-2xl active:scale-95 transition-transform">Senden</button>}
                    </main>
                </div>
            );
            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
