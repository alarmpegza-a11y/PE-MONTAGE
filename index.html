                                        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                                            <div style={{ width:7, height:7, borderRadius:'50%', background:'#f59e0b' }}></div>
                                            <span style={{ color:'#f59e0b', fontSize:11, fontWeight:900 }}>{getMonthLabel(monthKey)}</span>
                                            <span style={{ background:'rgba(245,158,11,0.2)', color:'#f59e0b', borderRadius:20, padding:'1px 7px', fontSize:9, fontWeight:900 }}>{monthItems.length}</span>
                                        </div>
                                        <span style={{ color:'#f59e0b', fontSize:11 }}>{isExpanded?'▲':'▼'}</span>
                                    </div>
                                    {isExpanded && (
                                        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                                            {monthItems.map(item => (
                                                <div key={item.id} onClick={()=>setSelectedItem(item)} style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #f59e0b', borderRadius:10, padding:'12px 14px', cursor:'pointer' }} onMouseEnter={e=>e.currentTarget.style.background='#263348'} onMouseLeave={e=>e.currentTarget.style.background='#1e293b'}>
                                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                                                        <div>
                                                            <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase' }}>{item.customer}</div>
                                                            {item.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{item.address}</div>}
                                                            {item.memo && <div style={{ color:'#fde68a', fontSize:9, fontWeight:800, marginTop:3, borderLeft:'2px solid #f59e0b', paddingLeft:5 }}>📝 {item.memo}</div>}
                                                        </div>
                                                        <div style={{ background:'#f59e0b', color:'#fff', fontSize:8, fontWeight:900, padding:'4px 8px', borderRadius:6, textTransform:'uppercase', flexShrink:0 }}>Wählen →</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function VerschiebenModal({ entry, onClose, onSave }) {
            const startStr = (entry.deliveryDate||'').substring(0,10);
            const endStr = (entry.endDate||entry.deliveryDate||'').substring(0,10);
            const duration = daysBetween(startStr, endStr);
            const [newStart, setNewStart] = useState(startStr);
            const [keepDuration, setKeepDuration] = useState(true);
            const [newEnd, setNewEnd] = useState(endStr);
            const calcEnd = (start, days) => { const d = new Date(start); d.setDate(d.getDate() + days - 1); return toLocalDateStr(d); };
            const handleStartChange = (val) => { setNewStart(val); if (keepDuration) setNewEnd(calcEnd(val, duration)); else if (newEnd < val) setNewEnd(val); };
            const handleSave = () => { onSave(entry.id, newStart, keepDuration ? calcEnd(newStart, duration) : newEnd); };

            return (
                <div className="verschieben-overlay" onClick={onClose}>
                    <div className="verschieben-modal" onClick={e=>e.stopPropagation()}>
                        <div>
                            <div style={{ color:'#f59e0b', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:1.5, marginBottom:4 }}>📅 Auftrag verschieben</div>
                            <div style={{ color:'#fff', fontSize:13, fontWeight:900, textTransform:'uppercase' }}>{entry.customer}</div>
                            {entry.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{entry.address}</div>}
                        </div>
                        <div style={{ background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.25)', borderRadius:8, padding:'8px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>
                            Aktuell: {formatDate(startStr)}{duration>1?` → ${formatDate(endStr)} (${duration} Tage)`:''}
                        </div>
                        <div>
                            <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Neues Startdatum</div>
                            <input type="date" value={newStart} onChange={e=>handleStartChange(e.target.value)} style={{ width:'100%', background:'#0f172a', border:'2px solid #3b82f6', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:13, boxSizing:'border-box' }}/>
                        </div>
                        {duration > 1 && (
                            <div>
                                <label style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer' }}>
                                    <input type="checkbox" checked={keepDuration} onChange={e=>setKeepDuration(e.target.checked)} style={{ width:16, height:16, accentColor:'#3b82f6' }}/>
                                    <span style={{ color:'#94a3b8', fontSize:10, fontWeight:700 }}>Dauer beibehalten ({duration} Tage)</span>
                                </label>
                                {!keepDuration && (
                                    <div style={{ marginTop:10 }}>
                                        <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Neues Enddatum</div>
                                        <input type="date" value={newEnd} min={newStart} onChange={e=>setNewEnd(e.target.value)} style={{ width:'100%', background:'#0f172a', border:'2px solid rgba(59,130,246,0.5)', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:13, boxSizing:'border-box' }}/>
                                    </div>
                                )}
                                {keepDuration && newStart && <div style={{ marginTop:6, color:'#60a5fa', fontSize:9, fontWeight:700 }}>Enddatum wird: {formatDate(calcEnd(newStart, duration))}</div>}
                            </div>
                        )}
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                            <button onClick={onClose} style={{ padding:'12px', background:'transparent', border:'1px solid #334155', borderRadius:10, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                            <button onClick={handleSave} style={{ padding:'12px', background:'#3b82f6', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>✓ Verschieben</button>
                        </div>
                    </div>
                </div>
            );
        }

        function SendToKalenderModal({ entry, onClose, onSent, appId, objects }) {
            const [kalenderTeams, setKalenderTeams] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [selectedTeam, setSelectedTeam] = React.useState(null);
            const [startDate, setStartDate] = React.useState((entry.deliveryDate||'').substring(0,10)||toLocalDateStr(new Date()));
            const [endDate, setEndDate] = React.useState((entry.endDate||'').substring(0,10)||'');
            const [keepOriginal, setKeepOriginal] = React.useState(false);
            const [calType, setCalType] = React.useState('montage');
            const [saving, setSaving] = React.useState(false);
            const [done, setDone] = React.useState(false);

            React.useEffect(() => {
                if (!window.PeKalenderReady || !window.PeKalenderSDK) {
                    setLoading(false); return;
                }
                const { db, col, onSnapshot } = window.PeKalenderSDK;
                const unsub = onSnapshot(col(db, 'teams_config'), snap => {
                    setKalenderTeams(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const genId2 = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Date.now().toString(36); } };

            const doSend = async () => {
                if (!selectedTeam) return;
                setSaving(true);
                try {
                    const { db, col, doc, setDoc, deleteDoc } = window.PeKalenderSDK;
                    const id = 'cal-' + genId2();
                    const isMultiDay = !!(endDate && endDate > startDate);
                    // Write to PE-KALENDER teams_cal collection
                    await setDoc(doc(db, `teams_cal_${selectedTeam.id}`, id), {
                        id,
                        createdAt: new Date().toISOString(),
                        isDone: false, isBilled: false,
                        entryType: entry.entryType || 'LIEFERUNG',
                        customer: entry.customer || '',
                        address: entry.address || '',
                        memo: entry.memo || '',
                        auftragsNr: entry.auftragsNr || '',
                        target: parseInt(entry.target) || 0,
                        images: [], image: null,
                        deliveryDate: startDate,
                        endDate: isMultiDay ? endDate : null,
                        isMultiDay,
                        calType: calType,
                        isProv: false,
                        customStartLabel: '',
                        fromMontageManager: true,
                    });
                    // If move (not keep): delete from PE-Montage calentries
                    if (!keepOriginal) {
                        const { db: db1, doc: doc1, deleteDoc: del1 } = window.FirebaseSDK;
                        await del1(doc1(db1, 'artifacts', appId, 'public', 'data', 'calentries', entry.id));
                        // Also delete matching object from dashboard
                        const entryAufnr = cleanAuftragsNr(entry.auftragsNr || '');
                        const entryAddr = (entry.address || '').trim().toLowerCase();
                        for (const obj of (objects || [])) {
                            const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');
                            const objAddr = (obj.address || '').trim().toLowerCase();
                            if ((entryAufnr && objAufnr && entryAufnr === objAufnr) || (entryAddr && objAddr && entryAddr === objAddr)) {
                                const { doc: d1, deleteDoc: dd1 } = window.FirebaseSDK;
                                await dd1(d1(window.FirebaseSDK.db, 'artifacts', appId, 'public', 'data', 'objects', obj.id));
                            }
                        }
                    }
                    setDone(true);
                    setTimeout(() => onSent(selectedTeam.name, keepOriginal), 800);
                } catch(err) {
                    alert('Fehler: ' + err.message);
                }
                setSaving(false);
            };

            const calTypeOptions = [
                { key: 'montage',    label: '🔧 Montage',    color: '#2563eb', bg: 'rgba(37,99,235,0.15)', border: 'rgba(37,99,235,0.4)' },
                { key: 'beplankung', label: '🏗 Beplankung', color: '#059669', bg: 'rgba(5,150,105,0.15)', border: 'rgba(5,150,105,0.4)' },
                { key: 'ausflocken', label: '❄️ Ausflocken', color: '#b45309', bg: 'rgba(180,83,9,0.15)',  border: 'rgba(180,83,9,0.4)' },
            ];

            if (done) return (
                <div style={{ position:'fixed', inset:0, zIndex:210, background:'rgba(10,15,28,0.95)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
                    <div style={{ textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
                        <div style={{ width:72, height:72, background:'rgba(16,185,129,0.2)', border:'2px solid #10b981', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:36 }}>✓</div>
                        <div style={{ color:'#10b981', fontSize:18, fontWeight:900 }}>{keepOriginal ? `Kopiert nach: ${selectedTeam?.name}` : `Verschoben nach: ${selectedTeam?.name}`}</div>
                        <div style={{ color:'#64748b', fontSize:11 }}>PE-KALENDER · {calTypeOptions.find(o=>o.key===calType)?.label}</div>
                    </div>
                </div>
            );

            return (
                <div style={{ position:'fixed', inset:0, zIndex:210, background:'rgba(10,15,28,0.95)', backdropFilter:'blur(6px)', display:'flex', flexDirection:'column', overflowY:'auto' }}>
                    {/* Header */}
                    <div style={{ background:'linear-gradient(135deg,#1a2540,#1e3a5f)', padding:'16px 20px', borderBottom:'2px solid rgba(37,99,235,0.35)', flexShrink:0 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                                <div style={{ width:40, height:40, borderRadius:12, background:'rgba(37,99,235,0.25)', border:'2px solid #3b82f6', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>⧉→</div>
                                <div>
                                    <div style={{ color:'#60a5fa', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>AN PE-KALENDER SENDEN</div>
                                    <div style={{ color:'#fff', fontSize:14, fontWeight:900, textTransform:'uppercase' }}>{entry.customer}</div>
                                    <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{entry.address}</div>
                                </div>
                            </div>
                            <button onClick={onClose} style={{ background:'rgba(255,255,255,0.08)', border:'none', borderRadius:10, width:34, height:34, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        {/* Keep/Move toggle */}
                        <button onClick={() => setKeepOriginal(k => !k)} style={{ display:'flex', alignItems:'center', gap:8, background:keepOriginal?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.12)', border:`1.5px solid ${keepOriginal?'rgba(16,185,129,0.4)':'rgba(239,68,68,0.4)'}`, borderRadius:10, padding:'7px 14px', cursor:'pointer', color:keepOriginal?'#10b981':'#f87171', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>
                            <span style={{ fontSize:14 }}>{keepOriginal ? '🔗' : '✂️'}</span>
                            {keepOriginal ? 'Kopieren (hier behalten)' : 'Verschieben (hier löschen)'}
                        </button>
                    </div>

                    {/* Body */}
                    <div style={{ flex:1, overflowY:'auto', padding:'16px 20px', display:'flex', flexDirection:'column', gap:16 }}>

                        {/* Gruppe wählen */}
                        <div>
                            <div style={{ color:'#60a5fa', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>1. Gruppe in PE-KALENDER wählen</div>
                            {!window.PeKalenderReady && (
                                <div style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:10, padding:'12px 16px', color:'#f87171', fontSize:11, fontWeight:700 }}>
                                    ⚠️ PE-KALENDER App ist nicht erreichbar. Bitte Internetverbindung prüfen.
                                </div>
                            )}
                            {loading && <div style={{ color:'#64748b', fontSize:11, padding:16 }}>⏳ Lade Gruppen...</div>}
                            {!loading && window.PeKalenderReady && kalenderTeams.length === 0 && (
                                <div style={{ color:'#64748b', fontSize:11, padding:16 }}>Keine Gruppen in PE-KALENDER gefunden.</div>
                            )}
                            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                                {kalenderTeams.map(t => (
                                    <div key={t.id} onClick={() => setSelectedTeam(t)}
                                        style={{ background:selectedTeam?.id===t.id?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.04)', border:`2px solid ${selectedTeam?.id===t.id?'#3b82f6':'rgba(255,255,255,0.08)'}`, borderRadius:12, padding:'12px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:12, transition:'all 0.15s' }}>
                                        <div style={{ width:14, height:14, borderRadius:'50%', background:t.color||'#3b82f6', flexShrink:0 }}></div>
                                        <div style={{ flex:1 }}>
                                            <div style={{ color:'#fff', fontSize:13, fontWeight:900 }}>{t.name}</div>
                                            <div style={{ color:'#475569', fontSize:9, marginTop:1 }}>PIN: {t.pin}</div>
                                        </div>
                                        {selectedTeam?.id === t.id && <span style={{ color:'#3b82f6', fontSize:18, fontWeight:900 }}>✓</span>}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Kalender-Typ */}
                        <div>
                            <div style={{ color:'#60a5fa', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>2. Kalender-Typ</div>
                            <div style={{ display:'flex', gap:8 }}>
                                {calTypeOptions.map(opt => (
                                    <button key={opt.key} onClick={() => setCalType(opt.key)}
                                        style={{ flex:1, padding:'10px 6px', borderRadius:12, border:`2px solid ${calType===opt.key?opt.color:'rgba(255,255,255,0.1)'}`, background:calType===opt.key?opt.bg:'rgba(255,255,255,0.04)', color:calType===opt.key?opt.color:'#64748b', fontWeight:900, fontSize:10, cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:4, transition:'all 0.15s' }}>
                                        <span style={{ fontSize:16 }}>{opt.label.split(' ')[0]}</span>
                                        <span style={{ fontSize:9, textTransform:'uppercase', letterSpacing:1 }}>{opt.label.split(' ').slice(1).join(' ')}</span>
                                        {calType === opt.key && <span style={{ fontSize:7, background:opt.color, color:'#fff', borderRadius:3, padding:'1px 5px' }}>✓ GEWÄHLT</span>}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Datum */}
                        <div>
                            <div style={{ color:'#60a5fa', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>3. Datum im Ziel-Kalender</div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:5 }}>Start-Datum</div>
                                    <input type="date" value={startDate} onChange={e => { setStartDate(e.target.value); if(endDate && endDate < e.target.value) setEndDate(''); }}
                                        style={{ width:'100%', background:'#1e293b', border:'2px solid #3b82f6', borderRadius:10, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:5 }}>End-Datum (optional)</div>
                                    <input type="date" value={endDate} min={startDate} onChange={e => setEndDate(e.target.value)}
                                        style={{ width:'100%', background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                            </div>
                            {endDate && endDate > startDate && (
                                <div style={{ marginTop:8, background:'rgba(37,99,235,0.1)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:8, padding:'6px 12px', fontSize:9, color:'#60a5fa', fontWeight:700 }}>
                                    📅 Mehrtägig
                                </div>
                            )}
                        </div>

                        {/* Vorschau */}
                        {selectedTeam && (
                            <div style={{ background:'rgba(37,99,235,0.07)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:12, padding:'12px 16px' }}>
                                <div style={{ color:'#60a5fa', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:8 }}>Zusammenfassung</div>
                                <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>{entry.customer}</div>
                                <div style={{ color:'#94a3b8', fontSize:10, marginBottom:4 }}>{entry.address}</div>
                                {entry.memo && <div style={{ color:'#fde68a', fontSize:10, fontWeight:700, marginBottom:4 }}>📝 {entry.memo}</div>}
                                <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginTop:6 }}>
                                    <span style={{ background:'rgba(37,99,235,0.2)', border:'1px solid rgba(37,99,235,0.4)', borderRadius:6, padding:'2px 8px', color:'#60a5fa', fontSize:9, fontWeight:900 }}>→ {selectedTeam.name}</span>
                                    <span style={{ background:'rgba(37,99,235,0.1)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:6, padding:'2px 8px', color:'#93c5fd', fontSize:9, fontWeight:900 }}>{calTypeOptions.find(o=>o.key===calType)?.label}</span>
                                    <span style={{ background:keepOriginal?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.12)', border:`1px solid ${keepOriginal?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`, borderRadius:6, padding:'2px 8px', color:keepOriginal?'#10b981':'#f87171', fontSize:9, fontWeight:900 }}>{keepOriginal ? '🔗 Kopie' : '✂️ Verschoben'}</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div style={{ padding:'12px 20px', borderTop:'1px solid rgba(37,99,235,0.2)', background:'#0f172a', flexShrink:0, display:'flex', gap:10 }}>
                        <button onClick={onClose} style={{ flex:1, padding:'14px', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, color:'#64748b', fontWeight:900, fontSize:11, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                        <button onClick={doSend} disabled={!selectedTeam || saving || !window.PeKalenderReady}
                            style={{ flex:2, padding:'14px', background:selectedTeam&&!saving&&window.PeKalenderReady?'#3b82f6':'#1e293b', border:'none', borderRadius:14, color:selectedTeam&&!saving&&window.PeKalenderReady?'#fff':'#475569', fontWeight:900, fontSize:11, textTransform:'uppercase', cursor:selectedTeam&&!saving&&window.PeKalenderReady?'pointer':'not-allowed', boxShadow:selectedTeam&&window.PeKalenderReady?'0 4px 14px rgba(37,99,235,0.4)':'none' }}>
                            {saving ? '⏳ Sende...' : keepOriginal ? `⧉ Kopieren → ${selectedTeam?.name||'Gruppe wählen'}` : `✂️ Verschieben → ${selectedTeam?.name||'Gruppe wählen'}`}
                        </button>
                    </div>
                </div>
            );
        }

        function CalendarView({ onBack, calEntries, setCalEntries, appId, finishedObjects, objects }) {
            const [calWeek, setCalWeek] = useState(new Date());
            const [editCalEntry, setEditCalEntry] = useState(null);
            const [showCalImport, setShowCalImport] = useState(false);
            const [calImportText, setCalImportText] = useState('');
            const [calImportResult, setCalImportResult] = useState(null);
            const [showCalPdfModal, setShowCalPdfModal] = useState(null);
            const [deleteMode, setDeleteMode] = useState(false);
            const [copyEntry, setCopyEntry] = useState(null);
            const [showBillingPanel, setShowBillingPanel] = useState(false);
            const [showGlobalSearch, setShowGlobalSearch] = useState(false);
            const [highlightId, setHighlightId] = useState(null);
            const [showStandbyPicker, setShowStandbyPicker] = useState(false);
            const [showStandbyView, setShowStandbyView] = useState(false);
            const [activeCalType, setActiveCalType] = useState('montage');
            const [showColorPicker, setShowColorPicker] = useState(false);
            const [verschiebenEntry, setVerschiebenEntry] = useState(null);
            const [erledigtConfirmEntry, setErledigtConfirmEntry] = useState(null);
            const [showOffeneListePanel, setShowOffeneListePanel] = useState(false);
            const [offenePdfLoading, setOffenePdfLoading] = useState(false);
            const [mobileDay, setMobileDay] = useState(0); // 0=Mon ... 5=Sa
            const [sendToKalenderEntry, setSendToKalenderEntry] = useState(null);
            const [multiSelectMode, setMultiSelectMode] = useState(false);
            const [multiSelected, setMultiSelected] = useState(new Set());
            const [multiErledigtLoading, setMultiErledigtLoading] = useState(false);
            const [calAdminUnlocked, setCalAdminUnlocked] = useState(false);
            const [showCalAdminPin, setShowCalAdminPin] = useState(false);
            const [calAdminPin, setCalAdminPin] = useState('');
            const [calAdminPinError, setCalAdminPinError] = useState(false);
            const CAL_ADMIN_PIN = '3161';

            // ── Ferien / Abwesenheiten der Monteure ──
            const [monteurs, setMonteurs] = useState([]);
            const [ferien, setFerien] = useState([]);
            const [showFerienModal, setShowFerienModal] = useState(false);
            const [ferienForm, setFerienForm] = useState({ monteurName:'', start:'', end:'' });

            // Keyboard listener for admin PIN modal
            useEffect(() => {
                if (!showCalAdminPin) return;
                const onKey = (e) => {
                    if (e.key >= '0' && e.key <= '9') {
                        setCalAdminPin(prev => {
                            const np = prev + e.key;
                            if (np.length < 4) { setCalAdminPinError(false); return np; }
                            if (np === CAL_ADMIN_PIN) { setCalAdminUnlocked(true); setShowCalAdminPin(false); return ''; }
                            setCalAdminPinError(true); return '';
                        });
                    } else if (e.key === 'Backspace') {
                        setCalAdminPin(p => p.slice(0,-1));
                        setCalAdminPinError(false);
                    } else if (e.key === 'Escape') {
                        setShowCalAdminPin(false); setCalAdminPin('');
                    }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [showCalAdminPin, calAdminPin]);

            // Monteur-Liste (Gesamtbestand) und Ferien live aus Firestore laden
            useEffect(() => {
                if (!window.FirebaseSDK) return;
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                const unsubM = onSnapshot(collection(db,'artifacts',appId,'public','data','monteurs'), (s)=>setMonteurs(s.docs.map(d=>({id:d.id,...d.data()}))));
                const unsubF = onSnapshot(collection(db,'artifacts',appId,'public','data','ferien'), (s)=>setFerien(s.docs.map(d=>({id:d.id,...d.data()}))));
                return () => { try{unsubM&&unsubM();}catch(e){} try{unsubF&&unsubF();}catch(e){} };
            }, [appId]);

            // Welche Monteure sind an einem bestimmten Tag in den Ferien?
            const ferienAmTag = useCallback((dayStr) => {
                return ferien.filter(f => {
                    const s = (f.start||'').substring(0,10);
                    const e = (f.end||f.start||'').substring(0,10);
                    return s && dayStr >= s && dayStr <= e;
                });
            }, [ferien]);

            const saveFerien = async () => {
                const { monteurName, start, end } = ferienForm;
                if (!monteurName.trim() || !start) return;
                const { db, collection, addDoc } = window.FirebaseSDK;
                await addDoc(collection(db,'artifacts',appId,'public','data','ferien'), {
                    monteurName: monteurName.trim(),
                    start: start,
                    end: end || start,
                    createdAt: new Date().toISOString(),
                });
                setFerienForm({ monteurName:'', start:'', end:'' });
                setShowFerienModal(false);
            };

            const deleteFerien = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db,'artifacts',appId,'public','data','ferien',id));
            };

            const days = getCalWeekDays(calWeek);
            const DAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

            // Set of calentry IDs that have a matching object in Dashboard
            const dashboardLinkedIds = useMemo(() => {
                const linked = new Set();
                for (const cal of calEntries) {
                    if (cal.doneAt) continue; // already done, no dot needed
                    const calNr = cleanAuftragsNr(cal.auftragsNr || '');
                    const calAddr = (cal.address || '').trim().toLowerCase();
                    const found = (objects || []).some(obj => {
                        const objNr = cleanAuftragsNr(obj.auftragsNr || '');
                        const objAddr = (obj.address || '').trim().toLowerCase();
                        return (calNr && objNr && calNr === objNr) || (calAddr && objAddr && calAddr === objAddr);
                    });
                    if (found) linked.add(cal.id);
                }
                return linked;
            }, [calEntries, objects]);

            const CAL_TYPE_CONFIG = {
                montage:    { label:'MONTAGE',    banner:'🔧 MONTAGE',    bg:'#2563eb' },
                beplankung: { label:'BEPLANKUNG', banner:'🏗 BEPLANKUNG', bg:'#059669' },
                ausflocken: { label:'AUSFLOCKEN', banner:'❄️ AUSFLOCKEN', bg:'#b45309' },
            };
            const currentCalConfig = CAL_TYPE_CONFIG[activeCalType]||CAL_TYPE_CONFIG.montage;

            const filteredEntries = useMemo(() => calEntries.filter(e=>(e.calType||'montage')===activeCalType), [calEntries, activeCalType]);
            const colorIndex = useMemo(() => buildColorIndex(filteredEntries, days), [filteredEntries, days]);
            const { entryLanes, numLanes, laneVisibleEntries } = useMemo(() => packEntriesIntoLanes(filteredEntries, days), [filteredEntries, days]);
            const entriesForDay = useCallback((dayStr) => {
                return filteredEntries.filter(e => {
                    const start=(e.deliveryDate||'').substring(0,10);
                    const end=(e.endDate||'').substring(0,10)||start;
                    return dayStr>=start&&dayStr<=end;
                });
            }, [filteredEntries]);

            const deleteCalEntry = async (id) => {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                // Delete the calendar entry
                await deleteDoc(doc(db,'artifacts',appId,'public','data','calentries',id));
                // Also delete matching object(s) from the Dashboard (objects collection)
                // Match by auftragsNr (cleaned) or by address
                const calEntry = calEntries.find(e => e.id === id);
                if (calEntry && objects && objects.length > 0) {
                    const calAufnr = cleanAuftragsNr(calEntry.auftragsNr || '');
                    const calAddr = (calEntry.address || '').trim().toLowerCase();
                    for (const obj of objects) {
                        const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');
                        const objAddr = (obj.address || '').trim().toLowerCase();
                        const matchByAufnr = calAufnr && objAufnr && calAufnr === objAufnr;
                        const matchByAddr = calAddr && objAddr && calAddr === objAddr;
                        if (matchByAufnr || matchByAddr) {
                            await deleteDoc(doc(db,'artifacts',appId,'public','data','objects',obj.id));
                        }
                    }
                }
            };

            const compressCalImage = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w=img.width,h=img.height;
                        if (w>1200) { h*=1200/w; w=1200; }
                        canvas.width=w; canvas.height=h;
                        canvas.getContext('2d').drawImage(img,0,0,w,h);
                        resolve(canvas.toDataURL('image/jpeg',0.7));
                    };
                    img.src=e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const saveCalEntry = async (entry) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                const colorOverrideVal = (entry.colorOverride!==null&&entry.colorOverride!==undefined)?entry.colorOverride:null;
                await updateDoc(doc(db,'artifacts',appId,'public','data','calentries',entry.id), {
                    entryType:entry.entryType||'LIEFERUNG', customer:entry.customer, address:entry.address,
                    memo:entry.memo, auftragsNr:entry.auftragsNr, target:parseInt(entry.target)||0,
                    deliveryDate:entry.deliveryDate, endDate:entry.endDate||entry.deliveryDate,
                    calType:entry.calType||'montage', image:entry.image||null, colorOverride:colorOverrideVal,
                    billingStatus:entry.billingStatus||null,
                });
                setEditCalEntry(null); setShowColorPicker(false);
            };

            const saveNewCalEntry = async (entry) => {
                const { db, doc, setDoc } = window.FirebaseSDK;
                const id = `cal-${crypto.randomUUID()}`;
                const payload = {...entry,id,createdAt:new Date().toISOString()};
                delete payload.isNew;
                if (!payload.entryType) payload.entryType='LIEFERUNG';
                if (!payload.endDate) payload.endDate=payload.deliveryDate;
                if (payload.billingStatus===undefined) payload.billingStatus=null;
                if (!payload.calType) payload.calType=activeCalType;
                if (payload.colorOverride===undefined) payload.colorOverride=null;
                await setDoc(doc(db,'artifacts',appId,'public','data','calentries',id), payload);
                // Gleichzeitig auch im Admin-Dashboard (objects) anlegen
                const objId = `obj-${id}`;
                const eleMatch = (payload.memo||'').match(/(\d+)\s*ELE/i);
                const target = eleMatch ? parseInt(eleMatch[1]) : (parseInt(payload.target)||1);
                await setDoc(doc(db,'artifacts',appId,'public','data','objects',objId), {
                    id: objId, calEntryId: id,
                    name: payload.address || payload.customer,
                    customer: payload.customer || '',
                    address: payload.address || '',
                    houseInfo: payload.memo || 'Gesamtmontage',
                    memo: payload.memo || '',
                    auftragsNr: payload.auftragsNr || '',
                    target, current: 0,
                    lastRemaining: null, blockReason: null,
                    deliveryDate: payload.deliveryDate || new Date().toISOString(),
                    status: 'active', history: [],
                });
                setEditCalEntry(null); setShowColorPicker(false);
            };

            const handleVerschieben = async (entryId, newStart, newEnd) => {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db,'artifacts',appId,'public','data','calentries',entryId), { deliveryDate: newStart, endDate: newEnd });
                setVerschiebenEntry(null);
                setCalWeek(new Date(newStart));
            };

            const markMultiErledigt = async () => {
                if (multiSelected.size === 0) return;
                setMultiErledigtLoading(true);
                const { db, doc, setDoc, updateDoc, deleteDoc } = window.FirebaseSDK;
                const now = new Date().toISOString();
                for (const id of multiSelected) {
                    const entry = calEntries.find(e => e.id === id);
                    if (!entry) continue;
                    // 1. calentry als erledigt markieren
                    await updateDoc(doc(db,'artifacts',appId,'public','data','calentries',id), { doneAt: now });
                    // 2. In finishedjobs speichern
                    const finishedId = `fin-cal-${id}`;
                    await setDoc(doc(db,'artifacts',appId,'public','data','finishedjobs',finishedId), {
                        id: finishedId, originalCalId: id,
                        customer: entry.customer || '', address: entry.address || '',
                        memo: entry.memo || '', auftragsNr: entry.auftragsNr || '',
                        target: parseInt(entry.target)||0, deliveryDate: entry.deliveryDate || now,
                        finishedAt: now, status: 'finished', calType: entry.calType || 'montage',
                        billingStatus: entry.billingStatus || null,
                    });
                    // 3. Passendes objects-Dokument löschen
                    const entryAufnr = cleanAuftragsNr(entry.auftragsNr || '');
                    const entryAddr = (entry.address || '').trim().toLowerCase();
                    for (const obj of (objects || [])) {
                        const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');
                        const objAddr = (obj.address || '').trim().toLowerCase();
                        if ((entryAufnr && objAufnr && entryAufnr === objAufnr) || (entryAddr && objAddr && entryAddr === objAddr)) {
                            await deleteDoc(doc(db,'artifacts',appId,'public','data','objects',obj.id));
                        }
                    }
                }
                setMultiSelected(new Set());
                setMultiSelectMode(false);
                setMultiErledigtLoading(false);
            };

            const markCalEntryDone = async (entry) => {
                const { db, doc, setDoc, updateDoc, deleteDoc } = window.FirebaseSDK;
                const now = new Date().toISOString();
                // 1. Calentry als erledigt markieren
                await updateDoc(doc(db,'artifacts',appId,'public','data','calentries',entry.id), { doneAt: now });
                // 2. In finishedjobs speichern (für Abrechnung)
                const finishedId = `fin-cal-${entry.id}`;
                await setDoc(doc(db,'artifacts',appId,'public','data','finishedjobs',finishedId), {
                    id: finishedId,
                    originalCalId: entry.id,
                    customer: entry.customer || '',
                    address: entry.address || '',
                    memo: entry.memo || '',
                    auftragsNr: entry.auftragsNr || '',
                    target: parseInt(entry.target) || 0,
                    deliveryDate: entry.deliveryDate || now,
                    finishedAt: now,
                    status: 'finished',
                    calType: entry.calType || 'montage',
                    billingStatus: entry.billingStatus || null,
                });
                // 3. Passendes objects-Dokument löschen (verschwindet aus Admin-Dashboard)
                const entryAufnr = cleanAuftragsNr(entry.auftragsNr || '');
                const entryAddr = (entry.address || '').trim().toLowerCase();
                for (const obj of (objects || [])) {
                    const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');

                // 3. Auftrag im Admin-Dashboard wiederherstellen (nur falls nicht mehr vorhanden -> keine Duplikate)
                const entryAufnr = cleanAuftragsNr(entry.auftragsNr || '');

                const stillExists = (objects || []).some(obj => {
                    const objAufnr = cleanAuftragsNr(obj.auftragsNr || '');

                    return (entryAufnr && objAufnr && entryAufnr === objAufnr) || (entryAddr && objAddr && entryAddr === objAddr);

                if (!stillExists) {

            const processCalImport = async () => {
                if (!calImportText.trim()) return;
                const lines = calImportText.split(/\r?\n/);
                let currentDay = null;
                const newEntries = [];
                const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s+(\d{2}\.\d{2}\.\d{4})/i;
                const weekDayMap = {};
                DAY_NAMES.forEach((name,i)=>{weekDayMap[name.toLowerCase()]=days[i];});
                weekDayMap['sonntag']=null;
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    const dayMatch = trimmed.match(dayRegex);
                    if (dayMatch) {
                        const dayNameLower = dayMatch[1].toLowerCase();
                        if (weekDayMap[dayNameLower]) currentDay=weekDayMap[dayNameLower];
                        else { const [d,m,y]=dayMatch[2].split('.'); currentDay=new Date(parseInt(y),parseInt(m)-1,parseInt(d)); }
                        continue;
                    }
                    if (!currentDay) continue;
                    const rawParts = trimmed.split('/');
                    if (rawParts.length<3) continue;
                    const p = rawParts.map(x=>x.trim());
                    const firstUpper = p[0].toUpperCase();
                    let customer,address,memo,auftragsNrRaw;
                    if (firstUpper==='LIEFERUNG'||firstUpper==='MONTAGE'||firstUpper==='SERVICE') {
                        customer=p[1]||''; address=p[2]||''; memo=p[3]||''; auftragsNrRaw=p.slice(4).join('/').trim();
                    } else {
                        customer=p[0]||''; address=p[1]||''; memo=p[2]||''; auftragsNrRaw=p.slice(3).join('/').trim();
                    }
                    if (!customer&&!address) continue;
                    const auftragsNr = cleanAuftragsNr(auftragsNrRaw);
                    const eleMatch = memo.match(/(\d+)\s*ELE/i);
                    const target = eleMatch?parseInt(eleMatch[1]):0;
                    const id = `cal-${crypto.randomUUID()}`;
                    const deliveryDate = toLocalDateStr(currentDay);
                    newEntries.push({id,entryType:'LIEFERUNG',calType:activeCalType,customer,address,memo,auftragsNr,target,deliveryDate,endDate:deliveryDate,image:null,colorOverride:null,createdAt:new Date().toISOString()});
                }
                if (newEntries.length>0) {
                    const { db, doc, setDoc } = window.FirebaseSDK;
                    for (const e of newEntries) {
                        await setDoc(doc(db,'artifacts',appId,'public','data','calentries',e.id), e);
                        // Auch im Admin-Dashboard anlegen
                        const objId = `obj-${e.id}`;

                            id: objId, calEntryId: e.id,
                            name: e.address || e.customer,
                            customer: e.customer || '',
                            address: e.address || '',
                            houseInfo: e.memo || 'Gesamtmontage',
                            memo: e.memo || '',
                            auftragsNr: e.auftragsNr || '',
                            target: target2, current: 0,
                            lastRemaining: null, blockReason: null,
                            deliveryDate: e.deliveryDate || new Date().toISOString(),
                            status: 'active', history: [],

                        y+=2; doc.setDrawColor(230,230,230); doc.setLineWidth(0.15); doc.line(margin-2,y,pageW-margin+2,y); y+=rowH-2;

            const kw = getWeekNumber(calWeek);

            return (
                <div style={{ minHeight:'100vh', background:'#f1f5f9', display:'flex', flexDirection:'column' }}>
                    {/* ── HIDDEN PDF AREAS ── */}
                    <div style={{ position:'absolute', left:'-9999px', top:0 }}>
                        {showCalPdfModal && (
                            <div id="cal-single-pdf-content" style={{ padding:'15mm', background:'#fff', color:'#000', fontFamily:'Inter,Arial,sans-serif', width:'190mm' }}>
                                <h1 style={{ fontSize:'22pt', fontWeight:900, borderBottom:'2pt solid #000', paddingBottom:'4mm', marginBottom:'6mm', textTransform:'uppercase' }}>Auftrag</h1>
                                <table style={{ width:'100%', marginBottom:'8mm', fontSize:'11pt' }}>
                                    <tbody>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', width:'35mm', paddingBottom:'3mm' }}>Auftragsnr.</td><td style={{ fontWeight:900, color:'#1a1a1a' }}>{cleanAuftragsNr(showCalPdfModal.auftragsNr||'')||'—'}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Kunde</td><td style={{ fontWeight:'bold' }}>{showCalPdfModal.customer}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Adresse</td><td>{showCalPdfModal.address}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Von</td><td>{formatDate(showCalPdfModal.deliveryDate)}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Bis</td><td>{formatDate(showCalPdfModal.endDate||showCalPdfModal.deliveryDate)}</td></tr>
                                        <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Memo</td><td>{showCalPdfModal.memo}</td></tr>
                                        {showCalPdfModal.target>0&&<tr><td style={{ color:'#888', fontWeight:'bold' }}>ELE</td><td style={{ fontWeight:900 }}>{showCalPdfModal.target} ELE</td></tr>}
                                    </tbody>
                                </table>
                                {showCalPdfModal.image && <div style={{ textAlign:'center', marginTop:'8mm' }}><img src={showCalPdfModal.image} style={{ maxWidth:'100%', maxHeight:'160mm', objectFit:'contain', display:'block', margin:'0 auto' }}/></div>}
                            </div>
                        )}

                        {/* ══════════════════════════════════════════════
                            WEEK PDF — KOMPAKT: ALLES AUF EINER A3-SEITE
                            - Mehrtägige Aufträge nur am Starttag (mit Dauer-Hinweis)
                            - Ultra-kompakte Schriften und Abstände
                            - Memo ohne Label, kompakt
                            - pagebreak: avoid-all
                        ══════════════════════════════════════════════ */}
                        <div id="cal-week-pdf-content" style={{ padding:'3mm 4mm', background:'#fff', fontFamily:'Inter,Arial,sans-serif', width:'420mm' }}>
                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2mm', borderBottom:'1pt solid #000', paddingBottom:'1.5mm' }}>
                                <div style={{ display:'flex', alignItems:'baseline', gap:'3mm' }}>
                                    <h1 style={{ fontSize:'11pt', fontWeight:900, margin:0, textTransform:'uppercase', color:'#1e293b' }}>Wochenkalender</h1>
                                    <span style={{ fontSize:'9pt', fontWeight:900, color:'#2563eb' }}>{currentCalConfig.label}</span>
                                    <span style={{ fontSize:'10pt', fontWeight:900, color:'#2563eb' }}>KW {kw}</span>
                                </div>
                                <p style={{ margin:0, fontSize:'7pt', color:'#666' }}>{formatDate(toLocalDateStr(days[0]))} – {formatDate(toLocalDateStr(days[5]))}</p>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:'1.5mm', alignItems:'start' }}>
                                {/* Tag-Header-Zeile */}
                                {days.map((day,di) => {
                                    const dayStr = toLocalDateStr(day);
                                    const cnt = laneVisibleEntries.filter(e => {
                                        const s=(e.deliveryDate||'').substring(0,10);
                                        const en=(e.endDate||e.deliveryDate||'').substring(0,10);
                                        return dayStr>=s && dayStr<=en;
                                    }).length;
                                    return (
                                        <div key={'h'+di} style={{ background:'#1e293b', borderRadius:'2pt', padding:'1.5mm 2mm', textAlign:'center' }}>
                                            <div style={{ fontSize:'7pt', fontWeight:900, textTransform:'uppercase', color:'#fff', letterSpacing:'0.2pt' }}>{DAY_NAMES[di]}</div>
                                            <div style={{ fontSize:'5.5pt', color:'#94a3b8', marginTop:'0.2mm' }}>{formatDate(dayStr)}</div>
                                            {cnt>0 && <div style={{ fontSize:'4.5pt', color:'#60a5fa', fontWeight:900, marginTop:'0.2mm' }}>{cnt} Auftrag{cnt>1?'e':''}</div>}
                                        </div>
                                    );
                                })}
                                {/* Lane-Zeilen: jeder Auftrag bleibt ueber alle seine Tage in derselben Zeile (wie im Bildschirm-Kalender) */}
                                {Array.from({ length: numLanes }, (_, laneIdx) =>
                                    days.map((day, di) => {
                                        const dayStr = toLocalDateStr(day);
                                        const e = laneVisibleEntries.find(entry => {
                                            if (entryLanes.get(entry.id)!==laneIdx) return false;
                                            const s=(entry.deliveryDate||'').substring(0,10);
                                            const en=(entry.endDate||'').substring(0,10)||s;
                                            return dayStr>=s && dayStr<=en;
                                        })||null;
                                        if (!e) return <div key={laneIdx+'-'+di}></div>;
                                        const ci = colorIndex[e.id]!==undefined?colorIndex[e.id]:0;
                                        const aufnr = cleanAuftragsNr(e.auftragsNr||'');
                                        const startPdf = (e.deliveryDate||'').substring(0,10);
                                        const endPdf   = (e.endDate||e.deliveryDate||'').substring(0,10);
                                        const totalDaysPdf = daysBetween(startPdf, endPdf);
                                        const entryType = e.entryType || 'LIEFERUNG';
                                        const isStartPdf = dayStr === startPdf;
                                        const dayNumberPdf = Math.round((new Date(dayStr)-new Date(startPdf))/86400000)+1;
                                        return (
                                            <div key={laneIdx+'-'+di} style={{
                                                background: CARD_COLORS[ci],
                                                borderLeft: `2.5pt solid ${CARD_BORDER[ci]}`,
                                                borderTop:  `0.5pt solid ${CARD_BORDER[ci]}44`,
                                                borderRight:`0.5pt solid ${CARD_BORDER[ci]}22`,
                                                borderBottom:`0.5pt solid ${CARD_BORDER[ci]}22`,
                                                borderRadius:'2pt',
                                                padding:'1.5mm 2mm'
                                            }}>
                                                <div style={{ display:'flex', alignItems:'center', gap:'1mm', marginBottom:'0.8mm', flexWrap:'wrap' }}>
                                                    <div style={{
                                                        background: CARD_BORDER[ci],
                                                        color:'#fff',
                                                        fontSize:'4.5pt',
                                                        fontWeight:900,
                                                        padding:'0.3mm 2mm',
                                                        borderRadius:'1.5pt',
                                                        textTransform:'uppercase',
                                                        whiteSpace:'nowrap'
                                                    }}>{isStartPdf ? entryType : `TAG ${dayNumberPdf}`}</div>
                                                    {totalDaysPdf > 1 && (
                                                        <div style={{
                                                            background:`${CARD_BORDER[ci]}25`,
                                                            color: CARD_BORDER[ci],
                                                            fontSize:'4pt',
                                                            fontWeight:900,
                                                            padding:'0.3mm 1.5mm',
                                                            borderRadius:'1.5pt',
                                                            border:`0.5pt solid ${CARD_BORDER[ci]}`,
                                                            whiteSpace:'nowrap'
                                                        }}>{totalDaysPdf}T → {formatDate(endPdf)}</div>
                                                    )}
                                                </div>
                                                {aufnr && (
                                                    <div style={{ fontSize:'4.5pt', color:CARD_TEXT[ci], fontWeight:700, opacity:0.6, marginBottom:'0.4mm', textTransform:'uppercase', lineHeight:1.1 }}>{aufnr}</div>
                                                )}
                                                <div style={{ fontSize:'6.5pt', fontWeight:900, color:CARD_TEXT[ci], lineHeight:1.15, marginBottom:'0.5mm', textTransform:'uppercase' }}>{e.customer}</div>
                                                {e.address && (
                                                    <div style={{ fontSize:'5.5pt', color:CARD_TEXT[ci], opacity:0.85, lineHeight:1.2 }}>{e.address}</div>
                                                )}
                                                {e.memo && (
                                                    <div style={{ marginTop:'0.8mm', padding:'0.8mm 1.5mm', borderLeft:`1.5pt solid ${CARD_BORDER[ci]}`, background:`${CARD_BORDER[ci]}18`, borderRadius:'0 1.5pt 1.5pt 0' }}>
                                                        <div style={{ fontSize:'4.5pt', fontWeight:900, color:CARD_TEXT[ci], lineHeight:1.25 }}>{e.memo}</div>
                                                    </div>
                                                )}
                                                {e.target>0 && (
                                                    <div style={{ display:'inline-block', background:CARD_BORDER[ci], color:'#fff', fontSize:'4.5pt', fontWeight:900, padding:'0.3mm 1.5mm', borderRadius:'1.5pt', marginTop:'0.8mm' }}>{e.target} ELE</div>
                                                )}
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </div>

                    {showFerienModal && (
                        <div onClick={()=>setShowFerienModal(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
                            <div onClick={e=>e.stopPropagation()} style={{ background:'#1e293b', borderRadius:16, padding:24, width:'100%', maxWidth:390, border:'1px solid rgba(255,255,255,0.1)', maxHeight:'90vh', overflowY:'auto' }}>
                                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                                    <h3 style={{ margin:0, color:'#fff', fontSize:15, fontWeight:900, textTransform:'uppercase' }}>🏖 Ferien eintragen</h3>
                                    <button onClick={()=>setShowFerienModal(false)} style={{ background:'rgba(255,255,255,0.08)', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16 }}>✕</button>
                                </div>
                                <label style={{ display:'block', color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:5 }}>Monteur</label>
                                {monteurs.length>0 ? (
                                    <select value={ferienForm.monteurName} onChange={e=>setFerienForm({...ferienForm, monteurName:e.target.value})} style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', fontSize:13, marginBottom:14, boxSizing:'border-box' }}>
                                        <option value="">— Monteur wählen —</option>
                                        {[...monteurs].sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(m=> <option key={m.id} value={m.name}>{m.name}</option>)}
                                    </select>
                                ) : (
                                    <input value={ferienForm.monteurName} onChange={e=>setFerienForm({...ferienForm, monteurName:e.target.value})} placeholder="Name des Monteurs" style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', fontSize:13, marginBottom:14, boxSizing:'border-box' }}/>
                                )}
                                <div style={{ display:'flex', gap:10, marginBottom:18 }}>
                                    <div style={{ flex:1 }}>
                                        <label style={{ display:'block', color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:5 }}>Von</label>
                                        <input type="date" value={ferienForm.start} onChange={e=>setFerienForm({...ferienForm, start:e.target.value})} style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', fontSize:13, boxSizing:'border-box' }}/>
                                    </div>
                                    <div style={{ flex:1 }}>
                                        <label style={{ display:'block', color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:5 }}>Bis</label>
                                        <input type="date" value={ferienForm.end} onChange={e=>setFerienForm({...ferienForm, end:e.target.value})} style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', fontSize:13, boxSizing:'border-box' }}/>
                                    </div>
                                </div>
                                <button onClick={saveFerien} disabled={!ferienForm.monteurName.trim()||!ferienForm.start} style={{ width:'100%', padding:'12px', borderRadius:10, background:(!ferienForm.monteurName.trim()||!ferienForm.start)?'#334155':'#f59e0b', border:'none', color:(!ferienForm.monteurName.trim()||!ferienForm.start)?'#64748b':'#1e293b', fontSize:13, fontWeight:900, textTransform:'uppercase', cursor:(!ferienForm.monteurName.trim()||!ferienForm.start)?'not-allowed':'pointer' }}>Speichern</button>
                                {monteurs.length===0 && <div style={{ color:'#64748b', fontSize:9, marginTop:8, textAlign:'center' }}>Tipp: Lege Monteure im Stunden-/Worker-Bereich an, dann erscheinen sie hier zur Auswahl und „aktiv" wird berechnet.</div>}
                                {ferien.length>0 && (
                                    <div style={{ marginTop:18, borderTop:'1px solid rgba(255,255,255,0.08)', paddingTop:14 }}>
                                        <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:8 }}>Eingetragene Ferien</div>
                                        <div style={{ display:'flex', flexDirection:'column', gap:6, maxHeight:200, overflowY:'auto' }}>
                                            {[...ferien].sort((a,b)=>(a.start||'').localeCompare(b.start||'')).map(f=>(
                                                <div key={f.id} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, background:'#0f172a', borderRadius:8, padding:'7px 10px' }}>
                                                    <span style={{ color:'#fff', fontSize:11, fontWeight:700, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{f.monteurName}</span>
                                                    <span style={{ color:'#94a3b8', fontSize:10, whiteSpace:'nowrap' }}>{formatDate(f.start)} – {formatDate(f.end||f.start)}</span>
                                                    <button onClick={()=>deleteFerien(f.id)} style={{ background:'rgba(239,68,68,0.15)', border:'none', borderRadius:6, color:'#f87171', fontSize:10, fontWeight:900, padding:'3px 8px', cursor:'pointer' }}>✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showGlobalSearch && <GlobalSearchModal calEntries={calEntries} onClose={()=>setShowGlobalSearch(false)} onJumpToEntry={handleJumpToEntry}/>}
                    {showBillingPanel && <BillingPanel finishedEntries={finishedObjects} onClose={()=>setShowBillingPanel(false)} appId={appId} calEntries={calEntries}/>}
                    {showStandbyPicker && <StandbyPicker appId={appId} onClose={()=>setShowStandbyPicker(false)} onInsert={(item,start,end)=>{insertStandbyItem(item,start,end);}} defaultDate={toLocalDateStr(days[0])}/>}
                    {verschiebenEntry && <VerschiebenModal entry={verschiebenEntry} onClose={()=>setVerschiebenEntry(null)} onSave={handleVerschieben}/>}
                    {showOffeneListePanel && (()=>{
                        const offeneEntries = filteredEntries.filter(e => !e.doneAt).sort((a,b)=>(a.deliveryDate||'').localeCompare(b.deliveryDate||''));
                        const typeColor = activeCalType==='montage'?'#3b82f6':activeCalType==='beplankung'?'#10b981':'#f59e0b';
                        const typeBorder = activeCalType==='montage'?'rgba(59,130,246,0.3)':activeCalType==='beplankung'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)';
                        return (
                            <div style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(10,15,28,0.92)', backdropFilter:'blur(6px)', display:'flex', alignItems:'flex-start', justifyContent:'center', padding:'16px', overflowY:'auto' }}>
                                {offenePdfLoading && <div className="pdf-loading-overlay" style={{zIndex:300}}><div className="pdf-spinner"></div><div style={{color:'#fff',fontSize:13,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Export wird erstellt...</div></div>}
                                <div style={{ width:'100%', maxWidth:680, background:'#1a2234', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, overflow:'hidden', marginTop:8, boxShadow:'0 30px 80px rgba(0,0,0,0.7)' }}>
                                    <div style={{ background:'linear-gradient(135deg,#0f172a,#1e293b)', borderBottom:'1px solid rgba(255,255,255,0.08)', padding:'18px 22px' }}>
                                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                                            <div>
                                                <div style={{ fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2, color:'#64748b', marginBottom:4 }}>Export für Subunternehmer</div>
                                                <h2 style={{ color:'#fff', fontSize:18, fontWeight:900, fontStyle:'italic', margin:0, textTransform:'uppercase' }}>Offene Aufträge</h2>
                                                <div style={{ fontSize:9, color:'#94a3b8', marginTop:3 }}>
                                                    {activeCalType==='montage'?'🔧 Montage':activeCalType==='beplankung'?'🏗 Beplankung':'❄️ Ausflocken'}
                                                    &nbsp;•&nbsp;
                                                    <span style={{color:'#f59e0b',fontWeight:900}}>{offeneEntries.length} offene Aufträge</span>
                                                    &nbsp;•&nbsp;
                                                    <span style={{color:'#10b981'}}>{filteredEntries.filter(e=>e.doneAt).length} erledigt</span>
                                                </div>
                                            </div>
                                            <button onClick={()=>setShowOffeneListePanel(false)} style={{ background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#94a3b8' }}><Icon name="x" size={16}/></button>
                                        </div>
                                        <div style={{ display:'flex', gap:10, marginTop:16 }}>
                                            <button onClick={async()=>{ setOffenePdfLoading(true); try { await generateOffeneListePDF(offeneEntries, activeCalType); } catch(e){alert('PDF Fehler: '+e.message);} finally{setOffenePdfLoading(false);} }} style={{ flex:1, padding:'10px', background:'rgba(124,58,237,0.2)', border:'1px solid rgba(124,58,237,0.45)', borderRadius:10, color:'#a78bfa', fontSize:10, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                                                <Icon name="file-text" size={15}/>PDF Exportieren
                                            </button>
                                            <button onClick={()=>{ try { generateOffeneListeExcel(offeneEntries, activeCalType); } catch(e){alert('Excel Fehler: '+e.message);} }} style={{ flex:1, padding:'10px', background:'rgba(16,185,129,0.18)', border:'1px solid rgba(16,185,129,0.4)', borderRadius:10, color:'#10b981', fontSize:10, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                                                <Icon name="table" size={15}/>Excel Exportieren
                                            </button>
                                        </div>
                                    </div>
                                    <div style={{ maxHeight:'60vh', overflowY:'auto', padding:'12px 22px 22px' }}>
                                        {offeneEntries.length===0 ? (
                                            <div style={{ textAlign:'center', padding:'48px 0', color:'#475569' }}>
                                                <div style={{fontSize:36,marginBottom:10}}>🎉</div>
                                                <div style={{fontSize:12,fontWeight:900,textTransform:'uppercase',letterSpacing:1,color:'#10b981'}}>Alle Aufträge erledigt!</div>
                                            </div>
                                        ) : (
                                            <div style={{ display:'flex', flexDirection:'column', gap:8, paddingTop:8 }}>
                                                {offeneEntries.map((entry,i) => {
                                                    const aufnr = cleanAuftragsNr(entry.auftragsNr||'');
                                                    return (
                                                        <div key={entry.id} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.07)', borderLeft:`3px solid ${typeColor}`, borderRadius:10, padding:'10px 14px' }}>
                                                            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                                                                <div style={{ flex:1, minWidth:0 }}>
                                                                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
                                                                        <span style={{ color:'#64748b', fontSize:8, fontWeight:900 }}>#{i+1}</span>
                                                                        {aufnr && <span style={{ background:`rgba(${activeCalType==='montage'?'59,130,246':activeCalType==='beplankung'?'16,185,129':'245,158,11'},0.15)`, border:`1px solid ${typeBorder}`, borderRadius:5, padding:'1px 6px', color:typeColor, fontSize:8, fontWeight:900 }}>{aufnr}</span>}
                                                                    </div>
                                                                    <div style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', marginBottom:2 }}>{entry.customer}</div>
                                                                    <div style={{ color:'#94a3b8', fontSize:10, marginBottom:entry.memo?4:0 }}>{entry.address}</div>
                                                                    {entry.memo && <div style={{ color:'#fde68a', fontSize:9, fontWeight:800, borderLeft:'2px solid #f59e0b', paddingLeft:6 }}>📝 {entry.memo}</div>}
                                                                </div>
                                                                <div style={{ flexShrink:0, textAlign:'right' }}>
                                                                    <div style={{ color:'#60a5fa', fontSize:9, fontWeight:900 }}>{entry.deliveryDate ? new Date(entry.deliveryDate).toLocaleDateString('de-DE') : '—'}</div>
                                                                    <div style={{ marginTop:4, background:'rgba(245,158,11,0.15)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:5, padding:'2px 7px', color:'#f59e0b', fontSize:8, fontWeight:900, textTransform:'uppercase' }}>⬜ OFFEN</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                    {showCalAdminPin && (
                        <div style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(10,15,28,0.92)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
                            <div style={{ background:'#1e293b', border:'2px solid rgba(99,102,241,0.4)', borderRadius:24, padding:32, width:'100%', maxWidth:320, display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
                                <div style={{ width:52, height:52, borderRadius:'50%', background:'rgba(99,102,241,0.2)', border:'2px solid rgba(99,102,241,0.5)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 }}>🔐</div>
                                <div style={{ textAlign:'center' }}>
                                    <div style={{ color:'#a5b4fc', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2, marginBottom:4 }}>Admin-Zugang</div>
                                    <div style={{ color:'#fff', fontSize:14, fontWeight:900 }}>PIN eingeben</div>
                                    <div style={{ color:'#475569', fontSize:8, marginTop:4, fontWeight:700 }}>⌨ Tastatur oder Klick</div>
                                </div>
                                <div style={{ display:'flex', gap:8, justifyContent:'center' }}>
                                    {[0,1,2,3].map(i=>(
                                        <div key={i} style={{ width:14, height:14, borderRadius:'50%', border:'2px solid rgba(99,102,241,0.6)', background: calAdminPin.length>i?'#6366f1':'transparent', transition:'background 0.15s' }}></div>
                                    ))}
                                </div>
                                {calAdminPinError && <div style={{ color:'#f87171', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>❌ Falscher PIN</div>}
                                <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, width:'100%' }}>
                                    {[1,2,3,4,5,6,7,8,9].map(n=>(
                                        <button key={n} onClick={()=>{
                                            const np = calAdminPin + n;
                                            if (np.length < 4) { setCalAdminPin(np); setCalAdminPinError(false); }

                    {calImportResult!==null && (

        }

        function App() {
            const [pin, setPin] = useState('');
            const [view, setView] = useState('login');
            const [searchTerm, setSearchTerm] = useState('');
            const [workerSearchTerm, setWorkerSearchTerm] = useState('');
            const [showImportModal, setShowImportModal] = useState(false);

            const [selectedObject, setSelectedObject] = useState(null);
            const [user, setUser] = useState(null);

            const [adminFilter, setAdminFilter] = useState('all');
            const [workerStatusMode, setWorkerStatusMode] = useState('');

            const [workerHours, setWorkerHours] = useState('');

            const [workerHoursName, setWorkerHoursName] = useState('');
            const [objects, setObjects] = useState([]);
            const [finishedObjects, setFinishedObjects] = useState([]);
            const [pendenzen, setPendenzen] = useState([]);
            const [hourLogs, setHourLogs] = useState([]);
            const [monteurs, setMonteurs] = useState([]);
            const [calEntries, setCalEntries] = useState([]);
            const [showPendenzModal, setShowPendenzModal] = useState(null);
            const [pendenzForm, setPendenzForm] = useState({ description:'', deadline:'', monteur:'', images:[] });
            const [isSubmittingPendenz, setIsSubmittingPendenz] = useState(false);
