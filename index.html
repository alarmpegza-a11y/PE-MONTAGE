        const firebaseConfig = {
            apiKey: "AIzaSyD25cVhiguQKP4PTD8evGI4CxSh7rglbBs",

            projectId: "montage-pe-a5f79",
            storageBucket: "montage-pe-a5f79.firebasestorage.app",

    <style>
        :root { 
            --primary: #60a5fa; 
            --bg-main: #1e293b; 
            --card-bg: #334155;
            --accent: #38bdf8;
        }
        body { 
            overscroll-behavior-y: contain; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #f8fafc; 
            -webkit-font-smoothing: antialiased; 
        }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(51, 65, 85, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: #334155; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .page-transition { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        .badge-pulse { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
            50% { box-shadow: 0 0 15px 5px rgba(56, 189, 248, 0.3); background-color: rgba(56, 189, 248, 0.4); border-color: rgba(56, 189, 248, 1); } 
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); background-color: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.5); } 
        }
        
        #print-area, #hour-print-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 190mm;
            background: white;
        }
        
        .pdf-page-break {
            page-break-before: always;
            clear: both;
        }

        .pdf-image-container {
            display: block;
            text-align: center;
            width: 100%;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .pdf-image-container img {
            max-width: 100%;
            max-height: 230mm;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .pdf-first-page {
            width: 100%;
            display: block;
            padding: 10mm;
            box-sizing: border-box;
        }

        .cal-col { border-right: 1px solid #e2e8f0; min-height: 120px; padding: 4px; display: flex; flex-direction: column; gap: 4px; }
        .cal-col:last-child { border-right: none; }
        .cal-card-item { border-radius: 4px; padding: 6px 7px; border-left: 2.5px solid; position: relative; font-size: 11px; }
        .green-dot { position: absolute; top: 4px; right: 4px; width: 7px; height: 7px; border-radius: 50%; background: #10b981; }
        @keyframes gd { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.7);} 50%{box-shadow:0 0 6px 3px rgba(16,185,129,0.3);} }
        .green-dot { animation: gd 2s infinite; }

        #cal-print-area, #cal-pdf-print-area { position: absolute; left: -9999px; top: 0; width: 420mm; background: white; }

        .delete-mode-card { cursor: pointer !important; }
        .delete-mode-card:hover { opacity: 0.7 !important; outline: 2px solid #ef4444; }
        
        .copy-mode-card { cursor: copy !important; }
